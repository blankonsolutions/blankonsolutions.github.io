<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>특청 마스터 관리자 - 플랫폼 통합 관리</title>
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
    <script>
        (function() {
            const savedTheme = localStorage.getItem('special-cleaning-theme') || 'dark';
            if (savedTheme === 'light') {
                document.documentElement.classList.add('light-theme');
            }
        })();
    </script>
    <style>
        :root {
            --primary: #E50914;
            --bg: #000;
            --surface: #111;
            --text-main: #fff;
            --text-sub: #ccc; /* Improved from #aaa */
            --text-dark: #888; /* Improved from #666 */
            --border: #333;
            --danger: #dc3545;
            --warning: #ffc107;
            --info: #00c2ff;
        }

        .light-theme {
            --bg: #f8f9fa;
            --surface: #ffffff;
            --text-main: #111;
            --text-sub: #555;
            --text-dark: #888;
            --border: #dee2e6;
        }

        * {
            box-sizing: border-box;
            font-family: "Pretendard Variable", sans-serif;
            -webkit-tap-highlight-color: transparent;
            line-height: 1.6;
            letter-spacing: -0.025em;
        }

        body {
            margin: 0; padding: 0; background: #050505; color: var(--text-main);
            height: 100vh; overflow: hidden; display: flex; justify-content: center;
            transition: background-color 0.3s, color 0.3s;
        }
        .light-theme body { background-color: #f1f3f5; }

        #root {
            height: 100%; display: flex; flex-direction: column; width: 100%;
            background: var(--bg); position: relative;
        }

        .bg { flex: 1; overflow-y: auto; padding-bottom: 20px; }
        .padding { padding: 24px; }

        .header {
            padding: 50px 20px 20px; background: var(--surface);
            border-bottom: 1px solid var(--primary);
            display: flex; justify-content: space-between; align-items: center;
            position: sticky; top: 0; z-index: 10;
        }
        .headerTitle { font-weight: bold; font-size: 17px; }
        .backBtn, .homeBtn { cursor: pointer; }

        .card { background: var(--surface); padding: 24px; border-radius: 15px; border: 1px solid #222; margin-bottom: 20px; cursor: pointer; transition: background 0.2s; }
        .card:active { background: #1a1a1a; }

        .primaryBtn {
            width: 100%; padding: 18px; background: var(--primary); border: none;
            border-radius: 12px; color: #fff; font-weight: 800; cursor: pointer;
            font-size: 15px;
        }

        .nav {
            height: 75px; background: var(--surface); border-top: 1px solid #222;
            display: flex; justify-content: space-around; align-items: center; width: 100%;
            padding-bottom: env(safe-area-inset-bottom);
        }
        .nav-item { color: var(--text-dark); font-size: 11px; text-align: center; cursor: pointer; }
        .nav-item.active { color: var(--primary); }

        .menuCard { display: flex; justify-content: space-between; align-items: center; padding: 20px; background: var(--surface); border-radius: 12px; margin-bottom: 12px; cursor: pointer; font-size: 14px; }

        .status-pill { font-size: 10px; padding: 2px 8px; border-radius: 4px; font-weight: bold; }
        .status-ready { background: rgba(0,194,255,0.1); color: var(--info); border: 1px solid var(--info); }
        .status-warn { background: rgba(255,193,7,0.1); color: var(--warning); border: 1px solid var(--warning); }

        @media (min-width: 600px) { #root { max-width: 480px; border-left: 1px solid #333; border-right: 1px solid #333; box-shadow: 0 0 50px rgba(0,0,0,0.5); } }
    </style>
</head>

<body>
    <div id="root"></div>

    <script>
        let state = {
            page: 'dash', // dash, vendors, settings, logs
            currentUser: { name: '권운영자', org: '특청 마스터 관리 본부' },
            pendingVendors: [
                { id: 'V1', name: '청결한내일', type: '법인', date: '2026-04-25', files: 3 },
                { id: 'V2', name: '바른정리팀', type: '개인', date: '2026-04-24', files: 2 }
            ],
            auditLogs: [
                 { id: 'L1', time: '14:20', action: '시스템 정책 변경', target: '개인정보 처리방침', actor: '권운영자' },
                 { id: 'L2', time: '11:50', action: '업체 가입 거절', target: '미인증업체A', actor: '권운영자' },
                 { id: 'L3', time: '09:12', action: '서버 보안 점검', target: 'DB Cluster 01', actor: 'System' }
            ]
        };

        function setPage(p) { state.page = p; render(); document.querySelector('.bg').scrollTo(0,0); }

        function render() {
            const root = document.getElementById('root');
            let hideNav = ['vendors', 'settings', 'logs'].includes(state.page);

            root.innerHTML = `
                ${renderHeader(hideNav)}
                <div class="bg">${renderContent()}</div>
                ${hideNav ? '' : renderNav()}
            `;
        }

        function renderHeader(isSub) {
            return `
                <div class="header">
                    ${isSub ? `<div class="backBtn" onclick="setPage('dash')">←</div>` : `<div onclick="location.href='index.html'" style="font-size:13px; border:1px solid #333; padding:6px 12px; border-radius:8px; cursor:pointer;">🏠 홈</div>`}
                    <div class="headerTitle">${getHeaderTitle()}</div>
                    <div style="cursor:pointer; font-size:18px;" onclick="toggleTheme()">🌓</div>
                </div>
            `;
        }

        function toggleTheme() {
            const isLight = document.documentElement.classList.toggle('light-theme');
            localStorage.setItem('special-cleaning-theme', isLight ? 'light' : 'dark');
        }

        function getHeaderTitle() {
            switch(state.page) {
                case 'dash': return '마스터 관리 센터';
                case 'vendors': return '파트너 업체 심사';
                case 'settings': return '플랫폼 운영 설정';
                case 'logs': return '전체 시스템 로그';
                default: return '마스터 어드민';
            }
        }

        function renderNav() {
            return `
                <div class="nav">
                    <div class="nav-item ${state.page==='dash'?'active':''}" onclick="setPage('dash')"><div>🏠</div>홈</div>
                    <div class="nav-item ${state.page==='vendors'?'active':''}" onclick="setPage('vendors')"><div>📝</div>심사</div>
                    <div class="nav-item ${state.page==='settings'?'active':''}" onclick="setPage('settings')"><div>⚙️</div>설정</div>
                    <div class="nav-item ${state.page==='logs'?'active':''}" onclick="setPage('logs')"><div>📜</div>로그</div>
                </div>
            `;
        }

        function renderContent() {
            switch(state.page) {
                case 'dash': return `
                    <div class="padding">
                        <div style="margin-bottom:30px;">
                            <div style="font-size:13px; color:var(--text-sub);">${state.currentUser.org}</div>
                            <div style="font-size:22px; font-weight:800; margin-top:8px; letter-spacing:-0.03em;">특청 마스터 통합 제어</div>
                        </div>

                        <div class="card" style="background:var(--surface-light); border-left: 4px solid var(--primary);">
                            <div style="font-size:12px; color:var(--primary); font-weight:bold; margin-bottom:8px;">오늘의 주요 지표</div>
                            <div style="display:flex; justify-content:space-between; align-items:center;">
                                <div>
                                    <div style="font-size:11px; color:var(--text-sub);">신규 가입 신청</div>
                                    <div style="font-size:20px; font-weight:bold;">${state.pendingVendors.length}건</div>
                                </div>
                                <div>
                                    <div style="font-size:11px; color:var(--text-sub);">현재 활성 오더</div>
                                    <div style="font-size:20px; font-weight:bold;">42건</div>
                                </div>
                            </div>
                            <button class="primaryBtn" style="margin-top:15px; padding:10px; font-size:12px;" onclick="setPage('vendors')">업체 심사 바로가기</button>
                        </div>

                        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:15px; margin-top:25px;">
                            <div class="card" onclick="setPage('settings')" style="margin-bottom:0; text-align:center;">
                                <div style="font-size:24px; margin-bottom:8px;">🛠️</div>
                                <div style="font-size:13px; font-weight:bold;">시스템 설정</div>
                            </div>
                            <div class="card" onclick="setPage('logs')" style="margin-bottom:0; text-align:center;">
                                <div style="font-size:24px; margin-bottom:8px;">📊</div>
                                <div style="font-size:13px; font-weight:bold;">통합 로그</div>
                            </div>
                        </div>

                        <div style="font-weight:bold; margin-top:35px; margin-bottom:15px; font-size:16px;">본사 전용 관리 도구</div>
                        <div class="menuCard" onclick="setPage('settings')"><span>📜 정책 및 약관 편집 마스터</span><span>❯</span></div>
                        <div class="menuCard" onclick="alert('결제 정산 페이지로 이동')"><span>💰 파트너 정산 및 매출 관리</span><span>❯</span></div>
                        <div class="menuCard" onclick="alert('사용자 관리 페이지로 이동')"><span>👤 전체 회원 관리 (CS)</span><span>❯</span></div>
                        
                        <div style="margin-top:25px;">
                            <div style="font-weight:bold; margin-bottom:15px; font-size:14px; color:var(--text-dark);">최근 시스템 로그</div>
                            ${state.auditLogs.slice(0, 3).map(l => `
                                <div style="display:flex; justify-content:space-between; font-size:11px; padding:10px 0; border-bottom:1px solid var(--border);">
                                    <span style="color:var(--text-sub);">${l.time}</span>
                                    <span style="font-weight:bold;">${l.action}</span>
                                    <span style="color:var(--text-dark);">${l.actor}</span>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                `;
                case 'vendors': return `
                    <div class="padding">
                        <h2 style="margin-bottom:25px;">파트너 입점 심사</h2>
                        ${state.pendingVendors.map(v => `
                            <div class="card">
                                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
                                    <div>
                                        <div style="font-weight:bold; font-size:17px;">${v.name}</div>
                                        <div style="font-size:12px; color:var(--text-sub);">${v.type} 사업자 • ${v.date} 신청</div>
                                    </div>
                                    <div style="font-size:11px; background:var(--surface-light); padding:4px 8px; border-radius:5px; border:1px solid var(--border);">서류 ${v.files}건</div>
                                </div>
                                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                                    <button class="primaryBtn" style="padding:12px; background:var(--surface-light); color:var(--text-main); font-size:13px; border:1px solid var(--border);" onclick="alert('서류 검토 모드')">검토</button>
                                    <button class="primaryBtn" style="padding:12px; font-size:13px;" onclick="alert('승인 완료')">최종 승인</button>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                `;
                case 'settings': return `
                    <div class="padding">
                        <h2 style="margin-bottom:30px;">플랫폼 운영 설정</h2>
                        <div style="font-weight:bold; margin-bottom:15px; color:var(--text-dark);">핵심 정책</div>
                        <div class="menuCard"><span>📜 이용약관 마스터 관리</span><span>❯</span></div>
                        <div class="menuCard"><span>🛡️ 개인정보 처리방침 설정</span><span>❯</span></div>
                        <div class="menuCard"><span>⚖️ 분쟁 조정 표준 매뉴얼</span><span>❯</span></div>
                        
                        <div style="font-weight:bold; margin-top:35px; margin-bottom:15px; color:var(--text-dark);">운영 관리</div>
                        <div class="menuCard"><span>🔑 관리자 보안 (2FA) 설정</span><span>❯</span></div>
                        <div class="menuCard"><span>👤 운영 팀원 계정 권한</span><span>❯</span></div>
                    </div>
                `;
                case 'logs': return `
                    <div class="padding">
                        <h2 style="margin-bottom:25px;">통합 시스템 로그</h2>
                        ${state.auditLogs.map(l => `
                             <div class="card" style="padding:15px; margin-bottom:10px;">
                                <div style="font-size:10px; color:var(--text-sub); margin-bottom:5px;">${l.time} | Actor: ${l.actor}</div>
                                <div style="font-weight:bold; font-size:14px;">${l.action}</div>
                                <div style="font-size:12px; color:var(--text-dark);">대상: ${l.target}</div>
                             </div>
                        `).join('')}
                    </div>
                `;
            }
        }

        window.onload = render;
    </script>
</body>

</html>
