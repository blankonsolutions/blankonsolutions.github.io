<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>특청 행정 포털 - 거버넌스 관리</title>
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
    <style>
        :root {
            --primary: #28a745;
            --bg: #000;
            --surface: #111;
            --text-main: #fff;
            --text-sub: #aaa;
            --text-dark: #666;
            --border: #333;
            --danger: #dc3545;
            --warning: #ffc107;
            --info: #00c2ff;
        }

        * { box-sizing: border-box; font-family: "Pretendard Variable", sans-serif; -webkit-tap-highlight-color: transparent; }

        body {
            margin: 0; padding: 0; background: #050505; color: var(--text-main);
            height: 100vh; overflow: hidden; display: flex; justify-content: center;
        }

        #root {
            height: 100%; display: flex; flex-direction: column; width: 100%;
            background: var(--bg); position: relative;
        }

        .bg { flex: 1; overflow-y: auto; padding-bottom: 20px; }
        .padding { padding: 20px; }

        .header {
            padding: 50px 20px 15px; background: var(--surface);
            border-bottom: 1px solid var(--primary);
            display: flex; justify-content: space-between; align-items: center;
            position: sticky; top: 0; z-index: 10;
        }
        .headerTitle { font-weight: bold; font-size: 17px; }

        .card { background: var(--surface); padding: 20px; border-radius: 15px; border: 1px solid #222; margin-bottom: 15px; }
        .primaryBtn {
            width: 100%; padding: 15px; background: var(--primary); border: none;
            border-radius: 10px; color: #fff; font-weight: 800; cursor: pointer;
        }

        /* Mini Stats Grid */
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        
        .nav {
            height: 60px; background: var(--surface); border-top: 1px solid #222;
            display: flex; justify-content: space-around; align-items: center; width: 100%;
        }
        .nav-item { color: var(--text-dark); font-size: 10px; text-align: center; cursor: pointer; }
        .nav-item.active { color: var(--primary); }

        .tag { font-size: 10px; padding: 2px 6px; border-radius: 4px; display: inline-block; margin-bottom: 5px; }
        .tag-gray { background: #222; color: #888; }
        .tag-blue { background: rgba(0,194,255,0.1); color: var(--info); border: 1px solid var(--info); }

        @media (min-width: 600px) { #root { max-width: 480px; border-left: 1px solid #333; border-right: 1px solid #333; box-shadow: 0 0 50px rgba(0,0,0,0.5); } }
    </style>
</head>

<body>
    <div id="root"></div>

    <script>
        let state = {
            page: 'dash', // dash, stats, approval, logs, info
            currentUser: { name: '이주무관', org: '광주광역시 서구청' },
            districts: [
                { name: '역삼1동', risk: '상', activity: 85 },
                { name: '역삼2동', risk: '중', activity: 40 },
                { name: '도곡동', risk: '하', activity: 12 }
            ],
            pendingVendors: [
                { id: 'v1', name: '든든특수청소', date: '2026-04-25', docs: '완료' }
            ],
            auditLogs: [
                 { time: '14:20', action: '예산 승인', target: 'B-04 프로젝트' },
                 { time: '13:05', action: '가구 점검', target: '역삼동 123-4' }
            ]
        };

        function setPage(p) { state.page = p; render(); }

        function render() {
            const root = document.getElementById('root');
            let hideNav = ['approval', 'logs', 'info'].includes(state.page);

            root.innerHTML = `
                ${renderHeader(hideNav)}
                <div class="bg">${renderContent()}</div>
                ${hideNav ? '' : renderNav()}
            `;
        }

        function renderHeader(isSub) {
            return `
                <div class="header">
                    ${isSub ? `<div onclick="setPage('dash')" style="cursor:pointer; font-size:20px;">←</div>` : `<div onclick="location.href='index.html'" style="font-size:13px; border:1px solid #333; padding:5px 10px; border-radius:8px;">🏠 홈</div>`}
                    <div class="headerTitle">${getHeaderTitle()}</div>
                    <div style="width:40px"></div>
                </div>
            `;
        }

        function getHeaderTitle() {
            switch(state.page) {
                case 'dash': return '행정 통합관제';
                case 'stats': return '지역별 통계 분석';
                case 'approval': return '신규 파트너 검증';
                case 'logs': return '시스템 감사 로그';
                case 'info': return '행정 매뉴얼 DB';
                default: return '행정포털';
            }
        }

        function renderNav() {
            return `
                <div class="nav">
                    <div class="nav-item ${state.page==='dash'?'active':''}" onclick="setPage('dash')">🏠 홈</div>
                    <div class="nav-item ${state.page==='stats'?'active':''}" onclick="setPage('stats')">📊 통계</div>
                    <div class="nav-item ${state.page==='approval'?'active':''}" onclick="setPage('approval')">🛡️ 검증</div>
                    <div class="nav-item" onclick="setPage('info')">📄 가이드</div>
                </div>
            `;
        }

        function renderContent() {
            switch(state.page) {
                case 'dash': return `
                    <div class="padding">
                        <div style="margin-bottom:20px;">
                            <div style="font-size:13px; color:var(--text-sub);">${state.currentUser.org}</div>
                            <div style="font-size:22px; font-weight:800; margin-top:5px;">기동 대응 단계: <span style="color:var(--warning);">관심 (Level 1)</span></div>
                        </div>

                        <div class="grid-2" style="margin-bottom:20px;">
                            <div class="card" onclick="setPage('stats')" style="margin-bottom:0;"><div style="font-size:20px;">🌆</div><div style="font-size:12px; margin-top:5px;">관내 위험 분포</div></div>
                            <div class="card" onclick="setPage('approval')" style="margin-bottom:0;"><div style="font-size:20px;">📋</div><div style="font-size:12px; margin-top:5px;">업체 승인 대기</div></div>
                        </div>

                        <div style="font-weight:bold; margin-bottom:15px;">🔍 실시간 행정 로그</div>
                        <div class="card">
                            ${state.auditLogs.map(l => `
                                <div style="display:flex; justify-content:space-between; font-size:12px; padding:8px 0; border-bottom:1px solid #222;">
                                    <span style="color:var(--text-dark);">${l.time}</span>
                                    <span>${l.action}: <b style="color:var(--info);">${l.target}</b></span>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                `;
                case 'stats': return `
                    <div class="padding">
                        <h3 style="margin-bottom:15px;">행정동별 위험 지수</h3>
                        ${state.districts.map(d => `
                            <div class="card">
                                <div style="display:flex; justify-content:space-between; margin-bottom:10px;">
                                    <div style="font-weight:bold;">${d.name}</div>
                                    <div style="color:${d.risk==='상'?'var(--danger)':'var(--success)'}">${d.risk}</div>
                                </div>
                                <div style="height:6px; background:#222; border-radius:3px; overflow:hidden;">
                                    <div style="height:100%; background:var(--primary); width:${d.activity}%"></div>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                `;
                case 'approval': return `
                    <div class="padding">
                        <h3 style="margin-bottom:15px;">신규 파트너 가입 심사</h3>
                        ${state.pendingVendors.map(v => `
                            <div class="card">
                                <div class="tag tag-blue">서류검토중</div>
                                <div style="font-size:17px; font-weight:bold; margin:5px 0;">${v.name}</div>
                                <div style="font-size:12px; color:var(--text-dark);">신청일: ${v.date}</div>
                                <div class="grid-2" style="margin-top:15px;">
                                    <button class="primaryBtn" style="padding:10px; font-size:12px;" onclick="alert('승인 완료')">승인</button>
                                    <button class="primaryBtn" style="padding:10px; font-size:12px; background:var(--danger);" onclick="alert('반려 처리')">반려</button>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                `;
                case 'info': return `
                    <div class="padding">
                        <h3 style="margin-bottom:15px;">특수청소 행정 매뉴얼</h3>
                        <div class="card" onclick="alert('다운로드 중...')">📕 [2026] 고립가구 현장 대응 가이드</div>
                        <div class="card" onclick="alert('다운로드 중...')">📘 [지침] B2G 제한경쟁입찰 표준 절차</div>
                        <div class="card" onclick="alert('다운로드 중...')">📗 지출결의서 소급 적용 기준</div>
                    </div>
                `;
            }
        }

        window.onload = render;
    </script>
</body>

</html>
