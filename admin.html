<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>특청 행정 포털 - 거버넌스 관리</title>
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
    <style>
        :root {
            --primary: #28a745;
            --bg: #000;
            --surface: #111;
            --text-main: #fff;
            --text-sub: #aaa;
            --text-dark: #666;
            --border: #333;
            --danger: #dc3545;
            --warning: #ffc107;
            --info: #00c2ff;
        }

        * {
            box-sizing: border-box;
            font-family: "Pretendard Variable", sans-serif;
            -webkit-tap-highlight-color: transparent;
            line-height: 1.6;
            letter-spacing: -0.025em;
        }

        body {
            margin: 0; padding: 0; background: #050505; color: var(--text-main);
            height: 100vh; overflow: hidden; display: flex; justify-content: center;
        }

        #root {
            height: 100%; display: flex; flex-direction: column; width: 100%;
            background: var(--bg); position: relative;
        }

        .bg { flex: 1; overflow-y: auto; padding-bottom: 20px; }
        .padding { padding: 24px; }

        .header {
            padding: 50px 20px 20px; background: var(--surface);
            border-bottom: 1px solid var(--primary);
            display: flex; justify-content: space-between; align-items: center;
            position: sticky; top: 0; z-index: 10;
        }
        .headerTitle { font-weight: bold; font-size: 17px; }
        .backBtn, .homeBtn { cursor: pointer; }

        .card {
            background-color: var(--surface); padding: 25px; border-radius: 20px; transition: transform 0.2s, background-color 0.2s;
            cursor: pointer; position: relative; overflow: hidden; border: 1px solid #222; margin-bottom: 20px;
        }.card:active { background: #1a1a1a; }

        .primaryBtn {
            width: 100%; padding: 18px; background: var(--primary); border: none;
            border-radius: 12px; color: #fff; font-weight: 800; cursor: pointer;
            font-size: 15px;
        }

        .nav {
            height: 75px; background: var(--surface); border-top: 1px solid #222;
            display: flex; justify-content: space-around; align-items: center; width: 100%;
        }
        .nav-item { color: var(--text-dark); font-size: 11px; text-align: center; cursor: pointer; }
        .nav-item.active { color: var(--primary); }

        .menuCard { display: flex; justify-content: space-between; align-items: center; padding: 20px; background: var(--surface); border-radius: 12px; margin-bottom: 12px; cursor: pointer; font-size: 14px; }

        @media (min-width: 600px) { #root { max-width: 480px; border-left: 1px solid #333; border-right: 1px solid #333; box-shadow: 0 0 50px rgba(0,0,0,0.5); } }
    </style>
</head>

<body>
    <div id="root"></div>

    <script>
        let state = {
            page: 'dash', // dash, stats, approval, logs, broadcast, archive, settings
            currentUser: { name: '이주무관', org: '광주광역시 서구청' },
            districts: [
                { name: '역삼1동', risk: '상', activity: 85 },
                { name: '역삼2동', risk: '중', activity: 40 },
                { name: '도곡동', risk: '하', activity: 12 }
            ],
            auditLogs: [
                 { time: '14:20', action: '예산 승인', target: 'B-04 프로젝트' },
                 { time: '13:05', action: '가구 점검', target: '역삼동 123-4' }
            ]
        };

        function setPage(p) { state.page = p; render(); }

        function render() {
            const root = document.getElementById('root');
            let hideNav = ['approval', 'logs', 'broadcast', 'archive', 'settings'].includes(state.page);

            root.innerHTML = `
                ${renderHeader(hideNav)}
                <div class="bg">${renderContent()}</div>
                ${hideNav ? '' : renderNav()}
            `;
        }

        function renderHeader(isSub) {
            return `
                <div class="header">
                    ${isSub ? `<div class="backBtn" onclick="setPage('dash')">←</div>` : `<div onclick="location.href='index.html'" style="font-size:13px; border:1px solid #333; padding:6px 12px; border-radius:8px; cursor:pointer;">🏠 홈</div>`}
                    <div class="headerTitle">${getHeaderTitle()}</div>
                    <div style="width:40px"></div>
                </div>
            `;
        }

        function getHeaderTitle() {
            switch(state.page) {
                case 'dash': return '행정 통합관제';
                case 'stats': return '데이터 시각화';
                case 'broadcast': return '긴급 행정 중계';
                case 'archive': return '과거 데이터 아카이브';
                case 'settings': return '플랫폼 운영 설정';
                default: return '행정포털';
            }
        }

        function renderNav() {
            return `
                <div class="nav">
                    <div class="nav-item ${state.page==='dash'?'active':''}" onclick="setPage('dash')"><div>🏠</div>홈</div>
                    <div class="nav-item ${state.page==='stats'?'active':''}" onclick="setPage('stats')"><div>📊</div>분석</div>
                    <div class="nav-item" onclick="setPage('broadcast')"><div>📡</div>전파</div>
                    <div class="nav-item" onclick="setPage('settings')"><div>⚙️</div>설정</div>
                </div>
            `;
        }

        function renderContent() {
            switch(state.page) {
                case 'dash': return `
                    <div class="padding">
                        <div style="margin-bottom:30px;">
                            <div style="font-size:13px; color:var(--text-sub);">${state.currentUser.org}</div>
                            <div style="font-size:22px; font-weight:800; margin-top:8px; letter-spacing:-0.03em;">행정 통합 마스터 포털</div>
                        </div>

                        <div class="card" style="background:#1a1a1a; border-left: 4px solid var(--primary);">
                            <div style="font-size:12px; color:var(--primary); font-weight:bold; margin-bottom:8px;">긴급 상황 알림</div>
                            <div style="font-size:15px; font-weight:bold; line-height:1.5;">역삼동 관내 고위험군 가구 2개 소에서 72시간 이상 활동 감지되지 않음</div>
                            <button class="primaryBtn" style="margin-top:15px; padding:10px; font-size:12px;" onclick="setPage('broadcast')">긴급 전파 실행</button>
                        </div>

                        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:15px; margin-top:25px;">
                            <div class="card" onclick="setPage('stats')" style="margin-bottom:0; text-align:center;">
                                <div style="font-size:24px; margin-bottom:8px;">📈</div>
                                <div style="font-size:13px; font-weight:bold;">동별 지수</div>
                            </div>
                            <div class="card" onclick="setPage('archive')" style="margin-bottom:0; text-align:center;">
                                <div style="font-size:24px; margin-bottom:8px;">🗄️</div>
                                <div style="font-size:13px; font-weight:bold;">아카이브</div>
                            </div>
                        </div>

                        <div style="font-weight:bold; margin-top:35px; margin-bottom:15px; font-size:16px;">행정 도구</div>
                        <div class="menuCard" onclick="setPage('settings')"><span>🔧 플랫폼 이용약관 관리</span><span>❯</span></div>
                        <div class="menuCard" onclick="alert('데이터 추출 중...')"><span>📊 정기 보고서 자동 생성 (XLS)</span><span>❯</span></div>
                    </div>
                `;
                case 'stats': return `
                    <div class="padding">
                        <h3 style="margin-bottom:20px;">특수청소 수요 밀집도</h3>
                        ${state.districts.map(d => `
                            <div class="card">
                                <div style="display:flex; justify-content:space-between; margin-bottom:12px;">
                                    <div style="font-weight:bold; font-size:15px;">${d.name}</div>
                                    <div style="font-size:12px; font-weight:bold; color:${d.risk==='상'?'var(--danger)':'var(--success)'}">${d.risk} 위험</div>
                                </div>
                                <div style="height:8px; background:#222; border-radius:4px; overflow:hidden;">
                                    <div style="height:100%; background:var(--primary); width:${d.activity}%"></div>
                                </div>
                                <div style="font-size:11px; color:var(--text-dark); margin-top:8px;">전월 대비 작업 빈도 ${d.activity}% 도달</div>
                            </div>
                        `).join('')}
                    </div>
                `;
                case 'broadcast': return `
                    <div class="padding">
                        <h2 style="margin-bottom:25px;">긴급 행정 전파</h2>
                        <div class="card" style="border-color:var(--danger); background:rgba(220,53,69,0.05);">
                            <p style="font-size:14px; line-height:1.7;">본 기능은 관내 등록된 모든 특수청소 파트너 업체에게 긴급 출동 및 작업 협조 요청을 동시에 발송합니다. 오남용에 주의하시기 바랍니다.</p>
                        </div>
                        <div style="margin-top:20px;">
                            <textarea style="width:100%; background:#000; border:1px solid #333; color:#fff; padding:20px; border-radius:12px; font-size:14px; outline:none;" rows="6" placeholder="전파할 메시지 내용을 입력하세요."></textarea>
                        </div>
                        <button class="primaryBtn" style="margin-top:20px; background:var(--danger);" onclick="alert('관내 12개 업체에 긴급 전파가 완료되었습니다.')">즉시 전파 실행</button>
                    </div>
                `;
                case 'archive': return `
                    <div class="padding">
                        <h3 style="margin-bottom:20px;">행정 데이터 아카이브</h3>
                        <div class="menuCard"><span>📂 2025년 하반기 작업 리포트</span><span>❯</span></div>
                        <div class="menuCard"><span>📂 2025년 상반기 예산 집행 내역</span><span>❯</span></div>
                        <div class="menuCard"><span>📂 과거 계약 및 심사 아카이브</span><span>❯</span></div>
                    </div>
                `;
                case 'settings': return `
                    <div class="padding">
                        <h3 style="margin-bottom:20px;">시스템 운영 설정</h3>
                        <div class="menuCard"><span>📜 서비스 이용약관 편집</span><span>❯</span></div>
                        <div class="menuCard"><span>🛡️ 개인정보 처리방침 갱신</span><span>❯</span></div>
                        <div class="menuCard"><span>🔑 관리자 권한 및 계정 관리</span><span>❯</span></div>
                    </div>
                `;
            }
        }

        window.onload = render;
    </script>
</body>

</html>
