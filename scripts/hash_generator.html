<!DOCTYPE html>
<html>
<body>
    <canvas id="canvas" width="8" height="8"></canvas>
    <script>
        async function getHash(url) {
            return new Promise((resolve, reject) => {
                const img = new Image();
                img.crossOrigin = "Anonymous";
                img.onload = () => {
                    const canvas = document.getElementById('canvas');
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, 8, 8);
                    const data = ctx.getImageData(0, 0, 8, 8).data;
                    let gray = [];
                    for (let i = 0; i < data.length; i += 4) {
                        gray.push(Math.floor((data[i] + data[i+1] + data[i+2]) / 3));
                    }
                    const avg = gray.reduce((a, b) => a + b) / 64;
                    let hash = "";
                    for (let g of gray) {
                        hash += (g >= avg ? "1" : "0");
                    }
                    resolve(hash);
                };
                img.onerror = () => resolve(null);
                img.src = "file:///" + url.replace(/\\/g, '/');
            });
        }

        async function processBatch(files) {
            let results = [];
            for (let f of files) {
                const hash = await getHash(f);
                results.push({ path: f, hash: hash });
            }
            return results;
        }

        window.processBatch = processBatch;
    </script>
</body>
</html>
