<!DOCTYPE html>
<html lang="ko">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>특청 관공서 포털 - 행정 관리 시스템</title>
	<link rel="stylesheet" as="style" crossorigin
		href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
	<script>
		(function () {
			const savedTheme = localStorage.getItem('special-cleaning-theme') || 'dark';
			if (savedTheme === 'light') {
				document.documentElement.classList.add('light-theme');
			}
		})();
	</script>
	<style>
		:root {
			--primary: #28a745;
			--bg: #000;
			--surface: #111;
			--text-main: #fff;
			--text-sub: #ccc;
			--text-dark: #888;
			--border: #333;
			--danger: #dc3545;
			--warning: #ffc107;
			--info: #00c2ff;
		}

		.light-theme {
			--bg: #f8f9fa;
			--surface: #ffffff;
			--text-main: #111;
			--text-sub: #555;
			--text-dark: #888;
			--border: #dee2e6;
		}

		* {
			box-sizing: border-box;
			font-family: "Pretendard Variable", sans-serif;
			-webkit-tap-highlight-color: transparent;
			line-height: 1.6;
			letter-spacing: -0.025em;
		}

		body {
			margin: 0;
			padding: 0;
			background: #050505;
			color: var(--text-main);
			height: 100vh;
			overflow: hidden;
			display: flex;
			justify-content: center;
			transition: background-color 0.3s, color 0.3s;
		}

		.light-theme body {
			background-color: #f1f3f5;
		}

		#root {
			height: 100%;
			display: flex;
			flex-direction: column;
			width: 100%;
			background: var(--bg);
			position: relative;
		}

		.bg {
			flex: 1;
			overflow-y: auto;
			padding-bottom: 20px;
		}

		.padding {
			padding: 24px;
		}

		.header {
			padding: 50px 20px 20px;
			background: var(--surface);
			border-bottom: 1px solid var(--primary);
			display: flex;
			justify-content: space-between;
			align-items: center;
			position: sticky;
			top: 0;
			z-index: 10;
		}

		.headerTitle {
			font-weight: bold;
			font-size: 17px;
		}

		.backBtn,
		.homeBtn {
			cursor: pointer;
		}

		.card {
			background: var(--surface);
			padding: 24px;
			border-radius: 15px;
			border: 1px solid #222;
			margin-bottom: 20px;
			cursor: pointer;
			transition: background 0.2s;
		}

		.card:active {
			background: #1a1a1a;
		}

		.primaryBtn {
			width: 100%;
			padding: 18px;
			background: var(--primary);
			border: none;
			border-radius: 12px;
			color: #fff;
			font-weight: 800;
			cursor: pointer;
			font-size: 15px;
		}

		.nav {
			height: 75px;
			background: var(--surface);
			border-top: 1px solid #222;
			display: flex;
			justify-content: space-around;
			align-items: center;
			width: 100%;
			padding-bottom: env(safe-area-inset-bottom);
		}

		.nav-item {
			color: var(--text-dark);
			font-size: 11px;
			text-align: center;
			cursor: pointer;
		}

		.nav-item.active {
			color: var(--primary);
		}

		.menuCard {
			display: flex;
			justify-content: space-between;
			align-items: center;
			padding: 20px;
			background: var(--surface);
			border-radius: 12px;
			margin-bottom: 12px;
			cursor: pointer;
			font-size: 14px;
		}

		.status-pill {
			font-size: 10px;
			padding: 2px 8px;
			border-radius: 4px;
			font-weight: bold;
		}

		.status-ready {
			background: rgba(0, 194, 255, 0.1);
			color: var(--info);
			border: 1px solid var(--info);
		}

		.status-warn {
			background: rgba(255, 193, 7, 0.1);
			color: var(--warning);
			border: 1px solid var(--warning);
		}

		@media (min-width: 600px) {
			#root {
				max-width: 480px;
				border-left: 1px solid #333;
				border-right: 1px solid #333;
				box-shadow: 0 0 50px rgba(0, 0, 0, 0.5);
			}
		}

		.blinking-hotspot {
			width: 25px;
			height: 25px;
			background: var(--danger);
			border-radius: 50%;
			box-shadow: 0 0 0 rgba(229, 9, 20, 0.4);
			animation: pulse-red 1.5s infinite;
		}

		@keyframes pulse-red {
			0% {
				box-shadow: 0 0 0 0 rgba(229, 9, 20, 0.7);
			}

			70% {
				box-shadow: 0 0 0 20px rgba(229, 9, 20, 0);
			}

			100% {
				box-shadow: 0 0 0 0 rgba(229, 9, 20, 0);
			}
		}

		@keyframes spin {
			0% {
				transform: rotate(0deg);
			}

			100% {
				transform: rotate(360deg);
			}
		}

		/* AI 분석 전용 추가 스타일 */
		.analysis-section {
			margin-bottom: 25px;
		}

		.analysis-label {
			font-size: 13px;
			font-weight: 700;
			color: var(--text-sub);
			margin-bottom: 12px;
			display: flex;
			align-items: center;
			gap: 6px;
		}

		.analysis-label i {
			color: var(--primary);
		}

		.chip-group {
			display: flex;
			flex-wrap: wrap;
			gap: 8px;
			margin-bottom: 20px;
		}

		.chip {
			padding: 10px 16px;
			border-radius: 10px;
			background: var(--surface);
			border: 1px solid var(--border);
			color: var(--text-sub);
			font-size: 13px;
			cursor: pointer;
			transition: all 0.2s;
		}

		.chip.active {
			background: rgba(40, 167, 69, 0.1);
			border-color: var(--primary);
			color: var(--primary);
			font-weight: bold;
		}

		.gauge-container {
			width: 100%;
			height: 12px;
			background: #222;
			border-radius: 6px;
			overflow: hidden;
			margin: 20px 0;
			position: relative;
		}

		.gauge-bar {
			height: 100%;
			width: 0%;
			transition: width 1s ease-out;
		}

		.result-card {
			display: none;
			background: #161616;
			border-radius: 20px;
			border: 1px solid var(--border);
			padding: 24px;
			margin-top: 30px;
			animation: fadeIn 0.5s ease;
		}

		@keyframes fadeIn {
			from {
				opacity: 0;
				transform: translateY(10px);
			}

			to {
				opacity: 1;
				transform: translateY(0);
			}
		}

		.recommendation-item {
			display: flex;
			gap: 12px;
			margin-bottom: 15px;
			padding: 12px;
			background: rgba(255, 255, 255, 0.03);
			border-radius: 10px;
			font-size: 13px;
		}
	</style>
</head>

<body>

		function updateHeatmapData(period) {
			state.heatmapPeriod = period;
			if (period === '1개월') {
				state.districts = [
					{ name: '치평동', risk: '상', activity: 92, lat: 40, lng: 30, trend: '급증' },
					{ name: '상무1동', risk: '중', activity: 50, lat: 60, lng: 50, trend: '상승' },

					{ name: '상무1동', risk: '중', activity: 40, lat: 60, lng: 50, trend: '보합' },
					{ name: '화정1동', risk: '상', activity: 68, lat: 20, lng: 70, trend: '상승' },
					{ name: '양동', risk: '하', activity: 25, lat: 80, lng: 20, trend: '하락' }
				];
			} else if (period === '1년') {
				state.districts = [
					{ name: '치평동', risk: '중', activity: 60, lat: 40, lng: 30, trend: '상승' },
					{ name: '상무1동', risk: '하', activity: 30, lat: 60, lng: 50, trend: '보합' },
					{ name: '화정1동', risk: '중', activity: 55, lat: 20, lng: 70, trend: '상승' },
					{ name: '양동', risk: '하', activity: 30, lat: 80, lng: 20, trend: '하락' }
				];
			}
			render();
		}

		function openPdfOverlay(title, type) {
			state.isPdfOpen = true;
			state.pdfContent = { title, type };
			render();
		}

		function closePdfOverlay() {
			state.isPdfOpen = false;
			state.pdfContent = null;
			render();
		}

		function setPage(p) { state.page = p; render(); if (document.querySelector('.bg')) document.querySelector('.bg').scrollTo(0, 0); }

		function render() {
			const root = document.getElementById('root');
			let hideNav = ['login', 'signup_choice', 'signup_gov', 'find_idpw'].includes(state.page);
			root.innerHTML = `
				${hideNav ? '' : renderHeader()}
				<div class="bg">${renderContent()}</div>
				${hideNav ? '' : renderNav()}
				${state.isPdfOpen ? renderPdfOverlay() : ''}
			`;
		}

						</tr>
						<tr>
							<td style="border:1px solid #999; padding:5px;">클린솔루션</td>
							<td style="border:1px solid #999; padding:5px;">1,650,000원</td>
							<td style="border:1px solid #999; padding:5px;">-</td>
						</tr>
					</table>
					<div style="font-weight:bold; margin-bottom:5px;">2. 작업 전/후 현장 GPS 증빙</div>
					<div style="display:flex; gap:10px; margin-bottom:20px;">
						<div style="flex:1; background:#ddd; height:80px; display:flex; align-items:center; justify-content:center; font-size:10px;">[작업 전 GPS 사진]</div>
						<div style="flex:1; background:#ddd; height:80px; display:flex; align-items:center; justify-content:center; font-size:10px;">[작업 후 GPS 사진]</div>
					</div>
					<div style="text-align:center; color:red; border:1px solid red; padding:5px; font-weight:bold;">위 증명서는 위변조가 불가능한 시스템으로 자동 생성되었음을 인증합니다.</div>
				`;
			} else {
				innerContent = `
					<h3 style="text-align:center; border-bottom:2px solid #000; padding-bottom:10px;">${state.pdfContent.title}</h3>
					<div style="font-size:12px; margin-bottom:15px;">이 문서는 특청 관공서 포털 아카이브에서 제공하는 열람용 사본입니다. 본 문서의 무단 복제 및 배포를 금합니다.</div>

						[대외비]<br><br>
						본 보고서는 관내 발생한 특수 청소 및 고립 가구 사례의 종합적인 분석 결과를 담고 있습니다. 해당 데이터는 AI 기반 위험 가구 예측 모델에 활용되며, 각 동별 복지 예산 편성에 기초 자료로 제공됩니다.<br><br>

						(실제 데이터 연동 시 상세 내용이 이곳에 표시됩니다)
					</div>
				`;
			}

			return `
				<div style="position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:100; display:flex; align-items:center; justify-content:center; padding:20px;">
					<div style="background:#fff; color:#000; width:100%; max-width:400px; max-height:90vh; border-radius:10px; display:flex; flex-direction:column; overflow:hidden;">
						<div style="background:#333; color:#fff; padding:15px; display:flex; justify-content:space-between; align-items:center;">
							<div style="font-weight:bold; font-size:14px;">PDF 문서 뷰어</div>
							<div style="cursor:pointer; font-weight:bold; font-size:18px;" onclick="closePdfOverlay()">✕</div>
						</div>
						<div style="padding:20px; flex:1; overflow-y:auto;">
							${innerContent}
						</div>
					</div>
				</div>
			`;
		}

		function renderHeader() {
			return `
				<div class="header">
					<div class="backBtn" onclick="setPage('dash')">←</div>
					<div class="headerTitle">${getHeaderTitle()}</div>
					<div style="cursor:pointer; font-size:18px;" onclick="toggleTheme()">🌓</div>
				</div>
			`;
		}

		function getHeaderTitle() {
			switch (state.page) {
				case 'dash': return '행정 마스터 포털';
				case 'docs_manage': return '행정 증빙 통합 시스템';
				case 'vendor_db': return '인증 파트너 통합 DB';

		function showRiskResult() {
			const resultBox = document.getElementById('risk_result');
			const scoreText = document.getElementById('risk_score');
			const gauge = document.getElementById('risk_gauge');
			const levelText = document.getElementById('risk_level');

			resultBox.style.display = 'block';
			resultBox.scrollIntoView({ behavior: 'smooth' });

			// 데이터 분석 시뮬레이션
			let score = 0;
			const targetScore = 88; // 예시 점수

			let current = 0;
			const timer = setInterval(() => {
				if (current >= targetScore) {
					clearInterval(timer);
				} else {
					current++;
					scoreText.innerText = current + '%';
					gauge.style.width = current + '%';

					if (current > 80) {
						levelText.innerText = "최고 위험 (Immediate Action Required)";
						levelText.style.color = "var(--danger)";
					} else if (current > 40) {
						levelText.innerText = "주의 단계";
						levelText.style.color = "var(--warning)";
					}
				}
			}, 15);
		}

		function runSmartMatching() {
			if (!document.getElementById('sm_budget').value) { alert('가용 예산을 입력해주세요.'); return; }
			state.isMatchingAI = true; state.aiStep = 1; render();
			setTimeout(() => { state.aiStep = 2; render(); }, 1000);
			setTimeout(() => {
				state.isMatchingAI = false;
				state.matchedVendors = [
					{ name: '명품특수청소', rating: 4.9, contracts: 42, estPrice: '1,850,000' },
					{ name: '클린솔루션', rating: 4.7, contracts: 28, estPrice: '2,100,000' }
				];
				render();
			}, 2000);
		}

		function toggleVendorSummary(name) {
			state.selectedVendor = state.selectedVendor === name ? null : name;
			render();
		}

		function sortVendors(type) {
			state.vendorSort = type;
			render();
		}

		function getSortedVendors() {
			let list = [...state.vendors];
			switch (state.vendorSort) {
				case 'reviews': return list.sort((a, b) => b.reviews - a.reviews);
				case 'distance': return list.sort((a, b) => a.distance - b.distance);
				case 'years': return list.sort((a, b) => b.years - a.years);
				case 'employees': return list.sort((a, b) => b.contracts - a.contracts);
				default: return list;
			}
		}

		function renderSignupChoice() { return `<div class="padding"><h2>회원가입</h2></div>`; }
		function renderSignupGov() { return `<div class="padding"><h2>정보 입력</h2></div>`; }
		function renderFindIDPW() { return `<div class="padding"><h2>계정 찾기</h2></div>`; }
		function toggleTheme() {
			const isLight = document.documentElement.classList.toggle('light-theme');
			localStorage.setItem('special-cleaning-theme', isLight ? 'light' : 'dark');
		}

		window.onload = render;

	</script>
</body>

</html>
