<!DOCTYPE html>
<html lang="ko">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>특청 관공서 포털 - 행정 관리 시스템</title>
	<link rel="stylesheet" as="style" crossorigin
		href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
	<script>
		(function () {
			const savedTheme = localStorage.getItem('special-cleaning-theme') || 'dark';
			if (savedTheme === 'light') {
				document.documentElement.classList.add('light-theme');
			}
		})();
	</script>
	<style>
		:root {
			--primary: #28a745;
			--bg: #000;
			--surface: #111;
			--text-main: #fff;
			--text-sub: #ccc;
			--text-dark: #888;
			--border: #333;
			--danger: #dc3545;
			--warning: #ffc107;
			--info: #00c2ff;
		}

		.light-theme {
			--bg: #f8f9fa;
			--surface: #ffffff;
			--text-main: #111;
			--text-sub: #555;
			--text-dark: #888;
			--border: #dee2e6;
		}

		* {
			box-sizing: border-box;
			font-family: "Pretendard Variable", sans-serif;
			-webkit-tap-highlight-color: transparent;
			line-height: 1.6;
			letter-spacing: -0.025em;
		}

		body {
			margin: 0;
			padding: 0;
			background: #050505;
			color: var(--text-main);
			height: 100vh;
			overflow: hidden;
			display: flex;
			justify-content: center;
			transition: background-color 0.3s, color 0.3s;
		}

		.light-theme body {
			background-color: #f1f3f5;
		}

		#root {
			height: 100%;
			display: flex;
			flex-direction: column;
			width: 100%;
			background: var(--bg);
			position: relative;
		}

		.bg {
			flex: 1;
			overflow-y: auto;
			padding-bottom: 20px;
		}

		.padding {
			padding: 24px;
		}

		.header {
			padding: 50px 20px 20px;
			background: var(--surface);
			border-bottom: 1px solid var(--primary);
			display: flex;
			justify-content: space-between;
			align-items: center;
			position: sticky;
			top: 0;
			z-index: 10;
		}

		.headerTitle {
			font-weight: bold;
			font-size: 17px;
		}

		.backBtn,
		.homeBtn {
			cursor: pointer;
		}

		.card {
			background: var(--surface);
			padding: 24px;
			border-radius: 15px;
			border: 1px solid #222;
			margin-bottom: 20px;
			cursor: pointer;
			transition: background 0.2s;
		}

		.card:active {
			background: #1a1a1a;
		}

		.primaryBtn {
			width: 100%;
			padding: 18px;
			background: var(--primary);
			border: none;
			border-radius: 12px;
			color: #fff;
			font-weight: 800;
			cursor: pointer;
			font-size: 15px;
		}

		.nav {
			height: 75px;
			background: var(--surface);
			border-top: 1px solid #222;
			display: flex;
			justify-content: space-around;
			align-items: center;
			width: 100%;
			padding-bottom: env(safe-area-inset-bottom);
		}

		.nav-item {
			color: var(--text-dark);
			font-size: 11px;
			text-align: center;
			cursor: pointer;
		}

		.nav-item.active {
			color: var(--primary);
		}

		.menuCard {
			display: flex;
			justify-content: space-between;
			align-items: center;
			padding: 20px;
			background: var(--surface);
			border-radius: 12px;
			margin-bottom: 12px;
			cursor: pointer;
			font-size: 14px;
		}

		.status-pill {
			font-size: 10px;
			padding: 2px 8px;
			border-radius: 4px;
			font-weight: bold;
		}

		.status-ready {
			background: rgba(0, 194, 255, 0.1);
			color: var(--info);
			border: 1px solid var(--info);
		}

		.status-warn {
			background: rgba(255, 193, 7, 0.1);
			color: var(--warning);
			border: 1px solid var(--warning);
		}

		@media (min-width: 600px) {
			#root {
				max-width: 480px;
				border-left: 1px solid #333;
				border-right: 1px solid #333;
				box-shadow: 0 0 50px rgba(0, 0, 0, 0.5);
			}
		}
	</style>
</head>

<body>
	<div id="root"></div>

	<script>
		let state = {
			page: 'login',
			currentUser: { name: '이주무관', org: '광주광역시 서구청 (관공서)' },
			districts: [
				{ name: '치평동', risk: '상', activity: 88, lat: 40, lng: 30, trend: '급증' },
				{ name: '상무1동', risk: '중', activity: 45, lat: 60, lng: 50, trend: '보합' },
				{ name: '화정1동', risk: '상', activity: 72, lat: 20, lng: 70, trend: '상승' },
				{ name: '양동', risk: '하', activity: 15, lat: 80, lng: 20, trend: '하락' }
			],
			auditLogs: [
				{ id: 'L1', time: '14:20', action: '예산 승인', target: 'B-04 프로젝트', actor: '이주무관' },
				{ id: 'L2', time: '13:05', action: '가구 점검', target: '역삼동 123-4', actor: '관리시스템' }
			],
			departments: [
				'광주광역시 서구청', '서울특별시청', '부산광역시청', '대구광역시청', '인천광역시청', '대전광역시청', '울산광역시청', '세종특별자치시청'
			],
			aiRisk: { age: '', housing: '', items: [], requester: '', count: '' },
			receivedDocs: [
				{ id: 'D1', comp: '명품특수청소', type: '사업자등록증', status: '확인완료', date: '2026-04-26' },
				{ id: 'D2', comp: '명품특수청소', type: '작업완료보고서', status: '미확인', date: '2026-04-26' },
				{ id: 'D3', comp: '깨끗한세상', type: '전자세금계산서', status: '발행완료', date: '2026-04-25' }
			],
			vendors: [
				{ name: '명품특수청소', rating: 4.9, contracts: 42, badges: ['경찰청 표창', '수의계약 1위', '민원 0%'], verified: true },
				{ name: '클린솔루션', rating: 4.7, contracts: 28, badges: ['G2B 등록', '민원 0%'], verified: true },
				{ name: '광주특청', rating: 4.5, contracts: 15, badges: ['지역강소기업'], verified: true }
			],
			smartMatch: { area: '15', type: '고독사 현장', budget: '3,000,000' },
			archiveDocs: [
				{ id: 'A1', title: '2025년 하반기 관내 특수청소 통계 보고서', cat: '통계', date: '2025-12-30' },
				{ id: 'A2', title: '고독사 위험군 전수조사 결과 (서구)', cat: '복지', date: '2025-11-15' },
				{ id: 'A3', title: '2025년 행정안전부 우수사례 선정 자료', cat: '보고서', date: '2025-10-05' },
				{ id: 'A4', title: '긴급 위기 가구 지원 예산 집행 내역', cat: '예산', date: '2025-09-20' }
			],
			isGeneratingPackage: false,
			isAnalyzingAI: false,
			aiResult: null,
			heatmapPeriod: '3M',
			selectedDong: null,
			vendorSearch: '',
			archiveFilter: '전체',
			isPdfOpen: false,
			pdfContent: null
		};

		function updateHeatmapData(period) {
			state.heatmapPeriod = period;
			if (period === '1개월') {
				state.districts = [
					{ name: '치평동', risk: '상', activity: 92, lat: 40, lng: 30, trend: '급증' },
					{ name: '상무1동', risk: '중', activity: 50, lat: 60, lng: 50, trend: '상승' },
					{ name: '화정1동', risk: '상', activity: 75, lat: 20, lng: 70, trend: '상승' },
					{ name: '양동', risk: '하', activity: 20, lat: 80, lng: 20, trend: '하락' }
				];
			} else if (period === '3개월') {
				state.districts = [
					{ name: '치평동', risk: '상', activity: 88, lat: 40, lng: 30, trend: '급증' },
					{ name: '상무1동', risk: '중', activity: 45, lat: 60, lng: 50, trend: '보합' },
					{ name: '화정1동', risk: '상', activity: 72, lat: 20, lng: 70, trend: '상승' },
					{ name: '양동', risk: '하', activity: 15, lat: 80, lng: 20, trend: '하락' }
				];
			} else if (period === '6개월') {
				state.districts = [
					{ name: '치평동', risk: '상', activity: 75, lat: 40, lng: 30, trend: '상승' },
					{ name: '상무1동', risk: '중', activity: 40, lat: 60, lng: 50, trend: '보합' },
					{ name: '화정1동', risk: '상', activity: 68, lat: 20, lng: 70, trend: '상승' },
					{ name: '양동', risk: '하', activity: 25, lat: 80, lng: 20, trend: '하락' }
				];
			} else if (period === '1년') {
				state.districts = [
					{ name: '치평동', risk: '중', activity: 60, lat: 40, lng: 30, trend: '상승' },
					{ name: '상무1동', risk: '하', activity: 30, lat: 60, lng: 50, trend: '보합' },
					{ name: '화정1동', risk: '중', activity: 55, lat: 20, lng: 70, trend: '상승' },
					{ name: '양동', risk: '하', activity: 30, lat: 80, lng: 20, trend: '하락' }
				];
			}
			render();
		}

		function openPdfOverlay(title, type) {
			state.isPdfOpen = true;
			state.pdfContent = { title, type };
			render();
		}

		function closePdfOverlay() {
			state.isPdfOpen = false;
			state.pdfContent = null;
			render();
		}

		function setPage(p) { state.page = p; render(); if (document.querySelector('.bg')) document.querySelector('.bg').scrollTo(0, 0); }

		function render() {
			const root = document.getElementById('root');
			let hideNav = ['login', 'signup_choice', 'signup_gov', 'find_idpw'].includes(state.page);
			root.innerHTML = `
				${hideNav ? '' : renderHeader()}
				<div class="bg">${renderContent()}</div>
				${hideNav ? '' : renderNav()}
				${state.isPdfOpen ? renderPdfOverlay() : ''}
			`;
		}

		function renderPdfOverlay() {
			let innerContent = '';
			if (state.pdfContent.type === 'package') {
				innerContent = `
					<h3 style="text-align:center; border-bottom:2px solid #000; padding-bottom:10px;">행정 증빙 통합 패키지</h3>
					<div style="font-size:12px; margin-bottom:15px; text-align:right;">발급일: 2026-04-27<br>발급기관: 광주광역시 서구청</div>
					<div style="font-weight:bold; margin-bottom:5px;">1. 비교 견적서 (AI 자동 매칭 결과)</div>
					<table style="width:100%; border-collapse:collapse; margin-bottom:20px; font-size:11px; text-align:center;">
						<tr style="background:#eee; font-weight:bold;">
							<td style="border:1px solid #999; padding:5px;">업체명</td>
							<td style="border:1px solid #999; padding:5px;">견적금액</td>
							<td style="border:1px solid #999; padding:5px;">선정결과</td>
						</tr>
						<tr>
							<td style="border:1px solid #999; padding:5px;">명품특수청소</td>
							<td style="border:1px solid #999; padding:5px;">1,500,000원</td>
							<td style="border:1px solid #999; padding:5px; color:red; font-weight:bold;">최종선정</td>
						</tr>
						<tr>
							<td style="border:1px solid #999; padding:5px;">클린솔루션</td>
							<td style="border:1px solid #999; padding:5px;">1,650,000원</td>
							<td style="border:1px solid #999; padding:5px;">-</td>
						</tr>
					</table>
					<div style="font-weight:bold; margin-bottom:5px;">2. 작업 전/후 현장 GPS 증빙</div>
					<div style="display:flex; gap:10px; margin-bottom:20px;">
						<div style="flex:1; background:#ddd; height:80px; display:flex; align-items:center; justify-content:center; font-size:10px;">[작업 전 GPS 사진]</div>
						<div style="flex:1; background:#ddd; height:80px; display:flex; align-items:center; justify-content:center; font-size:10px;">[작업 후 GPS 사진]</div>
					</div>
					<div style="text-align:center; color:red; border:1px solid red; padding:5px; font-weight:bold;">위 증명서는 위변조가 불가능한 시스템으로 자동 생성되었음을 인증합니다.</div>
				`;
			} else {
				innerContent = `
					<h3 style="text-align:center; border-bottom:2px solid #000; padding-bottom:10px;">${state.pdfContent.title}</h3>
					<div style="font-size:12px; margin-bottom:15px;">이 문서는 특청 관공서 포털 아카이브에서 제공하는 열람용 사본입니다. 본 문서의 무단 복제 및 배포를 금합니다.</div>
					<div style="background:#eee; padding:15px; min-height:250px; font-size:12px; line-height:1.6; text-align:justify;">
						[대외비]<br><br>
						본 보고서는 관내 발생한 특수 청소 및 고립 가구 사례의 종합적인 분석 결과를 담고 있습니다. 해당 데이터는 AI 기반 위험 가구 예측 모델에 활용되며, 각 동별 복지 예산 편성에 기초 자료로 제공됩니다.<br><br>
						...<br>
						(실제 데이터 연동 시 상세 내용이 이곳에 표시됩니다)
					</div>
				`;
			}

			return `
				<div style="position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:100; display:flex; align-items:center; justify-content:center; padding:20px;">
					<div style="background:#fff; color:#000; width:100%; max-width:400px; max-height:90vh; border-radius:10px; display:flex; flex-direction:column; overflow:hidden;">
						<div style="background:#333; color:#fff; padding:15px; display:flex; justify-content:space-between; align-items:center;">
							<div style="font-weight:bold; font-size:14px;">PDF 문서 뷰어</div>
							<div style="cursor:pointer; font-weight:bold; font-size:18px;" onclick="closePdfOverlay()">✕</div>
						</div>
						<div style="padding:20px; flex:1; overflow-y:auto;">
							${innerContent}
						</div>
					</div>
				</div>
			`;
		}

		function renderHeader() {
			return `
				<div class="header">
					<div class="backBtn" onclick="setPage('dash')">←</div>
					<div class="headerTitle">${getHeaderTitle()}</div>
					<div style="cursor:pointer; font-size:18px;" onclick="toggleTheme()">🌓</div>
				</div>
			`;
		}

		function getHeaderTitle() {
			switch (state.page) {
				case 'dash': return '행정 마스터 포털';
				case 'docs_manage': return '행정 증빙 통합 시스템';
				case 'vendor_db': return '인증 파트너 통합 DB';
				case 'smart_matching': return 'AI 스마트 매칭';
				case 'stats': return '고립 지수 히트맵';
				case 'archive': return '행정 데이터 아카이브';
				case 'ai_analysis': return 'AI 지능형 위험 분석';
				default: return '행정 관리';
			}
		}

		function renderNav() {
			return `
				<div class="nav">
					<div class="nav-item ${state.page === 'dash' ? 'active' : ''}" onclick="setPage('dash')"><div>🏠</div>홈</div>
					<div class="nav-item ${state.page === 'stats' ? 'active' : ''}" onclick="setPage('stats')"><div>📊</div>히트맵</div>
					<div class="nav-item ${state.page === 'docs_manage' ? 'active' : ''}" onclick="setPage('docs_manage')"><div>🛡️</div>증빙</div>
					<div class="nav-item ${state.page === 'archive' ? 'active' : ''}" onclick="setPage('archive')"><div>📂</div>아카이브</div>
				</div>
			`;
		}

		function renderContent() {
			switch (state.page) {
				case 'login': return renderLogin();
				case 'signup_choice': return renderSignupChoice();
				case 'signup_gov': return renderSignupGov();
				case 'ai_analysis': return renderAIAnalysis();
				case 'docs_manage': return renderDocsManage();
				case 'vendor_db': return renderVendorDB();
				case 'smart_matching': return renderSmartMatching();
				case 'stats': return renderHeatmap();
				case 'archive': return renderArchive();
				case 'dash': return renderDash();
				default: return ``;
			}
		}

		function renderDash() {
			return `
				<div class="padding">
					<div style="margin-bottom:30px;">
						<div style="font-size:13px; color:var(--text-sub);">${state.currentUser.org}</div>
						<div style="font-size:22px; font-weight:800; margin-top:8px;">행정 마스터 포털</div>
					</div>

					<div class="card" style="background:rgba(220,53,69,0.1); border-left: 4px solid var(--danger);" onclick="setPage('stats')">
						<div style="font-size:12px; color:var(--danger); font-weight:bold; margin-bottom:8px;">실시간 긴급 경보</div>
						<div style="font-size:15px; font-weight:bold; line-height:1.5;">광주 서구 치평동 고독사 위험 지수 급증 (88%)</div>
						<div style="margin-top:10px; font-size:12px; text-decoration:underline; color:var(--danger);">히트맵 상세 분석 확인 ❯</div>
					</div>

					<div style="display:grid; grid-template-columns: 1fr 1fr; gap:15px; margin-top:25px;">
						<div class="card" onclick="setPage('smart_matching')" style="margin-bottom:0; text-align:center; border-color:var(--primary); background:rgba(40,167,69,0.05);">
							<div style="font-size:24px; margin-bottom:8px;">⚡</div>
							<div style="font-size:13px; font-weight:bold;">스마트 매칭</div>
						</div>
						<div class="card" onclick="setPage('docs_manage')" style="margin-bottom:0; text-align:center; border-color:var(--info);">
							<div style="font-size:24px; margin-bottom:8px;">🛡️</div>
							<div style="font-size:13px; font-weight:bold;">행정 증빙 통합</div>
						</div>
					</div>

					<div style="font-weight:bold; margin-top:35px; margin-bottom:15px; font-size:16px;">행정 특화 메뉴</div>
					<div class="menuCard" onclick="setPage('vendor_db')"><span>🔍 인증 파트너 통합 DB</span><span>❯</span></div>
					<div class="menuCard" onclick="setPage('ai_analysis')"><span>🤖 AI 위험가구 지능형 분석</span><span>❯</span></div>
					<div class="menuCard" onclick="setPage('archive')"><span>📂 행정 데이터 아카이브</span><span>❯</span></div>
					<div class="menuCard" onclick="setPage('stats')"><span>🗺️ 지역별 고립 지수 히트맵</span><span>❯</span></div>
				</div>
			`;
		}

		function renderHeatmap() {
			return `
				<div class="padding">
					<div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
						<h2 style="margin:0;">관내 고립 위험 지수</h2>
						<div style="display:flex; gap:5px; overflow-x:auto; padding-bottom:5px;">
							${['1개월', '3개월', '6개월', '1년'].map(p => `
								<button style="font-size:10px; background:${state.heatmapPeriod === p ? 'var(--primary)' : 'var(--surface)'}; border:1px solid var(--border); padding:5px 8px; border-radius:5px; color:${state.heatmapPeriod === p ? '#000' : '#fff'}; flex-shrink:0;" onclick="updateHeatmapData('${p}')">${p}</button>
							`).join('')}
							<button style="font-size:10px; background:var(--surface); border:1px solid var(--border); padding:5px 8px; border-radius:5px; color:#fff; flex-shrink:0;" onclick="alert('기간 선택 달력이 오픈됩니다.')">기간선택 ❯</button>
						</div>
					</div>
					
					${state.selectedDong ? renderDongDetail() : `
						<div class="card" style="height:320px; position:relative; overflow:hidden; background:#000; border:1px solid #333;">
							<div style="position:absolute; inset:0; opacity:0.15; background: radial-gradient(circle, var(--primary) 1px, transparent 1px); background-size: 20px 20px;"></div>
							<div style="position:absolute; top:30%; left:40%; width:100px; height:100px; background:radial-gradient(circle, rgba(229,9,20,0.3) 0%, transparent 70%);"></div>
							<div style="position:absolute; top:60%; left:20%; width:120px; height:120px; background:radial-gradient(circle, rgba(229,9,20,0.5) 0%, transparent 70%);"></div>
							<div style="position:absolute; inset:0; display:flex; align-items:center; justify-content:center;">
								<div style="font-size:12px; color:var(--text-dark); font-weight:bold;">[광주광역시 서구 전체 히트맵]</div>
							</div>
						</div>
						<div style="font-weight:bold; margin-bottom:15px; font-size:15px;">동별 상세 위험도 (최근 ${state.heatmapPeriod})</div>
						<div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
							${state.districts.map(d => `
								<div class="card" style="margin-bottom:0; padding:15px;" onclick="state.selectedDong='${d.name}'; render();">
									<div style="display:flex; justify-content:space-between; margin-bottom:8px;">
										<b style="font-size:14px;">${d.name}</b>
										<span style="font-size:11px; color:var(--danger); font-weight:bold;">${d.activity}% ${d.trend==='급증'?'↑':''}</span>
									</div>
									<div style="width:100%; height:4px; background:#222; border-radius:2px; overflow:hidden;">
										<div style="width:${d.activity}%; height:100%; background:${d.activity > 70 ? 'var(--danger)' : 'var(--primary)'};"></div>
									</div>
								</div>
							`).join('')}
						</div>
					`}
				</div>
			`;
		}

		function renderDongDetail() {
			return `
				<div>
					<div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
						<div onclick="state.selectedDong=null; render();" style="cursor:pointer; color:var(--primary); font-size:13px;">← 전체 지도보기</div>
						<b style="font-size:18px; color:var(--primary);">${state.selectedDong} 상세</b>
					</div>
					<div class="card" style="height:300px; position:relative; background:#111; overflow:hidden; border:2px solid var(--primary);">
						<div style="position:absolute; inset:0; opacity:0.3; background-image: radial-gradient(#333 1px, transparent 1px); background-size: 20px 20px;"></div>
						<div style="position:absolute; top:30%; left:45%;" class="blinking-hotspot"><div style="position:absolute; top:-20px; left:-10px; font-size:10px; color:#fff; white-space:nowrap; font-weight:bold; text-shadow: 1px 1px 2px #000;">${state.selectedDong} 1구역</div></div>
						<div style="position:absolute; top:65%; left:30%;" class="blinking-hotspot"><div style="position:absolute; top:-20px; left:-10px; font-size:10px; color:#fff; white-space:nowrap; font-weight:bold; text-shadow: 1px 1px 2px #000;">${state.selectedDong} 2구역</div></div>
						<div style="position:absolute; top:50%; left:75%;" class="blinking-hotspot"><div style="position:absolute; top:-20px; left:-10px; font-size:10px; color:#fff; white-space:nowrap; font-weight:bold; text-shadow: 1px 1px 2px #000;">${state.selectedDong} 3구역</div></div>
						<div style="position:absolute; inset:0; display:flex; align-items:center; justify-content:center; pointer-events:none;">
							<div style="font-size:12px; font-weight:bold; color:var(--text-dark); background:rgba(0,0,0,0.5); padding:5px 10px; border-radius:5px;">${state.selectedDong} 관내 정밀 위험 분포</div>
						</div>
					</div>
					<div class="card" style="padding:15px; border-left:4px solid var(--danger);">
						<div style="font-size:13px; font-weight:bold; margin-bottom:8px;">🚨 AI 정밀 분석 특이사항</div>
						<div style="font-size:11px; color:var(--text-sub); line-height:1.6;">
							현재 ${state.selectedDong} 내 저층 빌라 밀집 구역에서 '장기 미수령 우편물' 및 '전력 사용량 급감' 사례가 다수 감지되었습니다. 즉시 방문 현장 점검이 권고됩니다.
						</div>
					</div>
				</div>
				<style>
					.blinking-hotspot {
						width: 25px; height: 25px;
						background: var(--danger);
						border-radius: 50%;
						box-shadow: 0 0 0 rgba(229,9,20, 0.4);
						animation: pulse-red 1.5s infinite;
					}
					@keyframes pulse-red {
						0% { box-shadow: 0 0 0 0 rgba(229,9,20, 0.7); }
						70% { box-shadow: 0 0 0 20px rgba(229,9,20, 0); }
						100% { box-shadow: 0 0 0 0 rgba(229,9,20, 0); }
					}
				</style>
			`;
		}

		function renderDocsManage() {
			return `
				<div class="padding">
					<h2 style="margin-bottom:10px;">행정 증빙 통합 시스템</h2>
					<p style="font-size:13px; color:var(--text-sub); margin-bottom:30px;">감사 대응 및 투명한 행정 집행을 위한 원스톱 솔루션</p>

					<div style="font-weight:bold; margin-bottom:15px; font-size:14px; color:var(--text-dark);">수신된 업체 증빙 (실시간)</div>
					${state.receivedDocs.map(d => `
						<div class="card" style="padding:18px; display:flex; justify-content:space-between; align-items:center; margin-bottom:10px; border-left:4px solid ${d.status==='확인완료' ? 'var(--primary)' : 'var(--warning)'}">
							<div style="display:flex; align-items:center; gap:12px;">
								<div style="font-size:22px;">${d.type.includes('보고서') ? '📊' : d.type.includes('계산서') ? '💳' : '📄'}</div>
								<div>
									<div style="font-weight:bold; font-size:14px;">${d.comp}</div>
									<div style="font-size:11px; color:var(--text-sub);">${d.type} (${d.date})</div>
								</div>
							</div>
							<div class="status-pill ${d.status==='확인완료' ? 'status-ready' : 'status-warn'}">${d.status}</div>
						</div>
					`).join('')}

					<div class="card" style="background:linear-gradient(135deg, #111, #1a1a1a); border:1px solid var(--info); margin-top:25px; position:relative; overflow:hidden;">
						<div style="font-weight:bold; margin-bottom:15px; font-size:16px; color:var(--info);">🛡️ 원클릭 감사 증빙 패키지 생성</div>
						<div style="font-size:12px; color:var(--text-sub); display:flex; flex-direction:column; gap:8px; margin-bottom:20px;">
							<span>• 비교 견적서 3부 (AI 자동 생성)</span>
							<span>• GPS/타임스탬프 기반 현장 사진</span>
							<span>• 폐기물 처리 영수증 및 계량표</span>
						</div>
						
						${state.isGeneratingPackage ? `
							<div style="text-align:center; padding:20px;">
								<div style="width:30px; height:30px; border:3px solid var(--info); border-top-color:transparent; border-radius:50%; animation: spin 1s linear infinite; margin:0 auto 10px;"></div>
								<div style="font-size:12px; color:var(--info);">증빙 패키지 생성 중...</div>
							</div>
						` : `
							<button class="primaryBtn" style="background:var(--info);" onclick="generateAdminPackage()">전체 행정 증빙 패키지 다운로드 (Zip)</button>
						`}
					</div>
					<div style="height:30px"></div>
				</div>
				<style>@keyframes spin { to { transform: rotate(360deg); } }</style>
			`;
		}

		function generateAdminPackage() {
			state.isGeneratingPackage = true; render();
			setTimeout(() => {
				state.isGeneratingPackage = false; render();
				openPdfOverlay('행정 증빙 통합 패키지', 'package');
			}, 1500);
		}

		function renderArchive() {
			const cats = ['전체', '통계', '복지', '보고서', '예산'];
			const filtered = state.archiveDocs.filter(d => state.archiveFilter === '전체' || d.cat === state.archiveFilter);
			return `
				<div class="padding">
					<h2 style="margin-bottom:10px;">행정 데이터 아카이브</h2>
					<div style="display:flex; gap:8px; overflow-x:auto; margin-bottom:20px; padding-bottom:10px;">
						${cats.map(c => `
							<span style="flex-shrink:0; font-size:12px; background:${state.archiveFilter === c ? 'var(--primary)' : '#222'}; color:${state.archiveFilter === c ? '#000' : '#888'}; padding:6px 12px; border-radius:20px; cursor:pointer;" onclick="state.archiveFilter='${c}'; render();">${c}</span>
						`).join('')}
					</div>
					${filtered.map(d => `
						<div class="card" style="padding:20px; margin-bottom:12px; display:flex; justify-content:space-between; align-items:center;" onclick="openPdfOverlay('${d.title}', 'archive')">
							<div>
								<div style="font-size:11px; color:var(--primary); margin-bottom:4px;">[${d.cat}]</div>
								<div style="font-size:14px; font-weight:bold;">${d.title}</div>
								<div style="font-size:11px; color:var(--text-dark); margin-top:4px;">${d.date} • PDF</div>
							</div>
							<div style="font-size:20px; opacity:0.5;">📄</div>
						</div>
					`).join('')}
				</div>
			`;
		}

		function renderVendorDB() {
			const filteredVendors = state.vendors.filter(v => v.name.includes(state.vendorSearch));
			return `
				<div class="padding">
					<h2 style="margin-bottom:10px;">인증 파트너 통합 DB</h2>
					<input type="text" placeholder="업체명 또는 지역 검색..." style="width:100%; background:var(--surface); border:1px solid var(--border); padding:15px; color:#fff; border-radius:10px; margin-bottom:20px; outline:none;" oninput="state.vendorSearch=this.value; render();" value="${state.vendorSearch}">
					${filteredVendors.map(v => `
						<div class="card" style="padding:20px; margin-bottom:15px;">
							<div style="display:flex; justify-content:space-between; margin-bottom:10px;">
								<b style="font-size:16px;">${v.name}</b>
								<div class="status-pill status-ready">행정인증 완료</div>
							</div>
							<div style="font-size:12px; color:var(--text-sub); margin-bottom:10px;">평점: ⭐ ${v.rating} | 관내 누적 계약: ${v.contracts}건</div>
							<div style="display:flex; gap:5px; flex-wrap:wrap; margin-bottom:15px;">
								${v.badges.map(b => `<span style="font-size:10px; background:#222; padding:3px 6px; border-radius:4px; color:var(--text-dark); border:1px solid #333;">${b}</span>`).join('')}
							</div>
							<div style="border-top:1px dashed #333; padding-top:10px; font-size:11px; color:var(--text-dark);">
								<b>주요 이력:</b> 최근 3개월 내 고독사 현장 12건 성공적 처리<br>
								<b>보유 장비:</b> 오존발생기 3대, Level D 방호복 자체 수급<br>
								<b>행정 평가:</b> 서류 제출 기한 준수율 100%
							</div>
							<button class="primaryBtn" style="margin-top:15px; height:40px; font-size:13px; background:var(--surface-light); border:1px solid var(--primary); color:var(--primary);" onclick="alert('${v.name}의 상세 행정 이력 조회 페이지로 이동합니다.')">행정 이력 상세 조회</button>
						</div>
					`).join('')}
				</div>
			`;
		}

		function renderAIAnalysis() {
			if (state.isAnalyzingAI) {
				return `
					<div class="padding" style="display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:60vh;">
						<div style="width:60px; height:60px; border:4px solid var(--primary); border-top-color:transparent; border-radius:50%; animation: spin 1s linear infinite; margin-bottom:20px;"></div>
						<h2 style="margin-bottom:10px;">AI 지표 분석 중...</h2>
					</div>
				`;
			}
			return `
				<div class="padding">
					<h2 style="margin-bottom:10px;">AI 지능형 분석</h2>
					<div class="card" style="padding:20px;">
						<div class="label" style="font-size:12px; color:var(--text-dark); margin-bottom:8px;">주거 유형</div>
						<select class="input" style="width:100%; padding:15px; background:var(--bg); border:1px solid var(--border); color:#fff; border-radius:10px; margin-bottom:20px;" onchange="state.aiRisk.housing=this.value">
							<option>유형 선택</option>
							<option value="고시원">고시원/쪽방</option>
							<option value="반지하">반지하</option>
							<option value="영구임대">영구임대</option>
						</select>
						<div class="label" style="font-size:12px; color:var(--text-dark); margin-bottom:8px;">관찰 지표</div>
						<div style="display:grid; grid-template-columns: 1fr 1fr; gap:8px;">
							${['우편물적체', '악취발생', '연락두절', '전력급감'].map(i => `
								<div style="padding:10px; border:1px solid ${state.aiRisk.items.includes(i)?'var(--primary)':'var(--border)'}; border-radius:8px; font-size:11px; text-align:center; cursor:pointer;" onclick="if(state.aiRisk.items.includes('${i}')) state.aiRisk.items=state.aiRisk.items.filter(x=>x!=='${i}'); else state.aiRisk.items.push('${i}'); render();">${i}</div>
							`).join('')}
						</div>
						<button class="primaryBtn" style="margin-top:25px;" onclick="startAIAnalysis()">위험 지수 분석</button>
					</div>
				</div>
			`;
		}

		function startAIAnalysis() {
			state.isAnalyzingAI = true; render();
			setTimeout(() => {
				state.isAnalyzingAI = false;
				state.aiResult = { score: 92, level: '긴급 위기', recommendations: ['긴급 생계 지원 연계', '동주민센터 전담 배치', '특수청소 전문가 개입'] };
				render();
				alert('AI 분석 결과: 92% (긴급 위기). 복지 시스템으로 권고 조치가 전송되었습니다.');
			}, 2000);
		}

		function renderLogin() {
			return `<div class="padding" style="display:flex; flex-direction:column; justify-content:center; min-height:100vh;">
				<div style="text-align:center; margin-bottom:40px;">
					<div style="font-size:40px; font-weight:900; color:var(--primary); margin-bottom:10px;">특청 행정</div>
					<div style="font-size:14px; color:var(--text-sub);">관공서 전용 관리 포털</div>
				</div>
				<input type="text" placeholder="행정망 아이디" style="width:100%; padding:18px; background:var(--bg); border:1px solid var(--border); border-radius:12px; color:#fff; margin-bottom:15px;">
				<input type="password" placeholder="비밀번호" style="width:100%; padding:18px; background:var(--bg); border:1px solid var(--border); border-radius:12px; color:#fff; margin-bottom:20px;">
				<button class="primaryBtn" onclick="setPage('dash')">행정 시스템 로그인</button>
			</div>`;
		}

		function renderSmartMatching() { return `<div class="padding"><h2>AI 스마트 매칭</h2></div>`; }
		function renderSignupChoice() { return `<div class="padding"><h2>회원가입</h2></div>`; }
		function renderSignupGov() { return `<div class="padding"><h2>정보 입력</h2></div>`; }
		function renderFindIDPW() { return `<div class="padding"><h2>계정 찾기</h2></div>`; }
		function toggleTheme() {
			const isLight = document.documentElement.classList.toggle('light-theme');
			localStorage.setItem('special-cleaning-theme', isLight ? 'light' : 'dark');
		}

		window.onload = render;
	</script>
</body>
</html>
