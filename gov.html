<!DOCTYPE html>
<html lang="ko">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>특청 관공서 포털 - 행정 관리 시스템</title>
	<link rel="stylesheet" as="style" crossorigin
		href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
	<script>
		(function () {
			const savedTheme = localStorage.getItem('special-cleaning-theme') || 'dark';
			if (savedTheme === 'light') {
				document.documentElement.classList.add('light-theme');
			}
		})();
	</script>
	<style>
		:root {
			--primary: #28a745;
			--bg: #000;
			--surface: #111;
			--text-main: #fff;
			--text-sub: #ccc;
			/* Improved from #aaa */
			--text-dark: #888;
			/* Improved from #666 */
			--border: #333;
			--danger: #dc3545;
			--warning: #ffc107;
			--info: #00c2ff;
		}

		.light-theme {
			--bg: #f8f9fa;
			--surface: #ffffff;
			--text-main: #111;
			--text-sub: #555;
			--text-dark: #888;
			--border: #dee2e6;
		}

		* {
			box-sizing: border-box;
			font-family: "Pretendard Variable", sans-serif;
			-webkit-tap-highlight-color: transparent;
			line-height: 1.6;
			letter-spacing: -0.025em;
		}

		body {
			margin: 0;
			padding: 0;
			background: #050505;
			color: var(--text-main);
			height: 100vh;
			overflow: hidden;
			display: flex;
			justify-content: center;
			transition: background-color 0.3s, color 0.3s;
		}

		.light-theme body {
			background-color: #f1f3f5;
		}

		#root {
			height: 100%;
			display: flex;
			flex-direction: column;
			width: 100%;
			background: var(--bg);
			position: relative;
		}

		.bg {
			flex: 1;
			overflow-y: auto;
			padding-bottom: 20px;
		}

		.padding {
			padding: 24px;
		}

		.header {
			padding: 50px 20px 20px;
			background: var(--surface);
			border-bottom: 1px solid var(--primary);
			display: flex;
			justify-content: space-between;
			align-items: center;
			position: sticky;
			top: 0;
			z-index: 10;
		}

		.headerTitle {
			font-weight: bold;
			font-size: 17px;
		}

		.backBtn,
		.homeBtn {
			cursor: pointer;
		}

		.card {
			background: var(--surface);
			padding: 24px;
			border-radius: 15px;
			border: 1px solid #222;
			margin-bottom: 20px;
			cursor: pointer;
			transition: background 0.2s;
		}

		.card:active {
			background: #1a1a1a;
		}

		.primaryBtn {
			width: 100%;
			padding: 18px;
			background: var(--primary);
			border: none;
			border-radius: 12px;
			color: #fff;
			font-weight: 800;
			cursor: pointer;
			font-size: 15px;
		}

		.nav {
			height: 75px;
			background: var(--surface);
			border-top: 1px solid #222;
			display: flex;
			justify-content: space-around;
			align-items: center;
			width: 100%;
			padding-bottom: env(safe-area-inset-bottom);
		}

		.nav-item {
			color: var(--text-dark);
			font-size: 11px;
			text-align: center;
			cursor: pointer;
		}

		.nav-item.active {
			color: var(--primary);
		}

		.menuCard {
			display: flex;
			justify-content: space-between;
			align-items: center;
			padding: 20px;
			background: var(--surface);
			border-radius: 12px;
			margin-bottom: 12px;
			cursor: pointer;
			font-size: 14px;
		}

		.status-pill {
			font-size: 10px;
			padding: 2px 8px;
			border-radius: 4px;
			font-weight: bold;
		}

		.status-ready {
			background: rgba(0, 194, 255, 0.1);
			color: var(--info);
			border: 1px solid var(--info);
		}

		.status-warn {
			background: rgba(255, 193, 7, 0.1);
			color: var(--warning);
			border: 1px solid var(--warning);
		}

		@media (min-width: 600px) {
			#root {
				max-width: 480px;
				border-left: 1px solid #333;
				border-right: 1px solid #333;
				box-shadow: 0 0 50px rgba(0, 0, 0, 0.5);
			}
		}
	</style>
</head>

<body>
	<div id="root"></div>

	<script>
		let state = {
			page: 'login', // Default to login
			currentUser: { name: '이주무관', org: '광주광역시 서구청 (관공서)' },
			districts: [
				{ name: '역삼1동', risk: '상', activity: 85 },
				{ name: '역삼2동', risk: '중', activity: 40 },
				{ name: '도곡동', risk: '하', activity: 12 }
			],
			auditLogs: [
				{ id: 'L1', time: '14:20', action: '예산 승인', target: 'B-04 프로젝트', actor: '이주무관' },
				{ id: 'L2', time: '13:05', action: '가구 점검', target: '역삼동 123-4', actor: '관리시스템' }
			],
			departments: [
				'기획재정부', '교육부', '과학기술정보통신부', '외교부', '통일부', '법무부', '국방부', '행정안전부', '문화체육관광부', '농림축산식품부', '산업통상자원부', '보건복지부', '환경부', '고용노동부', '여성가족부', '국토교통부', '해양수산부', '중소벤처기업부',
				'서울특별시', '부산광역시', '대구광역시', '인천광역시', '광주광역시', '대전광역시', '울산광역시', '세종특별자치시', '경기도', '강원도', '충청북도', '충청남도', '전라북도', '전라남도', '경상북도', '경상남도', '제주특별자치도'
			],
			aiRisk: {
				age: '', housing: '', items: [], requester: '', count: ''
			},
			receivedDocs: [
				{ id: 'D1', comp: '명품특수청소', type: '사업자등록증', status: '확인완료', date: '2026-04-26' },
				{ id: 'D2', comp: '명품특수청소', type: '작업완료보고서', status: '미확인', date: '2026-04-26' },
				{ id: 'D3', comp: '깨끗한세상', type: '전자세금계산서', status: '발행완료', date: '2026-04-25' }
			]
		};

		function setPage(p) { state.page = p; render(); if (document.querySelector('.bg')) document.querySelector('.bg').scrollTo(0, 0); }

		function render() {
			const root = document.getElementById('root');
			let noHeader = ['login', 'signup_choice', 'signup_gov', 'find_idpw'].includes(state.page);
			let hideNav = ['login', 'signup_choice', 'signup_gov', 'find_idpw', 'broadcast', 'archive', 'stats', 'ai_analysis', 'docs_manage'].includes(state.page);

			root.innerHTML = `
				${noHeader ? '' : renderHeader(hideNav)}
				<div class="bg">${renderContent()}</div>
				${hideNav ? '' : renderNav()}
			`;
		}

		function renderHeader(isSub) {
			return `
				<div class="header">
					${isSub ? `<div class="backBtn" onclick="setPage('dash')">←</div>` : `<div onclick="location.href='index.html'" style="font-size:13px; border:1px solid #333; padding:6px 12px; border-radius:8px; cursor:pointer;">🏠 홈</div>`}
					<div class="headerTitle">${getHeaderTitle()}</div>
					<div style="cursor:pointer; font-size:18px;" onclick="toggleTheme()">🌓</div>
				</div>
			`;
		}

		function toggleTheme() {
			const isLight = document.documentElement.classList.toggle('light-theme');
			localStorage.setItem('special-cleaning-theme', isLight ? 'light' : 'dark');
		}

		function getHeaderTitle() {
			switch (state.page) {
				case 'dash': return '관공서 행정 통합관제';
				case 'stats': return '관내 고위험군 지수';
				case 'broadcast': return '긴급 행정 전파';
				case 'archive': return '행정 데이터 아카이브';
				case 'ai_analysis': return 'AI 위험가구 분석';
				case 'docs_manage': return '업체 서류 및 정산 관리';
				default: return '관공서 포털';
			}
		}

		function renderNav() {
			return `
				<div class="nav">
					<div class="nav-item ${state.page === 'dash' ? 'active' : ''}" onclick="setPage('dash')"><div>🏠</div>홈</div>
					<div class="nav-item ${state.page === 'stats' ? 'active' : ''}" onclick="setPage('stats')"><div>📊</div>관내지수</div>
					<div class="nav-item ${state.page === 'broadcast' ? 'active' : ''}" onclick="setPage('broadcast')"><div>📡</div>긴급전파</div>
					<div class="nav-item ${state.page === 'archive' ? 'active' : ''}" onclick="setPage('archive')"><div>📂</div>보관함</div>
				</div>
			`;
		}

		function renderContent() {
			switch (state.page) {
				case 'login': return renderLogin();
				case 'signup_choice': return renderSignupChoice();
				case 'signup_gov': return renderSignupGov();
				case 'find_idpw': return renderFindIDPW();
				case 'ai_analysis': return renderAIAnalysis();
				case 'docs_manage': return renderDocsManage();
				case 'dash': return `
					<div class="padding">
						<div style="margin-bottom:30px;">
							<div style="font-size:13px; color:var(--text-sub);">${state.currentUser.org}</div>
							<div style="font-size:22px; font-weight:800; margin-top:8px; letter-spacing:-0.03em;">관공서 행정 마스터 포털</div>
						</div>

						<div class="card" style="background:var(--surface-light); border-left: 4px solid var(--danger);">
							<div style="font-size:12px; color:var(--danger); font-weight:bold; margin-bottom:8px;">실시간 긴급 경보</div>
							<div style="font-size:15px; font-weight:bold; line-height:1.5;">관내 고위험군 가구 이상 활동 감지 (2건)</div>
							<button class="primaryBtn" style="margin-top:15px; padding:10px; font-size:12px; background:var(--danger);" onclick="setPage('broadcast')">현장 상황 전파 실행</button>
						</div>

						<div style="display:grid; grid-template-columns: 1fr 1fr; gap:15px; margin-top:25px;">
							<div class="card" onclick="setPage('ai_analysis')" style="margin-bottom:0; text-align:center; border-color:var(--info);">
								<div style="font-size:24px; margin-bottom:8px;">🤖</div>
								<div style="font-size:13px; font-weight:bold;">AI 위험 분석</div>
							</div>
							<div class="card" onclick="setPage('docs_manage')" style="margin-bottom:0; text-align:center;">
								<div style="font-size:24px; margin-bottom:8px;">📄</div>
								<div style="font-size:13px; font-weight:bold;">서류/정산 관리</div>
							</div>
						</div>

						<div style="font-weight:bold; margin-top:35px; margin-bottom:15px; font-size:16px;">관공서 전용 메뉴</div>
						<div class="menuCard" onclick="setPage('broadcast')"><span>📡 긴급 행정 메시지 전합</span><span>❯</span></div>
						<div class="menuCard" onclick="setPage('stats')"><span>📊 지역별 맞춤 통계 리포트</span><span>❯</span></div>

						<div style="margin-top:25px;">
							<div style="font-weight:bold; margin-bottom:15px; font-size:14px; color:var(--text-dark);">최근 행정 처리 기록</div>
							${state.auditLogs.slice(0, 2).map(l => `
								<div style="display:flex; justify-content:space-between; font-size:12px; padding:10px 0; border-bottom:1px solid var(--border);">
									<span style="color:var(--text-sub);">${l.time}</span>
									<span style="font-weight:bold;">${l.action}</span>
									<span style="color:var(--text-dark);">${l.actor}</span>
								</div>
							`).join('')}
						</div>
						<div style="margin-top:40px; text-align:center; font-size:13px; color:var(--text-dark); text-decoration:underline; cursor:pointer;" onclick="setPage('login')">로그아웃</div>
					</div>
				`;
				case 'stats': return `
					<div class="padding">
						<div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:25px;">
							<h2 style="margin:0;">관내 위험 지수 분석</h2>
							<div style="font-size:12px; color:var(--text-sub);">2026.04.25 기준</div>
						</div>
						${state.districts.map(d => `
							<div class="card" style="cursor:default;">
								<div style="display:flex; justify-content:space-between; margin-bottom:12px;">
									<div style="font-weight:bold; font-size:16px;">${d.name}</div>
									<div class="status-pill ${d.risk === '상' ? 'status-warn' : ''}" style="color:${d.risk === '상' ? 'var(--danger)' : 'var(--success)'}">${d.risk} 위험</div>
								</div>
								<div style="height:8px; background:var(--bg); border-radius:4px; overflow:hidden; margin-bottom:10px; border:1px solid var(--border);">
									<div style="height:100%; background:var(--primary); width:${d.activity}%"></div>
								</div>
								<div style="display:flex; justify-content:space-between; font-size:11px; color:var(--text-dark);">
									<span>행정 대응 필요도: ${d.activity}%</span>
									<span>전월 대비 +${Math.floor(Math.random() * 10)}%</span>
								</div>
							</div>
						`).join('')}
					</div>
				`;
				case 'broadcast': return `
					<div class="padding">
						<h2 style="margin-bottom:15px;">긴급 행정 전파</h2>
						<p style="font-size:14px; color:var(--text-sub); line-height:1.6; margin-bottom:30px;">복지 사각지대 발생 등 긴급 작업 협조가 필요한 상황에만 사용해 주세요.<br>관내 등록된 모든 전문가에게 알림이 전송됩니다.</p>

						<div style="font-weight:bold; font-size:14px; margin-bottom:10px; color:var(--text-dark);">전파 대상 구역</div>
						<div style="display:flex; gap:10px; margin-bottom:25px;">
							<span class="status-pill status-ready">전체</span>
							<span class="status-pill" style="border:1px solid var(--border); color:var(--text-dark);">역삼동</span>
							<span class="status-pill" style="border:1px solid var(--border); color:var(--text-dark);">도곡동</span>
						</div>

						<div class="card" style="padding:10px;">
							<textarea style="width:100%; background:transparent; border:none; color:var(--text-main); padding:15px; font-size:14px; border-radius:12px; outline:none;" rows="6" placeholder="전파할 상세 내용을 입력하세요. (예: 고독사 의심 현장 확인 등)"></textarea>
						</div>
						<button class="primaryBtn" style="margin-top:20px; background:var(--danger);" onclick="alert('관중 전파 메시지가 전송되었습니다.')">즉시 전파 (관공서 긴급)</button>
					</div>
				`;
				case 'archive': return `
					<div class="padding">
						<h2 style="margin-bottom:25px;">행정 데이터 아카이브</h2>
						<div class="menuCard"><div><div style="font-size:10px; color:var(--text-dark);">2025-12-31</div><b>2025년 하반기 관내 작업 보고서</b></div><span>📥</span></div>
						<div class="menuCard"><div><div style="font-size:10px; color:var(--text-dark);">2025-06-30</div><b>2025년 상반기 복지 예산 집행 결산</b></div><span>📥</span></div>
						<div class="menuCard"><div><div style="font-size:10px; color:var(--text-dark);">2024-12-31</div><b>2024년 고독사 방지 기술 활용 백서</b></div><span>📥</span></div>
					</div>
				`;
			}
		}

		// --- Auth & Gov Flow ---

		function renderLogin() {
			return `
				<div class="padding" style="display:flex; flex-direction:column; justify-content:center; min-height:100vh;">
					<div style="text-align:center; margin-bottom:40px;">
						<div style="font-size:40px; font-weight:900; color:var(--primary); margin-bottom:10px;">특청 행정포털</div>
						<div style="font-size:14px; color:var(--text-sub);">공무원 전용 위기 가구 통합관리</div>
					</div>
					<input class="input" type="text" placeholder="공무원 아이디" style="border:1px solid var(--border); padding:16px; border-radius:10px; margin-bottom:16px; background-color:var(--bg); color:var(--text-main); width:100%;">
					<input class="input" type="password" placeholder="비밀번호" style="border:1px solid var(--border); padding:16px; border-radius:10px; margin-bottom:16px; background-color:var(--bg); color:var(--text-main); width:100%;">
					<button class="primaryBtn" style="margin-top:10px;" onclick="setPage('dash')">행정 시스템 로그인</button>
					
					<div style="display:flex; justify-content:center; gap:20px; margin-top:20px; font-size:13px; color:var(--text-dark);">
						<span onclick="setPage('find_idpw')" style="cursor:pointer;">계정 찾기</span>
						<span onclick="setPage('signup_choice')" style="cursor:pointer; color:var(--text-sub); font-weight:bold;">행정 계정 신청</span>
					</div>
					<div onclick="location.href='index.html'" style="text-align:center; margin-top:30px; font-size:13px; color:var(--text-dark); cursor:pointer;">홈으로 돌아가기</div>
				</div>
			`;
		}

		function renderSignupChoice() {
			return `
				<div class="padding" style="display:flex; flex-direction:column; justify-content:center; min-height:100vh;">
					<div onclick="setPage('login')" style="cursor:pointer; font-size:20px; margin-bottom:30px;">←</div>
					<h2 style="margin-bottom:10px;">관공서 회원가입</h2>
					<p style="color:var(--text-sub); font-size:14px; margin-bottom:40px;">소속 기관의 인증이 필요합니다.</p>
					<div class="card" onclick="setPage('signup_gov')" style="padding:30px; display:flex; align-items:center; gap:20px;">
						<div style="font-size:30px;">🏛️</div>
						<div>
							<div style="font-weight:bold; font-size:18px;">중앙부처/지자체 공무원</div>
							<div style="font-size:12px; color:var(--text-sub); margin-top:4px;">행정 권한 신청</div>
						</div>
					</div>
				</div>
			`;
		}

		function renderSignupGov() {
			return `
				<div class="padding" style="padding-top:60px;">
					<div onclick="setPage('signup_choice')" style="cursor:pointer; font-size:20px; margin-bottom:20px;">←</div>
					<h2 style="margin-bottom:30px;">행정 계정 정보 입력</h2>

					<div style="font-size:14px; color:var(--text-sub); margin-bottom:10px;">소속 기관 선택</div>
					<select class="input" style="border:1px solid var(--border); padding:16px; border-radius:10px; margin-bottom:20px; background-color:var(--bg); color:var(--text-main); width:100%; appearance:none;">
						${state.departments.map(d => `<option value="${d}">${d}</option>`).join('')}
					</select>

					<div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px; margin-bottom:20px;">
						<div>
							<div style="font-size:14px; color:var(--text-sub); margin-bottom:10px;">직급</div>
							<input class="input" type="text" placeholder="예: 주무관" style="border:1px solid var(--border); padding:16px; border-radius:10px; background-color:var(--bg); color:var(--text-main); width:100%;">
						</div>
						<div>
							<div style="font-size:14px; color:var(--text-sub); margin-bottom:10px;">직함</div>
							<input class="input" type="text" placeholder="예: 팀장" style="border:1px solid var(--border); padding:16px; border-radius:10px; background-color:var(--bg); color:var(--text-main); width:100%;">
						</div>
					</div>

					<div style="font-size:14px; color:var(--text-sub); margin-bottom:10px;">성함</div>
					<input class="input" type="text" placeholder="실명을 입력하세요" style="border:1px solid var(--border); padding:16px; border-radius:10px; margin-bottom:20px; background-color:var(--bg); color:var(--text-main); width:100%;">

					<div style="font-size:14px; color:var(--text-sub); margin-bottom:10px;">사원번호/공무원증 번호</div>
					<input class="input" type="text" placeholder="신원 확인용 번호" style="border:1px solid var(--border); padding:16px; border-radius:10px; margin-bottom:30px; background-color:var(--bg); color:var(--text-main); width:100%;">

					<button class="primaryBtn" onclick="alert('가입 승인 요청이 접수되었습니다. 기관 확인 후 승인됩니다.'); setPage('login');">가입 승인 요청</button>
					<div style="height:40px"></div>
				</div>
			`;
		}

		function renderAIAnalysis() {
			return `
				<div class="padding">
					<h2 style="margin-bottom:10px;">AI 위험가구 분석</h2>
					<p style="font-size:13px; color:var(--text-sub); margin-bottom:30px;">현장 데이터 기반으로 위험 지수를 산출합니다.</p>

					<div class="label" style="font-size:14px; color:var(--text-sub); margin-bottom:10px;">대상자 연령대</div>
					<div style="display:grid; grid-template-columns: 1fr 1fr 1fr; gap:10px; margin-bottom:20px;">
						<button class="status-pill" style="padding:10px; background:var(--surface); border:1px solid var(--border); color:#fff;" onclick="state.aiRisk.age='청년'">청년</button>
						<button class="status-pill" style="padding:10px; background:var(--surface); border:1px solid var(--border); color:#fff;" onclick="state.aiRisk.age='중장년'">중장년</button>
						<button class="status-pill" style="padding:10px; background:var(--surface); border:1px solid var(--border); color:#fff;" onclick="state.aiRisk.age='노년'">노년</button>
					</div>

					<div class="label" style="font-size:14px; color:var(--text-sub); margin-bottom:10px;">주거 환경</div>
					<select class="input" style="border:1px solid var(--border); padding:16px; border-radius:10px; margin-bottom:20px; background-color:var(--bg); color:var(--text-main); width:100%;">
						<option>고시원/단칸방</option>
						<option>반지하</option>
						<option>노후 빌라</option>
						<option>아파트</option>
					</select>

					<div class="label" style="font-size:14px; color:var(--text-sub); margin-bottom:10px;">현장 관찰 물건 (중복)</div>
					<div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px; margin-bottom:20px;">
						<div style="padding:10px; border:1px solid var(--border); border-radius:8px; font-size:12px; text-align:center;" onclick="this.style.background='var(--primary)'">공병/폐기물</div>
						<div style="padding:10px; border:1px solid var(--border); border-radius:8px; font-size:12px; text-align:center;" onclick="this.style.background='var(--primary)'">안읽은 우편물</div>
						<div style="padding:10px; border:1px solid var(--border); border-radius:8px; font-size:12px; text-align:center;" onclick="this.style.background='var(--primary)'">배달용기 적체</div>
						<div style="padding:10px; border:1px solid var(--border); border-radius:8px; font-size:12px; text-align:center;" onclick="this.style.background='var(--primary)'">악취/해충</div>
					</div>

					<div class="label" style="font-size:14px; color:var(--text-sub); margin-bottom:10px;">의뢰자</div>
					<select class="input" style="border:1px solid var(--border); padding:16px; border-radius:10px; margin-bottom:30px; background-color:var(--bg); color:var(--text-main); width:100%;">
						<option>본인</option>
						<option>이웃</option>
						<option>건물주</option>
						<option>가족</option>
					</select>

					<button class="primaryBtn" style="background:var(--info);" onclick="showRiskResult()">위험 지수 분석하기</button>
					<div id="risk_result" style="display:none; margin-top:30px; padding:20px; background:var(--surface); border-radius:15px; border:1px solid var(--info);">
						<div style="text-align:center; margin-bottom:20px;">
							<div style="font-size:14px; color:var(--text-sub);">AI 분석 위험 지수</div>
							<div style="font-size:36px; font-weight:900; color:var(--danger);">88% (고위험)</div>
						</div>
						<div style="font-weight:bold; margin-bottom:10px; font-size:14px;">권고 복지 솔루션:</div>
						<div style="font-size:13px; color:var(--text-sub); line-height:1.6;">
							- 긴급 생계 지원비 매칭 필요<br>
							- 주 2회 이상 방문 케어 서비스 등록<br>
							- 지역 사회보장 협의체 연계 필요
						</div>
					</div>
					<div style="height:40px"></div>
				</div>
			`;
		}

		function showRiskResult() {
			document.getElementById('risk_result').style.display = 'block';
			document.getElementById('risk_result').scrollIntoView({ behavior: 'smooth' });
		}

		function renderDocsManage() {
			return `
				<div class="padding">
					<h2 style="margin-bottom:10px;">서류 및 정산 관리</h2>
					<p style="font-size:13px; color:var(--text-sub); margin-bottom:30px;">업체로부터 자동 전송된 서류를 검토합니다.</p>

					<div style="font-weight:bold; margin-bottom:15px; font-size:14px;">수신된 서류함</div>
					${state.receivedDocs.map(d => `
						<div class="card" style="padding:15px; display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
							<div>
								<div style="font-size:11px; color:var(--text-dark);">${d.date}</div>
								<div style="font-weight:bold; font-size:14px;">${d.comp}</div>
								<div style="font-size:12px; color:var(--info);">${d.type}</div>
							</div>
							<div style="display:flex; gap:8px;">
								<button style="padding:5px 10px; background:#333; color:#fff; border:none; border-radius:5px; font-size:11px;" onclick="alert('서류 보기')">보기</button>
								<button style="padding:5px 10px; background:var(--primary); color:#fff; border:none; border-radius:5px; font-size:11px;" onclick="alert('홈택스 연동 전자세금계산서 발행 처리')">발행</button>
							</div>
						</div>
					`).join('')}

					<div style="margin-top:40px; padding:25px; background:var(--surface-light); border-radius:15px; text-align:center;">
						<div style="font-size:24px; margin-bottom:10px;">📑</div>
						<div style="font-weight:bold; margin-bottom:10px;">보고 문서 자동 생성</div>
						<div style="font-size:12px; color:var(--text-sub); line-height:1.6; margin-bottom:20px;">선택한 모든 서류를 취합하여 상급자 보고용 PDF 기안문을 생성합니다.</div>
						<button class="primaryBtn" style="background:#fff; color:#000;" onclick="alert('PDF 보고서가 생성되었습니다. 그룹웨어로 전송합니다.')">PDF 기안 생성</button>
					</div>
				</div>
			`;
		}

		function renderFindIDPW() {
			return `<div class="padding">계정 찾기 모듈 로딩 중...</div>`;
		}

		window.onload = render;
	</script>
</body>

</html>
