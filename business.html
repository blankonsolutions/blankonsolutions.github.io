<!DOCTYPE html>
<html lang="ko">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>특청 파트너 - 비즈니스 관리</title>
	<link rel="stylesheet" as="style" crossorigin
		href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
	<script>
		(function () {
			const savedTheme = localStorage.getItem('special-cleaning-theme') || 'dark';
			if (savedTheme === 'light') {
				document.documentElement.classList.add('light-theme');
			}
		})();
	</script>
	<style>
		:root {
			--primary: #c9a050;
			--bg: #000;
			--surface: #111;
			--surface-light: #1a1a1a;
			--surface-hover: #222;
			--text-main: #fff;
			--text-sub: #ccc;
			/* Improved from #aaa */
			--text-dark: #888;
			/* Improved from #666 */
			--border: #333;
			--success: #28a745;
			--danger: #dc3545;
		}

		.light-theme {
			--bg: #f8f9fa;
			--surface: #ffffff;
			--surface-light: #f1f3f5;
			--surface-hover: #e9ecef;
			--text-main: #111;
			--text-sub: #555;
			--text-dark: #888;
			--border: #dee2e6;
			--primary: #a67c00;
		}

		* {
			box-sizing: border-box;
			font-family: "Pretendard Variable", sans-serif;
			-webkit-tap-highlight-color: transparent;
			line-height: 1.6;
			letter-spacing: -0.025em;
		}

		body {
			margin: 0;
			padding: 0;
			background: #050505;
			color: var(--text-main);
			height: 100vh;
			overflow: hidden;
			display: flex;
			justify-content: center;
			transition: background-color 0.3s, color 0.3s;
		}

		.light-theme body {
			background-color: #f1f3f5;
		}

		#root {
			height: 100%;
			display: flex;
			flex-direction: column;
			width: 100%;
			background: var(--bg);
			position: relative;
		}

		.bg {
			flex: 1;
			overflow-y: auto;
			padding-bottom: 20px;
		}

		.padding {
			padding: 24px;
		}

		.header {
			padding: 50px 20px 20px;
			background: var(--surface);
			border-bottom: 1px solid var(--primary);
			display: flex;
			justify-content: space-between;
			align-items: center;
			position: sticky;
			top: 0;
			z-index: 10;
		}

		.headerTitle {
			font-weight: bold;
			font-size: 17px;
		}

		.backBtn,
		.homeBtn {
			cursor: pointer;
		}

		.card {
			background: var(--surface);
			padding: 24px;
			border-radius: 15px;
			border: 1px solid #222;
			margin-bottom: 20px;
			cursor: pointer;
			transition: background 0.2s;
		}

		.card:active {
			background: var(--surface-hover);
		}

		.primaryBtn {
			width: 100%;
			padding: 18px;
			background: var(--primary);
			border: none;
			border-radius: 12px;
			color: #000;
			font-weight: 800;
			cursor: pointer;
			font-size: 15px;
		}

		.chart-container {
			display: flex;
			align-items: flex-end;
			gap: 10px;
			height: 120px;
			margin-top: 25px;
			padding-bottom: 12px;
			border-bottom: 1px solid #333;
		}

		.chart-bar {
			flex: 1;
			background: var(--primary);
			border-radius: 4px 4px 0 0;
			position: relative;
			cursor: pointer;
		}

		.chart-bar:hover {
			opacity: 0.8;
		}

		.chart-bar::after {
			content: attr(data-label);
			position: absolute;
			bottom: -22px;
			left: 50%;
			transform: translateX(-50%);
			font-size: 10px;
			color: var(--text-dark);
		}

		.nav {
			height: 75px;
			background: var(--surface);
			border-top: 1px solid #222;
			display: flex;
			justify-content: space-around;
			align-items: center;
			width: 100%;
			padding-bottom: env(safe-area-inset-bottom);
		}

		.nav-item {
			color: var(--text-dark);
			font-size: 11px;
			text-align: center;
			cursor: pointer;
		}

		.nav-item.active {
			color: var(--primary);
		}

		.menuCard {
			display: flex;
			justify-content: space-between;
			align-items: center;
			padding: 20px;
			background: var(--surface);
			border-radius: 12px;
			margin-bottom: 12px;
			cursor: pointer;
			font-size: 14px;
		}

		.asset-row {
			display: flex;
			justify-content: space-between;
			padding: 15px 0;
			border-bottom: 1px solid #222;
		}

		@media (min-width: 600px) {
			#root {
				max-width: 480px;
				border-left: 1px solid #333;
				border-right: 1px solid #333;
				box-shadow: 0 0 50px rgba(0, 0, 0, 0.5);
			}
		}
	</style>
</head>

<body>
	<div id="root"></div>

	<script>
		let state = {
			page: 'login', // Default to login page
			isLoggedIn: false,
			isApproved: false,
			currentUser: { id: 'pro1', compName: '명품특수청소', name: '김대표', revenue: 15400000, rating: 4.9 },
			revenueData: [
				{ l: '월', v: 45 }, { l: '화', v: 30 }, { l: '수', v: 60 }, { l: '목', v: 85 }, { l: '금', v: 70 }, { l: '토', v: 95 }, { l: '일', v: 40 }
			],
			assets: [
				{ name: 'O3 오존발생기 (강력형)', status: '정상', stock: '2대' },
				{ name: '혈흔 분해 전용 효소 세제', status: '부족', stock: '2L' },
				{ name: '병원균 사멸 소독제 (20L)', status: '정상', stock: '20L' },
				{ name: '산업용 HEPA 청소기', status: '정상', stock: '1대' },
				{ name: ' Level D 전신 방호복', status: '정상', stock: '24벌' }
			],
			settlements: [
				{ id: 'S1', date: '2026-04-20', label: '역삼동 고독사 현장', amount: 2450000, status: '완료' },
				{ id: 'S2', date: '2026-04-15', label: '도곡동 화재 복구', amount: 4800000, status: '완료' }
			],
			posts: [
				{ id: 'c1', title: '고독사 현장 특수 약품 추천 부탁드립니다.', author: '정클린' },
				{ id: 'c2', title: '이번 달 광주 서구청 입찰 공고 보셨나요?', author: '특청매니저' }
			],
			messages: [
				{ id: 1, sender: 'customer', text: '방문 견적 가능할까요?', time: '오후 2:30', isMe: false },
				{ id: 2, sender: 'me', text: '네, 내일 오전 10시쯤 어떠신가요?', time: '오후 2:35', isMe: true }
			],
			categories: ['고독사', '자살', '쓰레기집', '강력범죄현장', '화재현장', '침수현장'],
			selectedCategories: [],
			uploadedDocs: []
		};

		function setPage(p, data = null) {
			state.page = p;
			if (data) state.selectedItem = data;
			render();
			if (document.querySelector('.bg')) document.querySelector('.bg').scrollTo(0, 0);
		}

		function render() {
			const root = document.getElementById('root');
			let noHeader = ['login', 'signup_choice', 'signup_business', 'find_idpw'].includes(state.page);
			let hideNav = ['login', 'signup_choice', 'signup_business', 'find_idpw', 'portfolio', 'assets', 'settlement', 'community', 'scorecard', 'partnership', 'analytics', 'upload_docs', 'chat'].includes(state.page);

			root.innerHTML = `
				${noHeader ? '' : renderHeader(hideNav)}
				<div class="bg">${renderContent()}</div>
				${hideNav ? '' : renderNav()}
			`;
		}

		function renderHeader(isSub) {
			return `
				<div class="header">
					${isSub ? `<div class="backBtn" onclick="setPage('dash')">←</div>` : `<div onclick="location.href='index.html'" style="font-size:13px; border:1px solid #333; padding:6px 12px; border-radius:8px; cursor:pointer;">🏠 홈</div>`}
					<div class="headerTitle">${getHeaderTitle()}</div>
					<div style="cursor:pointer; font-size:18px;" onclick="toggleTheme()">🌓</div>
				</div>
			`;
		}

		function toggleTheme() {
			const isLight = document.documentElement.classList.toggle('light-theme');
			localStorage.setItem('special-cleaning-theme', isLight ? 'light' : 'dark');
		}

		function getHeaderTitle() {
			switch (state.page) {
				case 'dash': return '파트너 지원센터';
				case 'community': return '프로 전용 커뮤니티';
				case 'scorecard': return '서비스 품질 진단';
				case 'partnership': return '파트너십 센터';
				case 'analytics': return '사업 데이터 분석';
				case 'assets': return '재고 및 자산 관리';
				case 'settlement': return '정산 내역 관리';
				case 'portfolio': return '포트폴리오 관리';
				case 'upload_docs': return '영업 서류 제출';
				case 'chat': return '고객 상담 (익명)';
				default: return '비즈니스';
			}
		}

		function renderNav() {
			return `
				<div class="nav">
					<div class="nav-item ${state.page === 'dash' ? 'active' : ''}" onclick="setPage('dash')"><div>🏠</div>홈</div>
					<div class="nav-item ${state.page === 'analytics' ? 'active' : ''}" onclick="setPage('analytics')"><div>📊</div>분석</div>
					<div class="nav-item ${state.page === 'community' ? 'active' : ''}" onclick="setPage('community')"><div>🤝</div>커뮤니티</div>
					<div class="nav-item" onclick="setPage('scorecard')"><div>⭐</div>등급</div>
				</div>
			`;
		}

		function renderContent() {
			switch (state.page) {
				case 'login': return renderLogin();
				case 'signup_choice': return renderSignupChoice();
				case 'signup_business': return renderSignupBusiness();
				case 'find_idpw': return renderFindIDPW();
				case 'upload_docs': return renderUploadDocs();
				case 'chat': return renderChat();
				case 'dash': return `
					<div class="padding">
						${!state.isApproved ? `
							<div class="card" style="background:rgba(229,9,20,0.1); border:1px solid var(--danger); cursor:pointer;" onclick="setPage('upload_docs')">
								<div style="font-weight:bold; color:var(--danger); margin-bottom:5px;">⚠️ 승인 대기 중</div>
								<div style="font-size:12px; color:var(--text-sub);">사업자 및 영업허가증을 제출해 주세요. 승인 후 견적 발송이 가능합니다.</div>
								<div style="margin-top:10px; font-weight:bold; font-size:13px; text-decoration:underline;">서류 제출하러 가기 ❯</div>
							</div>
						` : ''}

						<div style="margin-bottom:30px;">
							<div style="font-size:13px; color:var(--text-sub);">반가워요, ${state.currentUser.name} 님</div>
							<div style="font-size:22px; font-weight:800; margin-top:8px; letter-spacing:-0.03em;">${state.currentUser.compName} <span style="font-size:12px; color:var(--primary);">${state.isApproved ? '인증업체' : '미인증'}</span></div>
						</div>

						<div class="card" style="background:var(--primary); color:#000; border:none; box-shadow:0 12px 24px rgba(201,160,80,0.3);" onclick="setPage('analytics')">
							<div style="font-size:13px; font-weight:bold;">이번 달 확정 수익</div>
							<div style="font-size:28px; font-weight:900; margin:12px 0;">${state.currentUser.revenue.toLocaleString()}원</div>
							<div style="font-size:11px; opacity:0.7;">전월 대비 12.5% 상승 (↑)</div>
						</div>

						<div style="font-weight:bold; margin-top:35px; margin-bottom:15px; font-size:16px;">현장 및 재고 상태</div>
						<div class="card" onclick="setPage('assets')">
							<div style="display:flex; justify-content:space-between; margin-bottom:15px;">
								<span style="font-weight:bold;">🛠️ 주요 장비/약품 현황</span>
								<span style="font-size:12px; color:var(--primary);">상세보기 ❯</span>
							</div>
							<div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
								${state.assets.slice(0, 2).map(a => `
									<div style="background:var(--surface-light); padding:12px; border-radius:10px; font-size:12px; border:1px solid var(--border);">
										<div style="color:var(--text-sub); margin-bottom:4px;">${a.name}</div>
										<div style="font-weight:bold; color:${a.status === '정상' ? 'var(--success)' : 'var(--danger)'}">${a.status} (${a.stock})</div>
									</div>
								`).join('')}
							</div>
						</div>

						<div style="display:grid; grid-template-columns: 1fr 1fr; gap:15px; margin-top:10px;">
							<div class="card" onclick="setPage('portfolio')" style="text-align:center;">
								<div style="font-size:24px; margin-bottom:10px;">🖼️</div>
								<div style="font-size:13px; font-weight:bold;">포트폴리오</div>
							</div>
							<div class="card" onclick="setPage('settlement')" style="text-align:center;">
								<div style="font-size:24px; margin-bottom:10px;">💳</div>
								<div style="font-size:13px; font-weight:bold;">정산 내역</div>
							</div>
						</div>

						<div style="font-weight:bold; margin-top:35px; margin-bottom:15px; font-size:16px;">파트너 서비스</div>
						<div class="menuCard" onclick="setPage('chat')"><span>💬 실시간 고객 상담</span><span>❯</span></div>
						<div class="menuCard" onclick="setPage('community')"><span>🤝 프로 커뮤니티</span><span>❯</span></div>
						<div class="menuCard" onclick="setPage('partnership')"><span>💼 신규 제안 / 기능 요청</span><span>❯</span></div>
						<div style="margin-top:40px; text-align:center; font-size:13px; color:var(--text-dark); text-decoration:underline; cursor:pointer;" onclick="setPage('login')">로그아웃</div>
					</div>
				`;
				case 'analytics': return `
					<div class="padding">
						<h2 style="font-size:22px; font-weight:800; margin-bottom:10px;">매출 및 성장 지표</h2>
						<p style="font-size:14px; color:var(--text-sub); margin-bottom:30px;">최근 7일간의 수익 변동 추이입니다.</p>

						<div class="chart-container">
							${state.revenueData.map(d => `
								<div class="chart-bar" style="height:${d.v}%" data-label="${d.l}"></div>
							`).join('')}
						</div>

						<div style="margin-top:40px;">
							<div class="card" style="margin-bottom:12px; display:flex; justify-content:space-between; align-items:center;">
								<div>
									<div style="font-size:12px; color:var(--text-sub);">최고 매출일</div>
									<div style="font-weight:bold; font-size:16px;">목요일 (1,250,000원)</div>
								</div>
								<span style="font-size:18px;">🔥</span>
							</div>
							<div class="card" style="display:flex; justify-content:space-between; align-items:center;">
								<div>
									<div style="font-size:12px; color:var(--text-sub);">월간 총 상담 건수</div>
									<div style="font-weight:bold; font-size:16px;">124건</div>
								</div>
								<span style="font-size:18px;">💬</span>
							</div>
						</div>
					</div>
				`;
				case 'assets': return `
					<div class="padding">
						<div style="display:flex; justify-content:space-between; align-items:flex-end; margin-bottom:25px;">
							<h2 style="margin:0;">재고 및 자산 목록</h2>
							<div style="font-size:12px; color:var(--primary); cursor:pointer;">+ 항목 추가</div>
						</div>
						<div class="card">
							${state.assets.map(a => `
								<div class="asset-row">
									<div>
										<div style="font-weight:bold; font-size:15px;">${a.name}</div>
										<div style="font-size:12px; color:var(--text-dark); margin-top:4px;">최근 정검: 2026-04-20</div>
									</div>
									<div style="text-align:right;">
										<div style="font-weight:bold; color:${a.status === '정상' ? 'var(--success)' : 'var(--danger)'}">${a.status}</div>
										<div style="font-size:12px; color:var(--text-sub);">${a.stock}</div>
									</div>
								</div>
							`).join('')}
						</div>
					</div>
				`;
				case 'settlement': return `
					<div class="padding">
						<h2 style="margin-bottom:25px;">정산 내역 상세</h2>
						${state.settlements.map(s => `
							<div class="menuCard" style="flex-direction:column; align-items:flex-start; gap:8px;">
								<div style="display:flex; justify-content:space-between; width:100%;">
									<div style="font-weight:bold;">${s.label}</div>
									<div style="color:var(--success); font-weight:bold;">+ ${s.amount.toLocaleString()}원</div>
								</div>
								<div style="font-size:12px; color:var(--text-dark);">${s.date} • 정산완료</div>
							</div>
						`).join('')}
						<div style="margin-top:30px; text-align:center; font-size:13px; color:var(--text-sub);">
							이번 달 총 정산 예정액: <b style="color:var(--text-main);">7,250,000원</b>
						</div>
					</div>
				`;
				case 'portfolio': return `
					<div class="padding">
						<h2 style="margin-bottom:25px;">포트폴리오 관리</h2>
						<div style="display:grid; grid-template-columns: 1fr 1fr; gap:12px;">
							<div style="aspect-ratio:1; background:#222; border:1px solid #333; border-radius:12px; display:flex; flex-direction:column; align-items:center; justify-content:center; cursor:pointer;">
								<span style="font-size:24px; color:var(--text-main);">➕</span>
								<span style="font-size:11px; color:var(--text-sub); margin-top:8px;">새 현장 등록</span>
							</div>
							<div style="aspect-ratio:1; background:#222; border:1px solid #333; border-radius:12px; overflow:hidden; position:relative; cursor:pointer;">
								<div style="position:absolute; bottom:0; width:100%; padding:8px; background:rgba(0,0,0,0.7); font-size:10px; text-align:center;">역삼동 OO 빌라</div>
								<div style="width:100%; height:100%; background:var(--surface-light);"></div>
							</div>
							<div style="aspect-ratio:1; background:#222; border:1px solid #333; border-radius:12px; overflow:hidden; position:relative; cursor:pointer;">
								<div style="position:absolute; bottom:0; width:100%; padding:8px; background:rgba(0,0,0,0.7); font-size:10px; text-align:center;">도곡동 화재현장</div>
								<div style="width:100%; height:100%; background:linear-gradient(45deg, #222, #111);"></div>
							</div>
						</div>
					</div>
				`;
				case 'community': return `
					<div class="padding">
						<div style="background:var(--surface-light); padding:24px; border-radius:15px; margin-bottom:25px; border-bottom:2px solid var(--primary);">
							<div style="font-weight:bold; margin-bottom:8px; font-size:16px;">프로 전용 실시간 정보망</div>
							<div style="font-size:12px; color:var(--text-sub);">현장의 무용담과 기술 노하우를 공유하세요.</div>
						</div>
						${state.posts.map(p => `
							<div class="menuCard" style="flex-direction:column; align-items:flex-start; gap:8px;">
								<div style="font-weight:bold;">${p.title}</div>
								<div style="font-size:12px; color:var(--text-dark);">작성자: ${p.author} • 5분 전</div>
							</div>
						`).join('')}
					</div>
				`;
				case 'scorecard': return `
					<div class="padding" style="text-align:center;">
						<div style="margin-top:20px; font-size:60px; margin-bottom:20px;">⭐</div>
						<h2 style="font-weight:800; font-size:24px;">나의 품질 등급</h2>
						<p style="color:var(--text-sub); font-size:14px; margin-bottom:40px;">프로 점수를 관리하여 우선 매칭 기회를 얻으세요.</p>

						<div class="card" style="text-align:left;">
							<div style="display:flex; justify-content:space-between; margin-bottom:12px;"><span>평균 평점</span><span style="font-weight:bold; color:var(--warning);">4.9 / 5.0</span></div>
							<div style="display:flex; justify-content:space-between; margin-bottom:12px;"><span>응답 속도</span><span style="font-weight:bold; color:var(--success);">쾌속 (98%)</span></div>
							<div style="display:flex; justify-content:space-between;"><span>작격증 검증</span><span style="font-weight:bold; color:var(--success);">완료</span></div>
						</div>
					</div>
				`;
				case 'partnership': return `
					<div class="padding">
						<h2 style="margin-bottom:25px;">파트너십 문의 및 제안</h2>
						<div class="card">
							<textarea style="width:100%; background:transparent; border:none; color:var(--text-main); font-size:14px; outline:none;" rows="6" placeholder="기능 개선 아이디어나 파트너십 제안이 있으시다면 자유롭게 남겨주세요."></textarea>
						</div>
						<button class="primaryBtn">제안 보내기</button>
					</div>
				`;
				default: return ``;
			}
		}

		// --- Auth & Business Flow ---

		function renderLogin() {
			return `
				<div class="padding" style="display:flex; flex-direction:column; justify-content:center; min-height:100vh;">
					<div style="text-align:center; margin-bottom:40px;">

						<div style="font-size:14px; color:var(--text-sub);">사업자 전용 관리 시스템</div>
					</div>
					<input class="input" type="text" placeholder="사업자 아이디" style="border:1px solid var(--border); padding:16px; border-radius:10px; margin-bottom:16px; background-color:var(--bg); color:var(--text-main); width:100%;">
					<input class="input" type="password" placeholder="비밀번호" style="border:1px solid var(--border); padding:16px; border-radius:10px; margin-bottom:16px; background-color:var(--bg); color:var(--text-main); width:100%;">
					<button class="primaryBtn" style="margin-top:10px; color:#000;" onclick="setPage('dash')">파트너 로그인</button>
					
					<div style="display:flex; justify-content:center; gap:20px; margin-top:20px; font-size:13px; color:var(--text-dark);">
						<span onclick="setPage('find_idpw')" style="cursor:pointer;">아이디/비밀번호 찾기</span>
						<span onclick="setPage('signup_choice')" style="cursor:pointer; color:var(--text-sub); font-weight:bold;">파트너 가입</span>
					</div>
					<div onclick="location.href='index.html'" style="text-align:center; margin-top:30px; font-size:13px; color:var(--text-dark); cursor:pointer;">홈으로 돌아가기</div>
				</div>
			`;
		}

		function renderSignupChoice() {
			return `
				<div class="padding" style="display:flex; flex-direction:column; justify-content:center; min-height:100vh;">
					<div onclick="setPage('login')" style="cursor:pointer; font-size:20px; margin-bottom:30px;">←</div>
					<h2 style="margin-bottom:10px;">환영합니다, 파트너님!<br>가입 유형을 선택해 주세요.</h2>
					<p style="color:var(--text-sub); font-size:14px; margin-bottom:40px;">비즈니스 성격에 맞는 계정을 생성합니다.</p>

					<div class="card" onclick="setPage('signup_business', 'individual')" style="padding:30px; display:flex; align-items:center; gap:20px;">
						<div style="font-size:30px;">👤</div>
						<div>
							<div style="font-weight:bold; font-size:18px;">개인 사업자</div>
							<div style="font-size:12px; color:var(--text-sub); margin-top:4px;">1인 기업 및 소규모 업체</div>
						</div>
					</div>
					<div class="card" onclick="setPage('signup_business', 'corporate')" style="padding:30px; display:flex; align-items:center; gap:20px;">
						<div style="font-size:30px;">🏢</div>
						<div>
							<div style="font-weight:bold; font-size:18px;">법인 사업자</div>
							<div style="font-size:12px; color:var(--text-sub); margin-top:4px;">중대형 청소 전문 법인</div>
						</div>
					</div>
				</div>
			`;
		}

		function renderSignupBusiness() {
			const type = state.selectedItem;
			return `
				<div class="padding" style="padding-top:60px;">
					<div onclick="setPage('signup_choice')" style="cursor:pointer; font-size:20px; margin-bottom:20px;">←</div>
					<h2 style="margin-bottom:30px;">${type === 'individual' ? '개인' : '법인'} 사업자 가입</h2>

					<div style="font-size:14px; color:var(--text-sub); margin-bottom:10px;">사업자 등록 번호</div>
					<div style="display:flex; gap:10px; margin-bottom:20px;">
						<input class="input" type="text" placeholder="000-00-00000" style="margin-bottom:0; flex:1; border:1px solid var(--border); padding:16px; border-radius:10px; background-color:var(--bg); color:var(--text-main);">
						<button class="primaryBtn" style="width:100px; padding:0; font-size:13px; color:#000;" onclick="alert('확인되었습니다.')">중복확인</button>
					</div>

					${type === 'corporate' ? `
						<div style="font-size:14px; color:var(--text-sub); margin-bottom:10px;">법인 등록 번호</div>
						<input class="input" type="text" placeholder="000000-0000000" style="border:1px solid var(--border); padding:16px; border-radius:10px; margin-bottom:20px; background-color:var(--bg); color:var(--text-main); width:100%;">
					` : ''}

					<div style="font-size:14px; color:var(--text-sub); margin-bottom:10px;">아이디</div>
					<input class="input" type="text" placeholder="8자 이상" style="border:1px solid var(--border); padding:16px; border-radius:10px; margin-bottom:20px; background-color:var(--bg); color:var(--text-main); width:100%;">

					<div style="font-size:14px; color:var(--text-sub); margin-bottom:10px;">비밀번호 (8~16자)</div>
					<input class="input" type="password" placeholder="비밀번호 입력" style="border:1px solid var(--border); padding:16px; border-radius:10px; margin-bottom:10px; background-color:var(--bg); color:var(--text-main); width:100%;">
					<input class="input" type="password" placeholder="비밀번호 확인" style="border:1px solid var(--border); padding:16px; border-radius:10px; margin-bottom:20px; background-color:var(--bg); color:var(--text-main); width:100%;">

					<div style="font-size:14px; color:var(--text-sub); margin-bottom:15px;">수행 가능 카테고리 (중복 선택)</div>
					<div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px; margin-bottom:30px;">
						${state.categories.map(c => `
							<div id="cat_${c}" style="padding:12px; border:1px solid var(--border); border-radius:10px; font-size:12px; text-align:center; cursor:pointer;" onclick="toggleCategory('${c}')">${c}</div>
						`).join('')}
					</div>

					<button class="primaryBtn" style="color:#000;" onclick="alert('가입 신청이 완료되었습니다. 서류 제출 단계로 이동합니다.'); setPage('login');">다음 단계로</button>
					<div style="height:40px"></div>
				</div>
			`;
		}

		function toggleCategory(c) {
			const el = document.getElementById('cat_' + c);
			const idx = state.selectedCategories.indexOf(c);
			if (idx > -1) {
				state.selectedCategories.splice(idx, 1);
				el.style.borderColor = 'var(--border)';
				el.style.color = 'var(--text-main)';
				el.style.background = 'transparent';
			} else {
				state.selectedCategories.push(c);
				el.style.borderColor = 'var(--primary)';
				el.style.color = '#000';
				el.style.background = 'var(--primary)';
			}
		}

		function renderUploadDocs() {
			return `
				<div class="padding" style="padding-top:40px;">
					<h2 style="margin-bottom:10px;">서류 제출</h2>

					<div class="card" style="border-style:dashed; text-align:center; padding:40px;" onclick="alert('파일 선택 창이 열립니다.')">
						<div style="font-size:30px; margin-bottom:10px;">📄</div>
						<div style="font-size:14px; font-weight:bold;">사업자 등록증 첨부</div>

						<div style="display:flex; justify-content:space-between; align-items:center; background:var(--surface); padding:15px; border-radius:10px; border:1px solid var(--border);">
							<span style="font-size:13px;">건물위생관리업 신고증</span>
							<button style="font-size:11px; padding:5px 10px; background:#333; color:#fff; border:none; border-radius:5px;" onclick="alert('첨부 완료')">첨부하기</button>
						</div>
						<div style="display:flex; justify-content:space-between; align-items:center; background:var(--surface); padding:15px; border-radius:10px; border:1px solid var(--border);">
							<span style="font-size:13px;">소독업 신고증</span>
							<button style="font-size:11px; padding:5px 10px; background:#333; color:#fff; border:none; border-radius:5px;" onclick="alert('첨부 완료')">첨부하기</button>
						</div>
						<div style="display:flex; justify-content:space-between; align-items:center; background:var(--surface); padding:15px; border-radius:10px; border:1px solid var(--border);">
							<span style="font-size:13px;">폐기물 수집운반업 허가증</span>
							<button style="font-size:11px; padding:5px 10px; background:#333; color:#fff; border:none; border-radius:5px;" onclick="alert('첨부 완료')">첨부하기</button>
						</div>
					</div>

					<button class="primaryBtn" style="color:#000;" onclick="alert('서류가 정상적으로 제출되었습니다. 관리자 승인까지 영업일 기준 1~2일이 소요됩니다.'); setPage('dash');">제출 완료</button>
				</div>
			`;
		}

		function renderFindIDPW() {
			return `
				<div class="padding" style="padding-top:60px;">
					<div onclick="setPage('login')" style="cursor:pointer; font-size:20px; margin-bottom:20px;">←</div>
					<h2 style="margin-bottom:30px;">파트너 정보 찾기</h2>
					<div style="font-size:14px; color:var(--text-sub); margin-bottom:10px;">사업자 번호</div>
					<input class="input" type="text" placeholder="000-00-00000" style="border:1px solid var(--border); padding:16px; border-radius:10px; margin-bottom:20px; background-color:var(--bg); color:var(--text-main); width:100%;">
					<div style="font-size:14px; color:var(--text-sub); margin-bottom:10px;">대표자 휴대폰 번호</div>
					<input class="input" type="tel" placeholder="010-0000-0000" style="border:1px solid var(--border); padding:16px; border-radius:10px; margin-bottom:20px; background-color:var(--bg); color:var(--text-main); width:100%;">
					<button class="primaryBtn" style="color:#000;" onclick="alert('정보가 일치하지 않습니다.')">아이디 찾기</button>
				</div>
			`;
		}

		function renderChat() {
			return `
				<div style="flex:1; padding:20px; overflow-y:auto; display:flex; flex-direction:column; gap:15px;">
					<div style="text-align:center; font-size:11px; color:var(--text-dark); margin-bottom:10px;">고객과의 익명 채팅입니다. 친절하게 응대해 주세요.</div>
					${state.messages.map(m => `
						<div style="display:flex; flex-direction:column; align-items: ${m.isMe ? 'flex-end' : 'flex-start'}">
							<div style="background: ${m.isMe ? 'var(--primary)' : 'var(--surface-light)'}; color: ${m.isMe ? '#000' : '#fff'}; padding:12px 16px; border-radius: ${m.isMe ? '15px 15px 0 15px' : '15px 15px 15px 0'}; max-width: 80%; font-size:14px;">
								${m.text}
							</div>
							<div style="font-size:10px; color:var(--text-dark); margin-top:5px;">${m.time}</div>
						</div>
					`).join('')}
				</div>
				<div style="padding:15px; background:var(--surface); border-top:1px solid var(--border); display:flex; gap:10px;">
					<input type="text" placeholder="메시지를 입력하세요..." style="flex:1; background:var(--bg); border:1px solid var(--border); border-radius:30px; padding:12px 20px; color:#fff; outline:none;">
					<button style="width:44px; height:44px; border-radius:22px; background:var(--primary); border:none; color:#000; font-size:18px; cursor:pointer;" onclick="alert('메시지 전송')">↑</button>

			`;
		}

		window.onload = render;
	</script>
