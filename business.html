<!DOCTYPE html>
<html lang="ko">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>특청 파트너 - 비즈니스 관리</title>
	<link rel="stylesheet" as="style" crossorigin
		href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
	<script>
		(function () {
			const savedTheme = localStorage.getItem('special-cleaning-theme') || 'dark';
			if (savedTheme === 'light') {
				document.documentElement.classList.add('light-theme');
			}
		})();
	</script>
	<style>
		:root {
			--primary: #c9a050;
			--bg: #000;
			--surface: #111;
			--surface-light: #1a1a1a;
			--surface-hover: #222;
			--text-main: #fff;
			--text-sub: #ccc;
			--text-dark: #888;
			--border: #333;
			--success: #28a745;
			--danger: #dc3545;
		}

		.light-theme {
			--bg: #f8f9fa;
			--surface: #ffffff;
			--surface-light: #f1f3f5;
			--surface-hover: #e9ecef;
			--text-main: #111;
			--text-sub: #555;
			--text-dark: #888;
			--border: #dee2e6;
			--primary: #a67c00;
		}

		* {
			box-sizing: border-box;
			font-family: "Pretendard Variable", sans-serif;
			-webkit-tap-highlight-color: transparent;
			line-height: 1.6;
			letter-spacing: -0.025em;
		}

		body {
			margin: 0;
			padding: 0;
			background: #050505;
			color: var(--text-main);
			height: 100vh;
			overflow: hidden;
			display: flex;
			justify-content: center;
			transition: background-color 0.3s, color 0.3s;
		}

		.light-theme body {
			background-color: #f1f3f5;
		}

		#root {
			height: 100%;
			display: flex;
			flex-direction: column;
			width: 100%;
			background: var(--bg);
			position: relative;
		}

		.bg {
			flex: 1;
			overflow-y: auto;
			padding-bottom: 20px;
		}

		.padding {
			padding: 24px;
		}

		.header {
			padding: 50px 20px 20px;
			background: var(--surface);
			border-bottom: 1px solid var(--primary);
			display: flex;
			justify-content: space-between;
			align-items: center;
			position: sticky;
			top: 0;
			z-index: 10;
		}

		.headerTitle {
			font-weight: bold;
			font-size: 17px;
		}

		.backBtn,
		.homeBtn {
			cursor: pointer;
		}

		.card {
			background: var(--surface);
			padding: 24px;
			border-radius: 15px;
			border: 1px solid #222;
			margin-bottom: 20px;
			cursor: pointer;
			transition: background 0.2s;
		}

		.card:active {
			background: var(--surface-hover);
		}

		.primaryBtn {
			width: 100%;
			padding: 18px;
			background: var(--primary);
			border: none;
			border-radius: 12px;
			color: #000;
			font-weight: 800;
			cursor: pointer;
			font-size: 15px;
		}

		.chart-container {
			display: flex;
			align-items: flex-end;
			gap: 10px;
			height: 120px;
			margin-top: 25px;
			padding-bottom: 12px;
			border-bottom: 1px solid #333;
		}

		.chart-bar {
			flex: 1;
			background: var(--primary);
			border-radius: 4px 4px 0 0;
			position: relative;
			cursor: pointer;
		}

		.chart-bar:hover {
			opacity: 0.8;
		}

		.chart-bar::after {
			content: attr(data-label);
			position: absolute;
			bottom: -22px;
			left: 50%;
			transform: translateX(-50%);
			font-size: 10px;
			color: var(--text-dark);
		}

		.nav {
			height: 75px;
			background: var(--surface);
			border-top: 1px solid #222;
			display: flex;
			justify-content: space-around;
			align-items: center;
			width: 100%;
			padding-bottom: env(safe-area-inset-bottom);
		}

		.nav-item {
			color: var(--text-dark);
			font-size: 11px;
			text-align: center;
			cursor: pointer;
		}

		.nav-item.active {
			color: var(--primary);
		}

		.menuCard {
			display: flex;
			justify-content: space-between;
			align-items: center;
			padding: 20px;
			background: var(--surface);
			border-radius: 12px;
			margin-bottom: 12px;
			cursor: pointer;
			font-size: 14px;
		}

		.asset-row {
			display: flex;
			justify-content: space-between;
			padding: 15px 0;
			border-bottom: 1px solid #222;
		}

		@media (min-width: 600px) {
			#root {
				max-width: 480px;
				border-left: 1px solid #333;
				border-right: 1px solid #333;
				box-shadow: 0 0 50px rgba(0, 0, 0, 0.5);
			}
		}
	</style>
</head>

<body>
	<div id="root"></div>

	<script>
		let state = {
			page: 'login',
			isLoggedIn: false,
			isApproved: true,
			currentUser: { id: 'pro1', compName: '명품특수청소', name: '김대표', revenue: 15400000, rating: 4.9 },
			revenueData: [
				{ l: '월', v: 45 }, { l: '화', v: 30 }, { l: '수', v: 60 }, { l: '목', v: 85 }, { l: '금', v: 70 }, { l: '토', v: 95 }, { l: '일', v: 40 }
			],
			assets: [
				{ name: 'O3 오존발생기 (강력형)', status: '정상', stock: '2대' },
				{ name: '혈흔 분해 전용 효소 세제', status: '부족', stock: '2L' },
				{ name: '병원균 사멸 소독제 (20L)', status: '정상', stock: '20L' },
				{ name: '산업용 HEPA 청소기', status: '정상', stock: '1대' },
				{ name: ' Level D 전신 방호복', status: '정상', stock: '24벌' }
			],
			settlements: [
				{ id: 'S1', date: '2026-04-20', label: '역삼동 고독사 현장', amount: 2450000, status: '완료' },
				{ id: 'S2', date: '2026-04-15', label: '도곡동 화재 복구', amount: 4800000, status: '완료' }
			],
			posts: [
				{ id: 'c1', title: '고독사 현장 특수 약품 추천 부탁드립니다.', author: '정클린' },
				{ id: 'c2', title: '이번 달 광주 서구청 입찰 공고 보셨나요?', author: '특청매니저' }
			],
			messages: [
				{ id: 1, sender: 'customer', text: '방문 견적 가능할까요?', time: '오후 2:30', isMe: false },
				{ id: 2, sender: 'me', text: '네, 내일 오전 10시쯤 어떠신가요?', time: '오후 2:35', isMe: true }
			],
			categories: ['고독사', '자살', '쓰레기집', '강력범죄현장', '화재현장', '침수현장'],
			selectedCategories: [],
			uploadedDocs: [],
			reportForm: {
				location: '',
				waste_amount: '',
				odor_level: '',
				note: '',
				gps: '',
				timestamp: ''
			},
			reportPhotos: [],
			isListening: false,
			isPro: true,
			isCapturingGPS: false,
			pendingAudits: [
				{ id: 'A001', compName: '속시원특수청소', type: '개인', docs: ['사업자', '위생관리', '소독업'], date: '2026-04-26' },
				{ id: 'A002', compName: '클린메이트', type: '법인', docs: ['사업자', '위생관리', '폐기물'], date: '2026-04-25' }
			],
			isGeneratingPDF: false
		};

		function setPage(p, data = null) {
			state.page = p;
			if (data) state.selectedItem = data;
			render();
			if (document.querySelector('.bg')) document.querySelector('.bg').scrollTo(0, 0);
		}

		function render() {
			const root = document.getElementById('root');
			let noHeader = ['login', 'signup_choice', 'signup_business', 'find_idpw'].includes(state.page);
			let hideNav = ['login', 'signup_choice', 'signup_business', 'find_idpw', 'portfolio', 'assets', 'settlement', 'community', 'scorecard', 'partnership', 'analytics', 'upload_docs', 'chat', 'stt_report', 'waste_vendors', 'waste_vendor_detail'].includes(state.page);

			root.innerHTML = `
				${noHeader ? '' : renderHeader(hideNav)}
				<div class="bg" style="display:flex; flex-direction:column;">${renderContent()}</div>
				${hideNav ? '' : renderNav()}
				${state.isPdfOpen ? renderPdfOverlay() : ''}
			`;
		}

		function renderHeader(isSub) {
			return `
				<div class="header">
					${isSub ? `<div class="backBtn" onclick="setPage('dash')">←</div>` : `<div onclick="location.href='index.html'" style="font-size:13px; border:1px solid #333; padding:6px 12px; border-radius:8px; cursor:pointer;">🏠 홈</div>`}
					<div class="headerTitle">${getHeaderTitle()}</div>
					<div style="cursor:pointer; font-size:18px;" onclick="toggleTheme()">🌓</div>
				</div>
			`;
		}

		function toggleTheme() {
			const isLight = document.documentElement.classList.toggle('light-theme');
			localStorage.setItem('special-cleaning-theme', isLight ? 'light' : 'dark');
		}

		function getHeaderTitle() {
			switch (state.page) {
				case 'dash': return '파트너 지원센터';
				case 'community': return '프로 전용 커뮤니티';
				case 'scorecard': return '서비스 품질 진단';
				case 'partnership': return '파트너십 센터';
				case 'analytics': return '사업 데이터 분석';
				case 'assets': return '재고 및 자산 관리';
				case 'settlement': return '정산 및 서류 관리';
				case 'portfolio': return '포트폴리오 관리';
				case 'upload_docs': return '영업 서류 제출';
				case 'chat': return '고객 상담 (익명)';
				case 'stt_report': return '원터치 현장 보고서';
				case 'waste_vendors': return '제휴 폐기물 업체';
				case 'waste_vendor_detail': return '폐기물 업체 상세';
				default: return '비즈니스';
			}
		}

		function renderNav() {
			return `
				<div class="nav">
					<div class="nav-item ${state.page === 'dash' ? 'active' : ''}" onclick="setPage('dash')"><div>🏠</div>홈</div>
					<div class="nav-item ${state.page === 'analytics' ? 'active' : ''}" onclick="setPage('analytics')"><div>📊</div>분석</div>
					<div class="nav-item ${state.page === 'community' ? 'active' : ''}" onclick="setPage('community')"><div>🤝</div>커뮤니티</div>
					<div class="nav-item" onclick="setPage('scorecard')"><div>⭐</div>등급</div>
				</div>
			`;
		}

		function renderContent() {
			switch (state.page) {
				case 'login': return renderLogin();
				case 'signup_choice': return renderSignupChoice();
				case 'signup_business': return renderSignupBusiness();
				case 'find_idpw': return renderFindIDPW();
				case 'upload_docs': return renderUploadDocs();
				case 'chat': return renderChat();
				case 'stt_report': return renderSTTReport();
				case 'waste_vendors': return renderWasteVendors();
				case 'waste_vendor_detail': return renderWasteVendorDetail();
				case 'dash': return renderDash();
				case 'analytics': return renderAnalytics();
				case 'assets': return renderAssets();
				case 'settlement': return renderSettlement();
				case 'portfolio': return renderPortfolio();
				case 'community': return renderCommunity();
				case 'scorecard': return renderScorecard();
				case 'partnership': return renderPartnership();
				default: return ``;
			}
		}

		function renderDash() {
			return `
				<div class="padding">
					${!state.isApproved ? `
						<div class="card" style="background:rgba(229,9,20,0.1); border:1px solid var(--danger); cursor:pointer;" onclick="setPage('upload_docs')">
							<div style="font-weight:bold; color:var(--danger); margin-bottom:5px;">⚠️ 승인 대기 중</div>
							<div style="font-size:12px; color:var(--text-sub);">사업자 및 영업허가증을 제출해 주세요. 승인 후 견적 발송이 가능합니다.</div>
							<div style="margin-top:10px; font-weight:bold; font-size:13px; text-decoration:underline;">서류 제출하러 가기 ❯</div>
						</div>
					` : ''}

					<div style="margin-bottom:30px;">
						<div style="font-size:13px; color:var(--text-sub);">반가워요, ${state.currentUser.name} 님</div>
						<div style="font-size:22px; font-weight:800; margin-top:8px; letter-spacing:-0.03em;">${state.currentUser.compName} <span style="font-size:12px; color:var(--primary);">${state.isApproved ? '인증업체' : '미인증'}</span></div>
					</div>

					<div class="card" style="background:linear-gradient(135deg, var(--primary), #e6b85c); color:#000; border:none; box-shadow:0 12px 24px rgba(201,160,80,0.3); position:relative; overflow:hidden;" onclick="setPage('analytics')">
						<div style="position:absolute; right:-20px; top:-20px; font-size:100px; opacity:0.1;">💰</div>
						<div style="font-size:13px; font-weight:bold;">이번 달 확정 수익</div>
						<div style="font-size:28px; font-weight:900; margin:12px 0;">${state.currentUser.revenue.toLocaleString()}원</div>
						<div style="font-size:11px; opacity:0.7;">전월 대비 12.5% 상승 (↑)</div>
					</div>

					<div style="font-weight:bold; margin-top:35px; margin-bottom:15px; font-size:16px;">현장 스마트 도구</div>
					<div class="card" onclick="setPage('stt_report')" style="background:var(--surface-light); border:1px solid var(--primary); display:flex; align-items:center; gap:15px; padding:20px; margin-bottom:15px;">
						<div style="width:50px; height:50px; background:var(--primary); border-radius:12px; display:flex; align-items:center; justify-content:center; font-size:24px;">🎙️</div>
						<div>
							<div style="font-weight:bold; font-size:16px; color:var(--primary);">원터치 현장 보고서</div>
							<div style="font-size:12px; color:var(--text-sub); margin-top:4px;">음성 보고 + GPS 사진 자동 증빙</div>
						</div>
					</div>

					<div class="card" onclick="setPage('waste_vendors')" style="background:var(--surface-light); border:1px solid var(--primary); display:flex; align-items:center; gap:15px; padding:20px;">
						<div style="width:50px; height:50px; background:var(--primary); border-radius:12px; display:flex; align-items:center; justify-content:center; font-size:24px;">🚛</div>
						<div>
							<div style="font-weight:bold; font-size:16px; color:var(--primary);">폐기물수집운반 허가업체 조회</div>
							<div style="font-size:12px; color:var(--text-sub); margin-top:4px;">특청 제휴 처리업체 매칭 및 상세내역</div>
						</div>
					</div>

					<div style="font-weight:bold; margin-top:35px; margin-bottom:15px; font-size:16px;">현장 및 재고 상태</div>
					<div class="card" onclick="setPage('assets')">
						<div style="display:flex; justify-content:space-between; margin-bottom:15px;">
							<span style="font-weight:bold;">🛠️ 주요 장비/약품 현황</span>
							<span style="font-size:12px; color:var(--primary);">상세보기 ❯</span>
						</div>
						<div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
							${state.assets.slice(0, 2).map(a => `
								<div style="background:var(--surface-light); padding:12px; border-radius:10px; font-size:12px; border:1px solid var(--border);">
									<div style="color:var(--text-sub); margin-bottom:4px;">${a.name}</div>
									<div style="font-weight:bold; color:${a.status === '정상' ? 'var(--success)' : 'var(--danger)'}">${a.status} (${a.stock})</div>
								</div>
							`).join('')}
						</div>
					</div>

					<div style="display:grid; grid-template-columns: 1fr 1fr; gap:15px; margin-top:10px;">
						<div class="card" onclick="setPage('portfolio')" style="text-align:center;">
							<div style="font-size:24px; margin-bottom:10px;">🖼️</div>
							<div style="font-size:13px; font-weight:bold;">포트폴리오</div>
						</div>
						<div class="card" onclick="setPage('settlement')" style="text-align:center;">
							<div style="font-size:24px; margin-bottom:10px;">💳</div>
							<div style="font-size:13px; font-weight:bold;">정산/서류</div>
						</div>
					</div>

					<div style="font-weight:bold; margin-top:35px; margin-bottom:15px; font-size:16px;">파트너 전용 서비스</div>
					<div class="menuCard" onclick="setPage('chat')"><span>💬 실시간 고객 상담</span><span>❯</span></div>
					<div class="menuCard" onclick="setPage('community')"><span>🤝 프로 커뮤니티</span><span>❯</span></div>
					<div class="menuCard" onclick="alert('신규 제안 및 기능 요청 화면으로 이동합니다.')"><span>💡 신규 제안 / 기능 요청</span><span>❯</span></div>
					<div style="margin-top:40px; text-align:center; font-size:13px; color:var(--text-dark); text-decoration:underline; cursor:pointer;" onclick="setPage('login')">로그아웃</div>
				</div>
			`;
		}

		function renderAnalytics() {
			return `
				<div class="padding">
					<h2 style="font-size:22px; font-weight:800; margin-bottom:10px;">매출 및 성장 지표</h2>
					<p style="font-size:14px; color:var(--text-sub); margin-bottom:30px;">최근 7일간의 수익 변동 추이입니다.</p>
					<div class="chart-container">
						${state.revenueData.map(d => `<div class="chart-bar" style="height:${d.v}%" data-label="${d.l}"></div>`).join('')}
					</div>
					
					<div style="margin-top:40px;">
						<div style="font-weight:bold; margin-bottom:15px; font-size:16px;">핵심 사업 데이터</div>
						<div class="card" style="padding:20px;">
							<div style="display:flex; justify-content:space-between; margin-bottom:12px; font-size:14px;">
								<span style="color:var(--text-sub);">월간 상담 수주율</span>
								<b style="color:var(--success);">78.5% (우수)</b>
							</div>
							<div style="display:flex; justify-content:space-between; margin-bottom:12px; font-size:14px;">
								<span style="color:var(--text-sub);">고객 평균 객단가</span>
								<b>1,680,000원</b>
							</div>
							<div style="display:flex; justify-content:space-between; margin-bottom:12px; font-size:14px;">
								<span style="color:var(--text-sub);">주요 의뢰 지역</span>
								<b>광주광역시 서구 (65%)</b>
							</div>
							<div style="display:flex; justify-content:space-between; font-size:14px;">
								<span style="color:var(--text-sub);">고객 불만족(AS) 건수</span>
								<b style="color:var(--primary);">0건</b>
							</div>
						</div>
					</div>
				</div>
			`;
		}

		function renderAssets() {
			return `
				<div class="padding">
					<h2 style="margin-bottom:25px;">재고 및 자산 목록</h2>
					<div class="card">
						${state.assets.map(a => `
							<div class="asset-row">
								<div>
									<div style="font-weight:bold; font-size:15px;">${a.name}</div>
									<div style="font-size:12px; color:var(--text-dark); margin-top:4px;">최근 점검: 2026-04-20</div>
								</div>
								<div style="text-align:right;">
									<div style="font-weight:bold; color:${a.status === '정상' ? 'var(--success)' : 'var(--danger)'}">${a.status}</div>
									<div style="font-size:12px; color:var(--text-sub);">${a.stock}</div>
								</div>
							</div>
						`).join('')}
					</div>
				</div>
			`;
		}

		function renderSettlement() {
			return `
				<div class="padding">

			alert('보고서와 모든 행정 증빙 데이터가 관공서 연동 시스템으로 전송되었습니다.\n\n[처리결과] 비교견적서, 전후사진, 정산내역서 자동 생성 완료.');

		let recognition;
		function toggleSTT() {
			if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
				alert("이 브라우저는 음성 인식을 지원하지 않습니다.");
				return;
			}
			if (state.isListening) { recognition.stop(); state.isListening = false; render(); return; }
			const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
			recognition = new SpeechRecognition();
			recognition.lang = 'ko-KR';
			recognition.onstart = () => { state.isListening = true; render(); };
			recognition.onresult = (event) => { processSTTText(event.results[0][0].transcript); };
			recognition.onend = () => { state.isListening = false; render(); };
			recognition.start();
		}

		function processSTTText(text) {
			state.reportForm.note = (state.reportForm.note || '') + ' ' + text;
			
			const locations = ['안방', '거실', '화장실', '베란다', '주방', '현관', '다용도실', '창고'];
			locations.forEach(loc => { if (text.includes(loc)) state.reportForm.location = loc; });
			
			const wasteMatch = text.match(/(\d+[\.]?\d*\s*[톤|ton|kg|포대|리터|L]+)/);
			if (wasteMatch) state.reportForm.waste_amount = wasteMatch[0];
			
			const odorMatch = text.match(/악취\s*(\d\s*단계)/) || text.match(/냄새\s*심함/);
			if (odorMatch) state.reportForm.odor_level = odorMatch[1] ? odorMatch[1] : '심각';
			
			if (text.includes('혈흔') || text.includes('피')) state.reportForm.blood = true;
			if (text.includes('구더기') || text.includes('벌레')) state.reportForm.bugs = true;
			
			render();
		}
