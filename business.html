<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>특청 파트너 - 비즈니스 관리</title>
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
    <style>
        :root {
            --primary: #c9a050;
            --bg: #000;
            --surface: #111;
            --surface-hover: #222;
            --text-main: #fff;
            --text-sub: #aaa;
            --text-dark: #666;
            --border: #333;
            --success: #28a745;
            --danger: #dc3545;
        }

        * {
            box-sizing: border-box;
            font-family: "Pretendard Variable", sans-serif;
            -webkit-tap-highlight-color: transparent;
            line-height: 1.6;
            letter-spacing: -0.025em;
        }

        body {
            margin: 0; padding: 0; background: #050505; color: var(--text-main);
            height: 100vh; overflow: hidden; display: flex; justify-content: center;
        }

        #root {
            height: 100%; display: flex; flex-direction: column; width: 100%;
            background: var(--bg); position: relative;
        }

        .bg { flex: 1; overflow-y: auto; padding-bottom: 20px; }
        .padding { padding: 24px; }

        .header {
            padding: 50px 20px 20px; background: var(--surface);
            border-bottom: 1px solid var(--primary);
            display: flex; justify-content: space-between; align-items: center;
            position: sticky; top: 0; z-index: 10;
        }
        .headerTitle { font-weight: bold; font-size: 17px; }
        .backBtn, .homeBtn { cursor: pointer; }

        .card {
            background-color: var(--surface); padding: 25px; border-radius: 20px; transition: transform 0.2s, background-color 0.2s;
            cursor: pointer; position: relative; overflow: hidden; border: 1px solid #222; margin-bottom: 20px;
        }.card:active { background: var(--surface-hover); }

        .primaryBtn {
            width: 100%; padding: 18px; background: var(--primary); border: none;
            border-radius: 12px; color: #000; font-weight: 800; cursor: pointer;
            font-size: 15px;
        }

        .chart-container { display: flex; align-items: flex-end; gap: 10px; height: 100px; margin-top: 25px; padding-bottom: 12px; border-bottom: 1px solid #333; }
        .chart-bar { flex: 1; background: var(--primary); border-radius: 4px 4px 0 0; position: relative; cursor: pointer; }
        .chart-bar::after { content: attr(data-label); position: absolute; bottom: -22px; left: 50%; transform: translateX(-50%); font-size: 10px; color: var(--text-dark); }

        .nav {
            height: 75px; background: var(--surface); border-top: 1px solid #222;
            display: flex; justify-content: space-around; align-items: center; width: 100%;
        }
        .nav-item { color: var(--text-dark); font-size: 11px; text-align: center; cursor: pointer; }
        .nav-item.active { color: var(--primary); }

        .menuCard { display: flex; justify-content: space-between; align-items: center; padding: 20px; background: var(--surface); border-radius: 12px; margin-bottom: 12px; cursor: pointer; font-size: 14px; }
        .portfolio-item { aspect-ratio: 4/3; background: #222; border-radius: 8px; border: 1px solid #333; overflow: hidden; display: flex; align-items: center; justify-content: center; font-size: 10px; color: #444; cursor: pointer; }

        @media (min-width: 600px) { #root { max-width: 480px; border-left: 1px solid #333; border-right: 1px solid #333; box-shadow: 0 0 50px rgba(0,0,0,0.5); } }
    </style>
</head>

<body>
    <div id="root"></div>

    <script>
        let state = {
            page: 'dash', // dash, analytics, portfolio, assets, settlement, community, scorecard, partnership
            currentUser: { id: 'pro1', compName: '명품특수청소', name: '김대표', revenue: 15400000, rating: 4.9 },
            revenueData: [20, 45, 30, 60, 85, 40, 55],
            assets: [
                { name: 'O3 오존발생기 (강력형)', status: '정상', stock: '2대' },
                { name: '혈흔 분해 전용 효소 세제', status: '부족', stock: '2L' },
                { name: '병원균 사멸 4급 암모늄 소독제', status: '정상', stock: '20L' },
                { name: 'HEPA 필터 장착 산업용 청소기', status: '정상', stock: '1대' },
                { name: '고성능 공기 정화기 (에어 스크러버)', status: '정상', stock: '1대' },
                { name: '해충 구제용 방역 약품', status: '정상', stock: '15L' },
                { name: '차폐용 고강도 특수 테이프', status: '보통', stock: '12롤' },
                { name: '전신 방호복 (Level D)', status: '정상', stock: '24벌' },
                { name: '방독면 및 정화통', status: '정상', stock: '6세트' }
            ],
            posts: [
                { id: 'c1', title: '고독사 현장 특수 약품 추천 부탁드립니다.', author: '정클린' },
                { id: 'c2', title: '이번 달 광주 서구청 입찰 공고 보셨나요?', author: '특청매니저' }
            ]
        };

        function setPage(p) { state.page = p; render(); }

        function render() {
            const root = document.getElementById('root');
            let hideNav = ['portfolio', 'assets', 'settlement', 'community', 'scorecard', 'partnership'].includes(state.page);

            root.innerHTML = `
                ${renderHeader(hideNav)}
                <div class="bg">${renderContent()}</div>
                ${hideNav ? '' : renderNav()}
            `;
        }

        function renderHeader(isSub) {
            return `
                <div class="header">
                    ${isSub ? `<div class="backBtn" onclick="setPage('dash')">←</div>` : `<div onclick="location.href='index.html'" style="font-size:13px; border:1px solid #333; padding:6px 12px; border-radius:8px; cursor:pointer;">🏠 홈</div>`}
                    <div class="headerTitle">${getHeaderTitle()}</div>
                    <div style="width:40px"></div>
                </div>
            `;
        }

        function getHeaderTitle() {
            switch(state.page) {
                case 'dash': return '파트너 지원센터';
                case 'community': return '프로 전용 커뮤니티';
                case 'scorecard': return '서비스 품질 진단';
                case 'partnership': return '파트너십 센터';
                case 'analytics': return '사업 데이터 분석';
                default: return '비즈니스';
            }
        }

        function renderNav() {
            return `
                <div class="nav">
                    <div class="nav-item ${state.page==='dash'?'active':''}" onclick="setPage('dash')"><div>🏠</div>홈</div>
                    <div class="nav-item ${state.page==='analytics'?'active':''}" onclick="setPage('analytics')"><div>📊</div>분석</div>
                    <div class="nav-item ${state.page==='community'?'active':''}" onclick="setPage('community')"><div>🤝</div>커뮤니티</div>
                    <div class="nav-item" onclick="setPage('scorecard')"><div>⭐</div>등급</div>
                </div>
            `;
        }

        function renderContent() {
            switch(state.page) {
                case 'dash': return `
                    <div class="padding">
                        <div style="margin-bottom:30px;">
                            <div style="font-size:13px; color:var(--text-sub);">반가워요, ${state.currentUser.name} 님</div>
                            <div style="font-size:22px; font-weight:800; margin-top:8px;">${state.currentUser.compName} <span style="font-size:12px; color:var(--primary);">VVIP</span></div>
                        </div>

                        <div class="card" style="background:var(--primary); color:#000; border:none; box-shadow:0 10px 20px rgba(201,160,80,0.2);">
                            <div style="font-size:13px; font-weight:bold;">이번 달 예상 매출</div>
                            <div style="font-size:26px; font-weight:900; margin:12px 0;">${state.currentUser.revenue.toLocaleString()}원</div>
                            <button style="width:100%; padding:10px; background:#000; color:var(--primary); border:none; border-radius:8px; font-size:11px; font-weight:bold;" onclick="setPage('analytics')">상세 대시보드 보기</button>
                        </div>

                        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:15px; margin-top:25px;">
                            <div class="card" onclick="setPage('scorecard')" style="margin-bottom:0; text-align:center;">
                                <div style="font-size:24px; margin-bottom:8px;">⭐</div>
                                <div style="font-size:13px; font-weight:bold;">품질 등급</div>
                                <div style="font-size:11px; color:var(--text-sub); margin-top:4px;">상위 5% 유지중</div>
                            </div>
                            <div class="card" onclick="setPage('community')" style="margin-bottom:0; text-align:center;">
                                <div style="font-size:24px; margin-bottom:8px;">📢</div>
                                <div style="font-size:13px; font-weight:bold;">프로 커뮤니티</div>
                                <div style="font-size:11px; color:var(--text-sub); margin-top:4px;">참여 업체 4,200+</div>
                            </div>
                        </div>

                        <div style="font-weight:bold; margin-top:35px; margin-bottom:15px; font-size:16px;">주요 업무 링크</div>
                        <div class="menuCard" onclick="alert('세금계산서 발행')"><span>📑 전자 세금계산서 관리</span><span>❯</span></div>
                        <div class="menuCard" onclick="setPage('partnership')"><span>💼 신규 파트너십 제안</span><span>❯</span></div>
                    </div>
                `;
                case 'community': return `
                    <div class="padding">
                        <div style="background:#222; padding:20px; border-radius:15px; margin-bottom:25px;">
                            <div style="font-weight:bold; margin-bottom:5px;">프로들을 위한 실시간 정보 공유</div>
                            <div style="font-size:12px; color:var(--text-sub);">현장 팁부터 행정 공고까지 함께 나누세요!</div>
                        </div>
                        ${state.posts.map(p => `
                            <div class="menuCard" style="flex-direction:column; align-items:flex-start; gap:8px;">
                                <div style="font-weight:bold;">${p.title}</div>
                                <div style="font-size:11px; color:var(--text-dark);">작성자: ${p.author} • 5분 전</div>
                            </div>
                        `).join('')}
                    </div>
                `;
                case 'scorecard': return `
                    <div class="padding">
                        <div style="text-align:center; margin-bottom:40px; margin-top:20px;">
                            <div style="font-size:60px; margin-bottom:20px;">🎖️</div>
                            <h2 style="font-size:24px; font-weight:800; margin-bottom:10px;">품질 스코어카드</h2>
                            <p style="font-size:14px; color:var(--text-sub);">고객 평점 및 서비스 정확도를 기반으로 한<br>귀사의 비즈니스 신뢰 점수입니다.</p>
                        </div>
                        <div class="card">
                            <div style="display:flex; justify-content:space-between; margin-bottom:10px;"><b>친절도/응대</b><span>98점</span></div>
                            <div style="height:4px; background:#222; border-radius:2px; overflow:hidden;"><div style="width:98%; height:100%; background:var(--primary);"></div></div>
                        </div>
                        <div class="card">
                            <div style="display:flex; justify-content:space-between; margin-bottom:10px;"><b>작업 시간 준수</b><span>92점</span></div>
                            <div style="height:4px; background:#222; border-radius:2px; overflow:hidden;"><div style="width:92%; height:100%; background:var(--primary);"></div></div>
                        </div>
                    </div>
                `;
                case 'partnership': return `
                    <div class="padding">
                        <h2 style="margin-bottom:25px;">파트너십 문의</h2>
                        <div style="background:#111; border:1px solid #333; padding:24px; border-radius:15px; margin-bottom:30px;">
                            <p style="font-size:14px; color:var(--text-sub); line-height:1.7;">특청은 전국 행정 기관 및 대형 복지 단체와의 협력을 확대하고 있습니다. 상생을 위한 새로운 제안이 있으시다면 언제든 남겨주세요.</p>
                        </div>
                        <button class="primaryBtn">제안하기 (1:1 메신저)</button>
                    </div>
                `;
                case 'analytics': return `
                    <div class="padding">매출 분석 상세 대시보드 로딩 중... <br><br> <button class="primaryBtn" onclick="setPage('dash')">돌아가기</button></div>
                `;
                default: return ``;
            }
        }

        window.onload = render;
    </script>
</body>

</html>
