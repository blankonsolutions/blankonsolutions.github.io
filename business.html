<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>특청 파트너 - 비즈니스 관리</title>
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
    <style>
        :root {
            --primary: #c9a050;
            --bg: #000;
            --surface: #111;
            --surface-hover: #222;
            --text-main: #fff;
            --text-sub: #aaa;
            --text-dark: #666;
            --border: #333;
            --success: #28a745;
            --danger: #dc3545;
        }

        * { box-sizing: border-box; font-family: "Pretendard Variable", sans-serif; -webkit-tap-highlight-color: transparent; }

        body {
            margin: 0; padding: 0; background: #050505; color: var(--text-main);
            height: 100vh; overflow: hidden; display: flex; justify-content: center;
        }

        #root {
            height: 100%; display: flex; flex-direction: column; width: 100%;
            background: var(--bg); position: relative;
        }

        .bg { flex: 1; overflow-y: auto; padding-bottom: 20px; }
        .padding { padding: 20px; }

        .header {
            padding: 50px 20px 15px; background: var(--surface);
            border-bottom: 1px solid var(--primary);
            display: flex; justify-content: space-between; align-items: center;
            position: sticky; top: 0; z-index: 10;
        }
        .headerTitle { font-weight: bold; font-size: 17px; }
        .backBtn { cursor: pointer; font-size: 20px; }
        .homeBtn { cursor: pointer; font-size: 13px; border: 1px solid #333; padding: 5px 10px; border-radius: 8px; }

        .card { background: var(--surface); padding: 20px; border-radius: 15px; border: 1px solid #222; margin-bottom: 15px; cursor: pointer; }
        .primaryBtn {
            width: 100%; padding: 15px; background: var(--primary); border: none;
            border-radius: 10px; color: #000; font-weight: 800; cursor: pointer;
        }

        /* Analytics Chart Simulation */
        .chart-container { display: flex; align-items: flex-end; gap: 8px; height: 100px; margin-top: 20px; padding-bottom: 10px; border-bottom: 1px solid #333; }
        .chart-bar { flex: 1; background: var(--primary); border-radius: 3px 3px 0 0; position: relative; cursor: pointer; }
        .chart-bar::after { content: attr(data-label); position: absolute; bottom: -20px; left: 50%; transform: translateX(-50%); font-size: 9px; color: var(--text-dark); }

        .nav {
            height: 60px; background: var(--surface); border-top: 1px solid #222;
            display: flex; justify-content: space-around; align-items: center; width: 100%;
        }
        .nav-item { color: var(--text-dark); font-size: 10px; text-align: center; cursor: pointer; }
        .nav-item.active { color: var(--primary); }

        .portfolio-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .portfolio-item { aspect-ratio: 4/3; background: #222; border-radius: 8px; border: 1px solid #333; overflow: hidden; display: flex; align-items: center; justify-content: center; font-size: 10px; color: #444; cursor: pointer; }
        .portfolio-item:hover { border-color: var(--primary); }

        .badge { font-size: 10px; padding: 2px 6px; border-radius: 4px; display: inline-block; margin-bottom: 5px; }
        .badge-success { background: rgba(40,167,69,0.1); color: var(--success); border: 1px solid var(--success); }

        @media (min-width: 600px) { #root { max-width: 480px; border-left: 1px solid #333; border-right: 1px solid #333; box-shadow: 0 0 50px rgba(0,0,0,0.5); } }
    </style>
</head>

<body>
    <div id="root"></div>

    <script>
        let state = {
            page: 'dash', // dash, analytics, portfolio, assets, settlement, chat, my
            currentUser: { id: 'pro1', compName: '명품특수청소', name: '김대표', revenue: 15400000 },
            revenueData: [20, 45, 30, 60, 85, 40, 55], // Weekly simulation
            portfolio: [
                { id: 'p1', title: '역삼동 아파트 고독사 현장' },
                { id: 'p2', title: '반포동 빌라 쓰레기집' }
            ],
            assets: [
                { name: 'O3 오존발생기', status: '정상' },
                { name: '특수 소독 약품', status: '부족' }
            ],
            settlements: [
                { date: '2026-04-15', amount: 3500000, status: '지급완료' },
                { date: '2026-04-01', amount: 4200000, status: '지급완료' }
            ]
        };

        function setPage(p) { state.page = p; render(); }

        function render() {
            const root = document.getElementById('root');
            let hideNav = ['portfolio', 'assets', 'settlement'].includes(state.page);

            root.innerHTML = `
                ${renderHeader(hideNav)}
                <div class="bg">${renderContent()}</div>
                ${hideNav ? '' : renderNav()}
            `;
        }

        function renderHeader(isSub) {
            return `
                <div class="header">
                    ${isSub ? `<div class="backBtn" onclick="setPage('dash')">←</div>` : `<div onclick="location.href='index.html'" style="font-size:13px; border:1px solid #333; padding:5px 10px; border-radius:8px;">🏠 홈</div>`}
                    <div class="headerTitle">${getHeaderTitle()}</div>
                    <div style="width:40px"></div>
                </div>
            `;
        }

        function getHeaderTitle() {
            switch(state.page) {
                case 'dash': return '파트너 대시보드';
                case 'analytics': return '매출 분석';
                case 'portfolio': return '포트폴리오 관리';
                case 'assets': return '자산/재고 관리';
                case 'settlement': return '정산 내역';
                default: return '비즈니스';
            }
        }

        function renderNav() {
            return `
                <div class="nav">
                    <div class="nav-item ${state.page==='dash'?'active':''}" onclick="setPage('dash')">🏠 홈</div>
                    <div class="nav-item ${state.page==='analytics'?'active':''}" onclick="setPage('analytics')">📊 분석</div>
                    <div class="nav-item ${state.page==='portfolio'?'active':''}" onclick="setPage('portfolio')">🖼️ 포폴</div>
                    <div class="nav-item ${state.page==='my'?'active':''}" onclick="setPage('my')">👤 관리</div>
                </div>
            `;
        }

        function renderContent() {
            switch(state.page) {
                case 'dash': return `
                    <div class="padding">
                        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
                            <div>
                                <div style="font-size:13px; color:var(--text-sub);">반가워요, ${state.currentUser.name} 님</div>
                                <div style="font-size:20px; font-weight:800; margin-top:5px;">${state.currentUser.compName}</div>
                            </div>
                            <div style="text-align:right;">
                                <div style="font-size:10px; color:var(--success);">프리미엄 파트너</div>
                            </div>
                        </div>

                        <div class="card" style="background:var(--primary); color:#000;">
                            <div style="font-size:13px; font-weight:bold;">이번 달 예상 매출</div>
                            <div style="font-size:24px; font-weight:900; margin:10px 0;">${state.currentUser.revenue.toLocaleString()}원</div>
                            <div style="font-size:11px; opacity:0.8;">지난달 대비 +15% 상승 중</div>
                        </div>

                        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:12px; margin-bottom:20px;">
                            <div class="card" onclick="setPage('assets')" style="margin-bottom:0; text-align:center;"><div style="font-size:22px;">📦</div><div style="font-size:12px; font-weight:600; margin-top:5px;">재고 현황</div></div>
                            <div class="card" onclick="setPage('settlement')" style="margin-bottom:0; text-align:center;"><div style="font-size:22px;">💰</div><div style="font-size:12px; font-weight:600; margin-top:5px;">정산 관리</div></div>
                        </div>

                        <div style="font-weight:bold; margin-bottom:15px;">📊 주간 매출 추이</div>
                        <div class="card">
                            <div class="chart-container">
                                ${state.revenueData.map((v, i) => `<div class="chart-bar" style="height:${v}%" data-label="${i+1}주"></div>`).join('')}
                            </div>
                        </div>
                    </div>
                `;
                case 'analytics': return `
                    <div class="padding">
                        <div class="card">
                            <h3>집행 오더 비율</h3>
                            <div style="height:150px; display:flex; align-items:center; justify-content:center; color:var(--text-dark);">[파이 차트 시뮬레이션]</div>
                        </div>
                        <div class="card">
                            <h3>평균 매칭 단가</h3>
                            <div style="font-size:24px; font-weight:800; color:var(--primary);">1,450,000원</div>
                        </div>
                    </div>
                `;
                case 'portfolio': return `
                    <div class="padding">
                        <h3 style="margin-bottom:15px;">내 포트폴리오 <button style="float:right; background:var(--primary); border:none; padding:5px 10px; border-radius:5px; font-size:11px; color:#000;" onclick="alert('업로드 팝업')">+ 추가</button></h3>
                        <div class="portfolio-grid">
                            ${state.portfolio.map(p => `
                                <div class="portfolio-item">${p.title}</div>
                            `).join('')}
                            <div class="portfolio-item" style="border:1px dashed #444;">+ 새 작업</div>
                        </div>
                    </div>
                `;
                case 'assets': return `
                    <div class="padding">
                        <h3 style="margin-bottom:15px;">장비 및 소모품 재고</h3>
                        ${state.assets.map(a => `
                            <div class="card" style="display:flex; justify-content:space-between; align-items:center;">
                                <div style="font-weight:bold;">${a.name}</div>
                                <div style="color:${a.status==='정상'? 'var(--success)':'var(--danger)'}">${a.status}</div>
                            </div>
                        `).join('')}
                    </div>
                `;
                case 'settlement': return `
                    <div class="padding">
                        ${state.settlements.map(s => `
                            <div class="card">
                                <div class="badge badge-success">${s.status}</div>
                                <div style="font-size:17px; font-weight:800; margin:5px 0;">${s.amount.toLocaleString()}원</div>
                                <div style="font-size:12px; color:var(--text-dark);">${s.date} 정산분</div>
                            </div>
                        `).join('')}
                    </div>
                `;
                case 'my': return `
                    <div class="padding">
                        <div class="card">
                            <div style="font-weight:bold; font-size:18px;">${state.currentUser.compName}</div>
                            <div style="color:var(--text-sub); font-size:13px; margin-top:5px;">대표자: ${state.currentUser.name}</div>
                        </div>
                        <div class="card" onclick="alert('팀원 관리 페이지')">👥 팀원 관리</div>
                        <div class="card" onclick="alert('세무 지원 서비스')">📑 세무 지원 / 세금계산서</div>
                    </div>
                `;
            }
        }

        window.onload = render;
    </script>
</body>

</html>
