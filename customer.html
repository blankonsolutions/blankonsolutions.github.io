<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>특청 - 고객용 프리미엄</title>
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
    <script>
        (function() {
            const savedTheme = localStorage.getItem('special-cleaning-theme') || 'dark';
            if (savedTheme === 'light') {
                document.documentElement.classList.add('light-theme');
            }
        })();
    </script>
    <style>
        :root {
            --primary: #E50914;
            --bg: #000;
            --surface: #111;
            --surface-hover: #222;
            --text-main: #fff;
            --text-sub: #ccc; /* Improved from #aaa */
            --text-dark: #888; /* Improved from #666 */
            --border: #333;
            --success: #28a745;
            --warning: #FFD700;
            --info: #007bff;
        }

        .light-theme {
            --bg: #f8f9fa;
            --surface: #ffffff;
            --surface-hover: #f1f3f5;
            --text-main: #111;
            --text-sub: #555;
            --text-dark: #888;
            --border: #dee2e6;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            font-family: "Pretendard Variable", Pretendard, sans-serif;
            line-height: 1.6;
            letter-spacing: -0.025em;
        }

        body {
            margin: 0; padding: 0; background-color: #050505; color: var(--text-main);
            height: 100vh; overflow: hidden; display: flex; justify-content: center;
            transition: background-color 0.3s, color 0.3s;
        }
        .light-theme body { background-color: #f1f3f5; }

        #root {
            height: 100%; display: flex; flex-direction: column; width: 100%;
            background-color: var(--bg); position: relative;
        }

        .bg { display: flex; flex-direction: column; flex: 1; background-color: var(--bg); overflow-y: auto; padding-bottom: 20px; }
        .padding { padding: 24px; }

        .header {
            padding-top: 50px; padding-bottom: 20px; display: flex; flex-direction: row;
            justify-content: space-between; align-items: center; padding-left: 20px; padding-right: 20px;
            border-bottom: 1px solid #222; background-color: var(--surface);
            position: sticky; top: 0; z-index: 10;
        }

        .headerTitle { color: #fff; font-size: 18px; font-weight: bold; }
        .iconBtn { font-size: 18px; color: var(--text-sub); cursor: pointer; position: relative; }
        .badge-dot { position: absolute; top: -2px; right: -2px; width: 8px; height: 8px; background: var(--primary); border-radius: 50%; border: 2px solid var(--surface); pointer-events: none; }

        .primaryBtn {
            width: 100%; padding: 18px; background-color: var(--primary); border-radius: 12px;
            display: flex; align-items: center; justify-content: center; color: #fff; border: none;
            cursor: pointer; font-size: 16px; font-weight: 700; transition: opacity 0.2s;
        }
        .primaryBtn:active { opacity: 0.7; }
        
        .card { background: var(--surface); padding: 22px; border-radius: 15px; border: 1px solid #222; margin-bottom: 20px; cursor: pointer; transition: background 0.2s; }
        .card:active { background: var(--surface-hover); }

        .input, .textArea {
            border: 1px solid var(--border); padding: 16px; border-radius: 10px;
            margin-bottom: 16px; background-color: #000; color: #fff;
            width: 100%; font-size: 15px; outline: none; transition: border-color 0.2s;
        }
        .input:focus, .textArea:focus { border-color: var(--primary); }

        .label { font-size: 14px; color: var(--text-sub); margin-top: 24px; margin-bottom: 10px; font-weight: 600; display: block; }
        
        .row { display: flex; flex-direction: row; gap: 12px; margin-bottom: 12px; }
        .item-tag { font-size: 11px; padding: 5px 12px; border-radius: 8px; background: #222; color: #888; border: 1px solid #333; cursor: pointer; }
        .item-tag.active { background: var(--primary); color: #fff; border-color: var(--primary); }

        .tabBar {
            height: 75px; background: var(--surface); border-top: 1px solid #222;
            display: flex; justify-content: space-around; align-items: center;
            width: 100%; padding-bottom: env(safe-area-inset-bottom);
        }
        .tabItem { display: flex; flex-direction: column; align-items: center; font-size: 11px; color: var(--text-dark); cursor: pointer; }
        .tabItem.active { color: var(--primary); }
        .tabIcon { font-size: 22px; margin-bottom: 4px; }

        .menuCard { display: flex; justify-content: space-between; align-items: center; padding: 20px; background: var(--surface); border-radius: 12px; margin-bottom: 12px; cursor: pointer; font-size: 15px; }

        @media (min-width: 600px) { #root { max-width: 480px; border-left: 1px solid #222; border-right: 1px solid #222; box-shadow: 0 0 50px rgba(0,0,0,0.5); } }
    </style>
</head>

<body>
    <div id="root"></div>

    <script>
        let state = {
            page: 'dash', // dash, request, history, quotes, pro_profile, notifications, help, reviews_write, mypage, tips, guarantee, invite
            currentUser: { id: 'cus1', name: '테스트고객', points: 2500 },
            usersDB: [
                { id: 'pro1', compName: '명품특수청소', intro: '15년 경격의 고독사/화재 전문 팀', keywords: ['고독사', '화재'], reviews: [{ rating: 5, text: '완벽한 처리 감사합니다.' }], verified: true, insurance: '영업배상보험 가입', guarantee: true },
                { id: 'pro2', compName: '깨끗한세상', intro: '성실과 정직으로 다가가는 특수청소', keywords: ['쓰레기집'], reviews: [], verified: true, insurance: '책임보험 가입', guarantee: true }
            ],
            requestsDB: [
                { id: 'r1', tags: ['고독사'], area: '25평', loc: '서울 강남구 역삼동', status: '견적 도착', createdAt: '2026-04-24' },
                { id: 'r2', tags: ['쓰레기집'], area: '10평', loc: '인천 연수구 송도동', status: '작업 완료', createdAt: '2026-04-10' }
            ],
            quotesDB: [
                { id: 'q1', proId: 'pro1', proName: '명품특수청소', price: 1500000, msg: '최고급 장비와 전문 약품으로 신속하게 처리해 드리겠습니다.', status: 'pending', rating: 4.9, count: 124 },
                { id: 'q2', proId: 'pro2', proName: '깨끗한세상', price: 1350000, msg: '믿고 맡겨주시면 최선을 다하겠습니다.', status: 'pending', rating: 4.7, count: 58 }
            ],
            notifs: [
                { id: 'n1', title: '새로운 견적 도착', desc: '명품특수청소 업체로부터 1,500,000원 견적이 도착했습니다.', date: '방금 전', unread: true },
                { id: 'n2', title: '포인트 적립 안내', desc: '리뷰 작성 이벤트로 500P가 적립되었습니다.', date: '1일 전', unread: false }
            ],
            tips: [
                { id: 't1', title: '유품 정리 전 꼭 확인해야 할 서류', category: '준비사항' },
                { id: 't2', title: '악취 제거를 위한 오존 시공의 원리', category: '기술안내' },
                { id: 't3', title: '고독사 현장 지원금 신청 방법', category: '행정지원' }
            ]
        };

        function setPage(p, data = null) {
            state.page = p;
            if (data) state.selectedItem = data;
            render();
            document.querySelector('.bg').scrollTo(0,0);
        }

        function render() {
            const root = document.getElementById('root');
            let content = '';
            let hideTabBar = ['request', 'chat', 'contract', 'pro_profile', 'notifications', 'reviews_write', 'tips', 'guarantee', 'invite', 'help'].includes(state.page);

            switch (state.page) {
                case 'dash': content = renderDash(); break;
                case 'request': content = renderRequest(); break;
                case 'history': content = renderHistory(); break;
                case 'quotes': content = renderQuotes(); break;
                case 'pro_profile': content = renderProProfile(); break;
                case 'notifications': content = renderNotifications(); break;
                case 'help': content = renderHelp(); break;
                case 'reviews_write': content = renderReviewsWrite(); break;
                case 'mypage': content = renderMyPage(); break;
                case 'tips': content = renderTips(); break;
                case 'guarantee': content = renderGuarantee(); break;
                case 'invite': content = renderInvite(); break;
            }

            root.innerHTML = `
                ${renderHeader(hideTabBar)}
                <div class="bg">${content}</div>
                ${hideTabBar ? '' : renderTabBar()}
            `;
        }

        function renderHeader(isSub) {
            const hasUnread = state.notifs.some(n => n.unread);
            return `
                <div class="header">
                    ${isSub ? `<div onclick="setPage('dash')" style="cursor:pointer; font-size:20px;">←</div>` : `<div onclick="location.href='index.html'" style="font-size:14px; border:1px solid #333; padding:6px 12px; border-radius:8px; cursor:pointer;">🏠 홈</div>`}
                    <div class="headerTitle">${getHeaderTitle()}</div>
                    <div style="display:flex; align-items:center; gap:15px;">
                        <div style="cursor:pointer; font-size:18px;" onclick="toggleTheme()">🌓</div>
                        <div class="iconBtn" onclick="setPage('notifications')">🔔 ${hasUnread ? '<div class="badge-dot"></div>' : ''}</div>
                    </div>
                </div>
            `;
        }

        function toggleTheme() {
            const isLight = document.documentElement.classList.toggle('light-theme');
            localStorage.setItem('special-cleaning-theme', isLight ? 'light' : 'dark');
        }

        function getHeaderTitle() {
            switch(state.page) {
                case 'dash': return '특청 고객센터';
                case 'notifications': return '알림 센터';
                case 'help': return '고객 지원';
                case 'tips': return '특수청소 지식창고';
                case 'guarantee': return '안심 보상 제도';
                case 'invite': return '친구 초대';
                case 'reviews_write': return '리뷰 작성';
                case 'history': return '내 요청 내역';
                case 'quotes': return '받은 견적함';
                case 'mypage': return '마이페이지';
                default: return '특청';
            }
        }

        function renderTabBar() {
            return `
                <div class="tabBar">
                    <div class="tabItem ${state.page === 'dash' ? 'active' : ''}" onclick="setPage('dash')"><div class="tabIcon">🏠</div>홈</div>
                    <div class="tabItem ${state.page === 'history' ? 'active' : ''}" onclick="setPage('history')"><div class="tabIcon">📄</div>요청목록</div>
                    <div class="tabItem ${state.page === 'quotes' ? 'active' : ''}" onclick="setPage('quotes')"><div class="tabIcon">📩</div>견적함</div>
                    <div class="tabItem ${state.page === 'mypage' ? 'active' : ''}" onclick="setPage('mypage')"><div class="tabIcon">👤</div>마이</div>
                </div>
            `;
        }

        function renderDash() {
            return `
                <div class="padding">
                    <div style="font-size: 26px; font-weight: 800; margin-bottom: 30px; letter-spacing:-0.04em;">세상의 모든 현장을<br>가장 깨끗하게 돌려드립니다.</div>
                    
                    <div style="background: linear-gradient(135deg, #E50914, #ff4d4d); padding: 30px; border-radius: 20px; color: #fff; margin-bottom: 35px; cursor: pointer; box-shadow: 0 12px 24px rgba(229,9,20,0.3);" onclick="setPage('request')">
                        <div style="font-size: 13px; opacity: 0.9; margin-bottom: 8px;">3분이면 신청 끝!</div>
                        <div style="font-size: 20px; font-weight: 800;">⚡ 무료 안심 견적 신청하기</div>
                    </div>

                    <div style="display:grid; grid-template-columns: 1fr 1fr; gap:12px; margin-bottom:30px;">
                        <div class="card" onclick="setPage('tips')" style="margin-bottom:0; text-align:center; padding:20px;"><div style="font-size:24px; margin-bottom:10px;">💡</div><div style="font-size:13px; font-weight:bold;">청소 가이드</div></div>
                        <div class="card" onclick="setPage('guarantee')" style="margin-bottom:0; text-align:center; padding:20px;"><div style="font-size:24px; margin-bottom:10px;">🛡️</div><div style="font-size:13px; font-weight:bold;">보상 제도</div></div>
                    </div>

                    <div style="font-weight:bold; margin-bottom:15px; font-size:16px;">최근 요청 상태</div>
                    <div class="card" onclick="setPage('history')">
                        <div style="display:flex; justify-content:space-between; align-items:center;">
                            <div>
                                <div style="font-size:11px; color:var(--primary); font-weight:bold; margin-bottom:4px;">${state.requestsDB[0].status}</div>
                                <div style="font-size:15px; font-weight:bold;">${state.requestsDB[0].loc}</div>
                            </div>
                            <span style="font-size:12px; color:var(--text-sub);">관리 ❯</span>
                        </div>
                    </div>
                </div>
            `;
        }

        function renderHistory() {
            return `
                <div class="padding">
                    <h2 style="margin-bottom:25px;">내 요청 내역</h2>
                    ${state.requestsDB.map(r => `
                        <div class="card" onclick="setPage('quotes')">
                            <div style="display:flex; justify-content:space-between; margin-bottom:12px;">
                                <span style="font-size:12px; color:var(--text-sub);">${r.createdAt}</span>
                                <span style="font-size:12px; font-weight:bold; color:${r.status==='작업 완료'?'var(--success)':'var(--primary)'}">${r.status}</span>
                            </div>
                            <div style="font-size:17px; font-weight:bold; margin-bottom:10px;">${r.loc} (${r.area})</div>
                            <div style="display:flex; gap:8px;">
                                ${r.tags.map(t => `<span class="item-tag" style="background:#222; color:#aaa; border:none; cursor:default;">#${t}</span>`).join('')}
                            </div>
                        </div>
                    `).join('')}
                </div>
            `;
        }

        function renderQuotes() {
            return `
                <div class="padding">
                    <h2 style="margin-bottom:15px;">도착한 견적</h2>
                    <p style="font-size:14px; color:var(--text-sub); margin-bottom:30px;">업체의 경력과 리뷰를 꼼꼼히 확인해 보세요.</p>
                    ${state.quotesDB.map(q => `
                        <div class="card">
                            <div style="display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:15px;">
                                <div>
                                    <div style="font-size:18px; font-weight:bold; margin-bottom:4px;">${q.proName}</div>
                                    <div style="display:flex; align-items:center; gap:5px; font-size:12px;">
                                        <span style="color:var(--warning);">⭐ ${q.rating}</span>
                                        <span style="color:var(--text-dark);">| 리뷰 ${q.count}</span>
                                    </div>
                                </div>
                                <div style="font-size:20px; font-weight:800; color:var(--primary);">${(q.price/10000).toLocaleString()}만원</div>
                            </div>
                            <div style="background:#222; padding:15px; border-radius:10px; font-size:13px; color:var(--text-sub); line-height:1.5; margin-bottom:20px;">
                                "${q.msg}"
                            </div>
                            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                                <button class="primaryBtn" style="padding:12px; background:#333; font-size:13px;" onclick="setPage('pro_profile', '${q.proId}')">프로필 보기</button>
                                <button class="primaryBtn" style="padding:12px; font-size:13px;" onclick="alert('채팅 상담으로 연결합니다.')">상담하기</button>
                            </div>
                        </div>
                    `).join('')}
                </div>
            `;
        }

        function renderProProfile() {
            const pro = state.usersDB.find(u => u.id === state.selectedItem) || state.usersDB[0];
            return `
                <div class="padding">
                    <div style="text-align:center; margin-bottom:30px;">
                        <div style="width:80px; height:80px; background:var(--primary); border-radius:40px; margin:0 auto 15px; display:flex; align-items:center; justify-content:center; font-size:30px;">🏆</div>
                        <h2 style="margin-bottom:8px;">${pro.compName}</h2>
                        <div style="font-size:13px; color:var(--text-sub);">${pro.intro}</div>
                    </div>
                    <div class="card">
                        <div style="font-weight:bold; margin-bottom:15px;">검증 내역</div>
                        <div style="display:flex; flex-direction:column; gap:10px;">
                            <div style="display:flex; justify-content:space-between; font-size:13px;"><span>✔️ 신원 및 사업자 인증</span><span style="color:var(--success);">완료</span></div>
                            <div style="display:flex; justify-content:space-between; font-size:13px;"><span>✔️ ${pro.insurance}</span><span style="color:var(--success);">확인됨</span></div>
                            <div style="display:flex; justify-content:space-between; font-size:13px;"><span>✔️ 100% 만족 보장 파트너</span><span style="color:var(--success);">가입</span></div>
                        </div>
                    </div>
                    <div style="font-weight:bold; margin-bottom:15px; font-size:16px;">리뷰 (${pro.reviews.length})</div>
                    ${pro.reviews.length === 0 ? `<div style="text-align:center; color:var(--text-dark); padding:40px;">아직 작성된 리뷰가 없습니다.</div>` : pro.reviews.map(r => `
                        <div class="card" style="padding:15px;">
                            <div style="font-size:12px; color:var(--warning); margin-bottom:8px;">${'★'.repeat(r.rating)}</div>
                            <div style="font-size:14px;">${r.text}</div>
                        </div>
                    `).join('')}
                    <button class="primaryBtn" onclick="setPage('dash')">돌아가기</button>
                </div>
            `;
        }

        function renderNotifications() {
            return `
                <div class="padding">
                    <h2 style="margin-bottom:25px;">알림 센터</h2>
                    ${state.notifs.map(n => `
                        <div class="menuCard" style="flex-direction:column; align-items:flex-start; gap:8px;">
                            <div style="display:flex; justify-content:space-between; width:100%;">
                                <div style="font-weight:bold; font-size:15px;">${n.title}</div>
                                <div style="font-size:11px; color:var(--text-dark);">${n.date}</div>
                            </div>
                            <div style="font-size:13px; color:var(--text-sub);">${n.desc}</div>
                        </div>
                    `).join('')}
                </div>
            `;
        }

        function renderHelp() {
            return `
                <div class="padding">
                    <h2 style="margin-bottom:30px;">고객 지원</h2>
                    <div style="font-weight:bold; margin-bottom:15px; color:var(--text-dark);">자주 묻는 질문</div>
                    <div class="menuCard"><span>Q. 비용 결제는 언제 하나요?</span><span>❯</span></div>
                    <div class="menuCard"><span>Q. 유품 정리는 어떻게 진행되나요?</span><span>❯</span></div>
                    <div class="menuCard"><span>Q. 작업 후 소독 증명서 발급은?</span><span>❯</span></div>
                    
                    <div style="font-weight:bold; margin-top:35px; margin-bottom:15px; color:var(--text-dark);">직접 문의하기</div>
                    <div class="card">
                        <textarea class="textArea" style="margin-bottom:0; background:transparent; border:none; height:100px;" placeholder="도움이 필요하신 내용을 남겨주세요."></textarea>
                    </div>
                    <button class="primaryBtn" onclick="alert('문의가 접수되었습니다.')">1:1 문의 접수</button>
                </div>
            `;
        }

        function renderTips() {
            return `
                <div class="padding">
                    <div style="font-size:13px; color:var(--primary); font-weight:bold; margin-bottom:10px;">전문가가 알려주는 노하우</div>
                    <h2 style="margin-bottom:25px;">특수청소 지식창고</h2>
                    ${state.tips.map(t => `
                        <div class="menuCard" onclick="alert('상세 내용으로 이동')">
                            <div>
                                <div style="font-size:11px; color:var(--text-dark); margin-bottom:4px;">${t.category}</div>
                                <div style="font-weight:600;">${t.title}</div>
                            </div>
                            <span>❯</span>
                        </div>
                    `).join('')}
                </div>
            `;
        }

        function renderGuarantee() {
            return `
                <div class="padding">
                    <div style="text-align:center; margin-bottom:40px; margin-top:20px;">
                        <div style="font-size:50px; margin-bottom:20px;">🛡️</div>
                        <h2 style="font-size:24px; font-weight:800; margin-bottom:15px;">100% 만족 보장제</h2>
                        <p style="font-size:14px; color:var(--text-sub); line-height:1.7;">작업 결과가 만족스럽지 않으신가요?<br>특청이 책임지고 재시공 또는 보상을 약속합니다.</p>
                    </div>
                    <div class="card" style="cursor:default;">
                        <div style="font-weight:bold; margin-bottom:10px; color:var(--primary);">01. 무상 재작업</div>
                        <div style="font-size:13px; color:var(--text-sub);">청소 미비 구역 발견 시 24시간 내 무상 출동</div>
                    </div>
                    <div class="card" style="cursor:default;">
                        <div style="font-weight:bold; margin-bottom:10px; color:var(--primary);">02. 손해 배상 보험</div>
                        <div style="font-size:13px; color:var(--text-sub);">작업 중 기물 파손 시 최대 1억원 한도 보상</div>
                    </div>
                </div>
            `;
        }

        function renderInvite() {
            return `
