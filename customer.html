<!DOCTYPE html>
<html lang="ko">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>특청 - 고객용 프리미엄</title>
	<link rel="stylesheet" as="style" crossorigin
		href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
	<script>
		(function () {
			const savedTheme = localStorage.getItem('special-cleaning-theme') || 'dark';
			if (savedTheme === 'light') {
				document.documentElement.classList.add('light-theme');
			}
		})();
	</script>
	<style>
		:root {
			--primary: #E50914;
			--bg: #000;
			--surface: #111;
			--surface-hover: #222;
			--text-main: #fff;
			--text-sub: #ccc;
			/* Improved from #aaa */
			--text-dark: #888;
			/* Improved from #666 */
			--border: #333;
			--success: #28a745;
			--warning: #FFD700;
			--info: #007bff;
		}

		.light-theme {
			--bg: #f8f9fa;
			--surface: #ffffff;
			--surface-hover: #f1f3f5;
			--text-main: #111;
			--text-sub: #555;
			--text-dark: #888;
			--border: #dee2e6;
		}

		* {
			box-sizing: border-box;
			-webkit-tap-highlight-color: transparent;
			font-family: "Pretendard Variable", Pretendard, sans-serif;
			line-height: 1.6;
			letter-spacing: -0.025em;
		}

		body {
			margin: 0;
			padding: 0;
			background-color: #050505;
			color: var(--text-main);
			height: 100vh;
			overflow: hidden;
			display: flex;
			justify-content: center;
			transition: background-color 0.3s, color 0.3s;
		}

		.light-theme body {
			background-color: #f1f3f5;
		}

		#root {
			height: 100%;
			display: flex;
			flex-direction: column;
			width: 100%;
			background-color: var(--bg);
			position: relative;
		}

		.bg {
			display: flex;
			flex-direction: column;
			flex: 1;
			background-color: var(--bg);
			overflow-y: auto;
			padding-bottom: 20px;
		}

		.padding {
			padding: 24px;
		}

		.header {
			padding-top: 50px;
			padding-bottom: 20px;
			display: flex;
			flex-direction: row;
			justify-content: space-between;
			align-items: center;
			padding-left: 20px;
			padding-right: 20px;
			border-bottom: 1px solid #222;
			background-color: var(--surface);
			position: sticky;
			top: 0;
			z-index: 10;
		}

		.headerTitle {
			color: var(--text-main);
			font-size: 18px;
			font-weight: bold;
		}

		.iconBtn {
			font-size: 18px;
			color: var(--text-sub);
			cursor: pointer;
			position: relative;
		}

		.badge-dot {
			position: absolute;
			top: -2px;
			right: -2px;
			width: 8px;
			height: 8px;
			background: var(--primary);
			border-radius: 50%;
			border: 2px solid var(--surface);
			pointer-events: none;
		}

		.primaryBtn {
			width: 100%;
			padding: 18px;
			background-color: var(--primary);
			border-radius: 12px;
			display: flex;
			align-items: center;
			justify-content: center;
			color: #fff;
			border: none;
			cursor: pointer;
			font-size: 16px;
			font-weight: 700;
			transition: opacity 0.2s;
		}

		.primaryBtn:active {
			opacity: 0.7;
		}

		.card {
			background: var(--surface);
			padding: 22px;
			border-radius: 15px;
			border: 1px solid #222;
			margin-bottom: 20px;
			cursor: pointer;
			transition: background 0.2s;
		}

		.card:active {
			background: var(--surface-hover);
		}

		.input,
		.textArea {
			border: 1px solid var(--border);
			padding: 16px;
			border-radius: 10px;
			margin-bottom: 16px;
			background-color: var(--bg);
			color: var(--text-main);
			width: 100%;
			font-size: 15px;
			outline: none;
			transition: border-color 0.2s;
		}

		.input:focus,
		.textArea:focus {
			border-color: var(--primary);
		}

		.label {
			font-size: 14px;
			color: var(--text-sub);
			margin-top: 24px;
			margin-bottom: 10px;
			font-weight: 600;
			display: block;
		}

		.row {
			display: flex;
			flex-direction: row;
			gap: 12px;
			margin-bottom: 12px;
		}

		.item-tag {
			font-size: 11px;
			padding: 5px 12px;
			border-radius: 8px;
			background: var(--surface);
			color: var(--text-sub);
			border: 1px solid var(--border);
			cursor: pointer;
		}

		.item-tag.active {
			background: var(--primary);
			color: #fff;
			border-color: var(--primary);
		}

		.tabBar {
			height: 75px;
			background: var(--surface);
			border-top: 1px solid #222;
			display: flex;
			justify-content: space-around;
			align-items: center;
			width: 100%;
			padding-bottom: env(safe-area-inset-bottom);
		}

		.tabItem {
			display: flex;
			flex-direction: column;
			align-items: center;
			font-size: 11px;
			color: var(--text-dark);
			cursor: pointer;
		}

		.tabItem.active {
			color: var(--primary);
		}

		.tabIcon {
			font-size: 22px;
			margin-bottom: 4px;
		}

		.menuCard {
			display: flex;
			justify-content: space-between;
			align-items: center;
			padding: 20px;
			background: var(--surface);
			border-radius: 12px;
			margin-bottom: 12px;
			cursor: pointer;
			font-size: 15px;
		}

		@media (min-width: 600px) {
			#root {
				max-width: 480px;
				border-left: 1px solid #222;
				border-right: 1px solid #222;
				box-shadow: 0 0 50px rgba(0, 0, 0, 0.5);
			}
		}
	</style>
</head>

<body>

				{ id: 'cc2', name: '희망 심리상담센터', type: '심리상담', loc: '광주 서구', rating: 4.9, reviews: 15 }

				{ id: 'cr2', centerId: 'cc2', nickname: '초록잎', content: '선생님이 너무 친절하셔서 마음이 편해졌어요.', rating: 5, verified: true }

					reviews: [{ rating: 4, text: '빨리 와주셔서 감사해요.' }],

				}
			],
			requestsDB: [
				{ id: 'r1', tags: ['고독사'], area: '25평', loc: '서울 강남구 역삼동', status: '견적 도착', createdAt: '2026-04-24' },
				{ id: 'r2', tags: ['쓰레기집'], area: '10평', loc: '인천 연수구 송도동', status: '작업 완료', createdAt: '2026-04-10' }
			],
			quotesDB: [
				{ id: 'q1', proId: 'pro1', proName: '명품특수청소', price: 1500000, msg: '최고급 장비와 전문 약품으로 신속하게 처리해 드리겠습니다.', status: 'pending', rating: 4.9, count: 124 },
				{ id: 'q2', proId: 'pro2', proName: '깨끗한세상', price: 1350000, msg: '믿고 맡겨주시면 최선을 다하겠습니다.', status: 'pending', rating: 4.7, count: 58 },
				{ id: 'q3', proId: 'pro3', proName: '24시 긴급특수청소', price: 1800000, msg: '긴급 상황에 맞춰 즉시 출동하겠습니다.', status: 'pending', rating: 4.5, count: 32 }
			],
			notifs: [
				{ id: 'n1', title: '새로운 견적 도착', desc: '명품특수청소 업체로부터 1,500,000원 견적이 도착했습니다.', date: '방금 전', unread: true },
				{ id: 'n2', title: '포인트 적립 안내', desc: '리뷰 작성 이벤트로 500P가 적립되었습니다.', date: '1일 전', unread: false }
			],
			tips: [
				{ id: 't1', title: '유품 정리 전 꼭 확인해야 할 서류', category: '준비사항', content: '유품 정리를 시작하기 전에 상속 관계를 명확히 하는 것이 가장 중요합니다.\n\n**필요 서류:**\n1. 사망진단서 (원본 또는 사본)\n2. 가족관계증명서 (상속인 확인용)\n3. 상속인 위임장 (본인이 직접 참관하지 못할 경우)\n\n이러한 서류가 준비되지 않은 상태에서 유품을 반출하거나 폐기할 경우, 추후 다른 유가족과의 법적 분쟁이 발생할 수 있으니 반드시 사전에 전문가와 상담하세요.' },
				{ id: 't2', title: '악취 제거를 위한 오존 시공의 원리', category: '기술안내', content: '특수청소에서 악취 제거의 핵심은 오존 시공입니다.\n\n**작동 원리:**\n오존(O3) 발생기를 통해 생성된 오존 분자는 공기 중의 냄새 분자(유기물)와 결합하여 이를 산화시켜 무해한 물질로 분해합니다.\n\n**주의사항:**\n- 시공 중에는 사람이나 동물이 절대 실내에 머물러서는 안 됩니다.\n- 시공 완료 후 최소 1시간 이상의 환기가 필요합니다.\n- 벽지에 배어있는 냄새까지 제거하기 위해 2~3회 반복 시공이 필요할 수 있습니다.' },
				{ id: 't3', title: '고독사 현장 지원금 신청 방법', category: '행정지원', content: '현실적으로 비용 부담이 큰 고독사 현장의 경우, 정부나 지자체의 지원을 받을 수 있는 방법이 있습니다.\n\n**지원 대상:**\n- 기초생활수급자 또는 차상위계층\n- 무연고 사망자 (공영장례 지원)\n\n**신청 절차:**\n1. 관할 동주민센터(행정복지센터) 사회복지과 문의\n2. 청소 전/후 사진 및 세금계산서(영수증) 확보\n3. 지원금 신청서 제출\n\n지자체별로 조례가 다르므로, 작업 착수 전에 반드시 해당 지역 센터에 먼저 확인하는 것이 좋습니다.' },
				{ id: 't4', title: '쓰레기집 청소 시 개인정보 보호', category: '안전안내', content: '쓰레기집 청소는 단순히 버리는 것이 아니라, 소중한 개인정보를 보호하는 과정입니다.\n\n**처리 방식:**\n- 모든 쓰레기를 하나하나 확인하여 통장, 계약서, 사진 등 중요 물품을 선별합니다.\n- 이름, 주소, 전화번호가 적힌 우편물이나 영수증은 전용 파쇄기로 파쇄 처리합니다.\n- 외부인이 알 수 없도록 검은색 불투명 봉투를 사용하여 신속하게 반출합니다.' }

				{ id: 2, sender: 'me', text: '네, 혹시 내일 방문 가능하신가요?', time: '오후 2:35', isMe: true }

				// Specific fields

				floorMaterial: '',    // 고독사/자살

			},

				{ id: 'a2', title: '빈티지 LP 플레이어', startPrice: 30000, currentPrice: 35000, timeLeft: '05:20:10', img: 'https://placehold.co/100x100?text=LP' }
			],
			remoteItems: [
				{ id: 'ri1', name: '현금/통장 뭉치', loc: '장롱 하단', img: 'https://placehold.co/150x150?text=Money', status: 'pending' },
				{ id: 'ri2', name: '유년시절 사진첩', loc: '거실 서랍', img: 'https://placehold.co/150x150?text=Photos', status: 'pending' }
			]
		};

		function setPage(p, data = null) {
			state.page = p;
			if (data) state.selectedItem = data;
			render();
			document.querySelector('.bg').scrollTo(0, 0);
		}

		function render() {
			const root = document.getElementById('root');
			let content = '';
			let noHeader = ['login', 'signup_choice', 'signup_customer', 'find_idpw'].includes(state.page);
			let isSubPage = state.page !== 'dash';
			let hideTabBar = ['login', 'signup_choice', 'signup_customer', 'find_idpw', 'request', 'chat', 'contract', 'pro_profile', 'notifications', 'reviews_write', 'tips', 'tip_detail', 'guarantee', 'invite', 'help', 'premium_care', 'premium_apply', 'premium_input', 'premium_payment', 'premium_success'].includes(state.page);

			switch (state.page) {
				case 'login': content = renderLogin(); break;
				case 'signup_choice': content = renderSignupChoice(); break;
				case 'signup_customer': content = renderSignupCustomer(); break;
				case 'find_idpw': content = renderFindIDPW(); break;
				case 'dash': content = renderDash(); break;
				case 'request': content = renderRequest(); break;
				case 'history': content = renderHistory(); break;
				case 'quotes': content = renderQuotes(); break;
				case 'pro_profile': content = renderProProfile(); break;
				case 'notifications': content = renderNotifications(); break;
				case 'help': content = renderHelp(); break;
				case 'reviews_write': content = renderReviewsWrite(); break;
				case 'mypage': content = renderMyPage(); break;
				case 'tips': content = renderTips(); break;
				case 'tip_detail': content = renderTipDetail(); break;
				case 'guarantee': content = renderGuarantee(); break;
				case 'invite': content = renderInvite(); break;
				case 'chat': content = renderChat(); break;
				case 'counseling_centers': content = renderCounselingCenters(); break;
				case 'counseling_detail': content = renderCounselingDetail(); break;
				case 'premium_care': content = renderPremiumCare(); break;
				case 'premium_apply': content = renderPremiumApply(); break;
				case 'premium_input': content = renderPremiumInput(); break;
				case 'premium_payment': content = renderPremiumPayment(); break;
				case 'premium_success': content = renderPremiumSuccess(); break;
				case 'remodeling_list': content = renderRemodelingList(); break;
				case 'auction': content = renderAuctionList(); break;
				case 'remote_selection': content = renderRemoteSelection(); break;
				case 'vehicle_request': content = renderVehicleRequest(); break;
			}

			root.innerHTML = `
				${noHeader ? '' : renderHeader(isSubPage)}
				<div class="bg">${content}</div>
				${hideTabBar ? '' : renderTabBar()}
			`;
		}

		// --- Auth Pages ---

		function renderLogin() {
			return `
				<div class="padding" style="display:flex; flex-direction:column; justify-content:center; min-height:100vh;">
					<div style="text-align:center; margin-bottom:40px;">
						<div style="font-size:40px; font-weight:900; color:var(--primary); margin-bottom:10px;">특청</div>
						<div style="font-size:14px; color:var(--text-sub);">대한민국 No.1 특수청소 플랫폼</div>
					</div>
					<input class="input" type="text" placeholder="아이디">
					<input class="input" type="password" placeholder="비밀번호">
					<button class="primaryBtn" style="margin-top:10px;" onclick="setPage('dash')">로그인</button>
					
					<div style="display:flex; justify-content:center; gap:20px; margin-top:20px; font-size:13px; color:var(--text-dark);">
						<span onclick="setPage('find_idpw')" style="cursor:pointer;">아이디/비밀번호 찾기</span>
						<span onclick="setPage('signup_choice')" style="cursor:pointer; color:var(--text-sub); font-weight:bold;">회원가입</span>
					</div>

					<div style="margin-top:50px; display:flex; flex-direction:column; gap:10px;">
						<div style="text-align:center; font-size:12px; color:var(--text-dark); margin-bottom:5px;">SNS 계정으로 간편 로그인</div>

		function calculatePriceRange() {
			const f = state.requestForm;
			if (f.services.length === 0) return null;

			let min = 0;
			let max = 0;

			f.services.forEach(s => {
				switch (s) {
					case 'death': case 'suicide': min += 1500000; max += 3000000; break;
					case 'trash': min += 500000; max += 2000000; break;
					case 'fire': min += 2500000; max += 6000000; break;
					case 'flood': min += 1000000; max += 3000000; break;
					default: min += 300000; max += 1000000;
				}
			});

			const area = parseInt(f.area) || 10;
			min += (area * 30000);
			max += (area * 50000);

			if (f.elevator === 'no') { min *= 1.1; max *= 1.2; }

			return {
				min: Math.floor(min / 10000) * 10000,
				max: Math.floor(max / 10000) * 10000
			};
		}

						<h2 style="margin:0;">유품 경매 센터</h2>
						<div style="font-size:12px; color:var(--primary); font-weight:bold;">라이브 진행 중</div>
					</div>
					<p style="font-size:13px; color:var(--text-sub); margin-bottom:25px;">유가족이 위탁한 소중한 물건들이 새로운 주인을 기다립니다.</p>

					${state.auctionItems.map(item => `
						<div class="card" style="display:flex; gap:15px; padding:15px;">
							<div style="width:100px; height:100px; background:#333; border-radius:10px; overflow:hidden;">
								<img src="${item.img}" style="width:100%; height:100%; object-fit:cover;">
							</div>
							<div style="flex:1;">
								<div style="font-weight:bold; font-size:15px; margin-bottom:4px;">${item.title}</div>
								<div style="font-size:12px; color:var(--text-dark); margin-bottom:10px;">남은 시간: <span style="color:var(--primary)">${item.timeLeft}</span></div>
								<div style="display:flex; justify-content:space-between; align-items:flex-end;">
									<div>
										<div style="font-size:11px; color:var(--text-sub);">현재가</div>
										<div style="font-size:16px; font-weight:800; color:var(--primary);">${item.currentPrice.toLocaleString()}원</div>
									</div>
									<button style="padding:6px 12px; background:var(--primary); border:none; border-radius:6px; color:#fff; font-size:12px; font-weight:bold;" onclick="alert('${item.title} 입찰 화면으로 이동합니다.')">입찰하기</button>
								</div>
							</div>
						</div>
					`).join('')}
				</div>
			`;
		}

		function renderRemoteSelection() {
			return `
				<div class="padding">
					<div style="background:rgba(229,9,20,0.1); border:1px solid var(--primary); padding:15px; border-radius:12px; margin-bottom:25px;">
						<div style="font-size:14px; font-weight:bold; color:var(--primary); margin-bottom:5px;">🛡️ 프리미엄 원격 선별 서비스</div>
						<div style="font-size:12px; color:var(--text-main); line-height:1.5;">작업자가 현장에서 발견한 중요 유품입니다. 실시간으로 처리 지침을 하달해 주세요.</div>
					</div>

					${state.remoteItems.map(item => `
						<div class="card" style="padding:20px;">
							<div style="display:flex; gap:15px; margin-bottom:15px;">
								<div style="width:120px; height:120px; background:#222; border-radius:10px; overflow:hidden;">
									<img src="${item.img}" style="width:100%; height:100%; object-fit:cover;">
								</div>
								<div style="flex:1;">
									<div style="font-size:11px; color:var(--text-dark); margin-bottom:4px;">발견 위치: ${item.loc}</div>
									<div style="font-weight:bold; font-size:16px; margin-bottom:10px;">${item.name}</div>
									<div style="font-size:12px; color:var(--info);">* 상태: ${item.status === 'pending' ? '지침 대기' : '처리 완료'}</div>
								</div>
							</div>
							<div style="display:grid; grid-template-columns: 1fr 1fr 1fr; gap:8px;">
								<button style="padding:10px 0; background:var(--surface-light); border:1px solid var(--border); border-radius:8px; color:var(--text-main); font-size:11px;" onclick="alert('유품 보관으로 설정되었습니다.')">📦 보관</button>
								<button style="padding:10px 0; background:var(--surface-light); border:1px solid var(--border); border-radius:8px; color:var(--danger); font-size:11px;" onclick="alert('보안 파쇄가 예약되었습니다.')">🔥 파쇄</button>
								<button style="padding:10px 0; background:var(--primary); border:none; border-radius:8px; color:#fff; font-size:11px;" onclick="alert('소독 후 택배 발송이 예약되었습니다.')">🚛 소독/배송</button>
							</div>
						</div>
					`).join('')}
					
					<button class="primaryBtn" style="margin-top:20px; background:#333;" onclick="setPage('dash')">대시보드 종료</button>
				</div>
			`;
		}

		function renderVehicleRequest() {
			return `
				<div class="padding">
					<h2 style="font-size:22px; font-weight:800; margin-bottom:10px;">차량 특수청소 견적</h2>
					<p style="font-size:13px; color:var(--text-sub); margin-bottom:30px;">차량 내 변사, 화재, 악취 제거를 위한 전문 서비스를 신청하세요.</p>

					<div class="label">차량 종류 *</div>
					<div style="display:grid; grid-template-columns: repeat(3, 1fr); gap:10px; margin-bottom:25px;">
						${['경차/승용', 'SUV/RV', '화물/대형'].map(v => `
							<div class="item-tag" style="text-align:center; padding:15px 0;">${v}</div>
						`).join('')}
					</div>

					<div class="label">피해 원인 *</div>
					<div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px; margin-bottom:25px;">
						<div class="item-tag" style="text-align:center;">변사/혈흔</div>
						<div class="item-tag" style="text-align:center;">화재/그을음</div>
						<div class="item-tag" style="text-align:center;">심한 악취</div>
						<div class="item-tag" style="text-align:center;">기타 오염</div>
					</div>

					<div class="label">차량 번호 (선택)</div>
					<input class="input" type="text" placeholder="예: 12가 3456">

					<div class="label">현장 위치</div>
					<button class="input" style="text-align:left; color:var(--text-dark);" onclick="alert('위치 검색')">주소 또는 차량 위치 검색</button>

					<div style="background:rgba(229,9,20,0.05); border:1px solid var(--primary); padding:20px; border-radius:15px; margin-top:20px; text-align:center;">
						<div style="font-size:12px; color:var(--primary); font-weight:bold; margin-bottom:5px;">AI 안심 예상 견적</div>
						<div style="font-size:22px; font-weight:900;">약 450,000원 ~ 800,000원</div>
						<div style="font-size:11px; color:var(--text-dark); margin-top:10px;">* 차량 해체 여부에 따라 견적이 변동될 수 있습니다.</div>
					</div>

					<button class="primaryBtn" style="margin-top:30px; height:60px; font-size:17px;" onclick="alert('차량 특수청소 견적 요청이 완료되었습니다.'); setPage('dash');">견적 요청서 발송</button>
					<div style="height:40px;"></div>
				</div>
			`;
		}

		window.onload = render;
	</script>
</body>

</html>
