<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>특청 - 고객용 프리미엄</title>
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
    <style>
        :root {
            --primary: #E50914;
            --bg: #000;
            --surface: #111;
            --surface-hover: #222;
            --text-main: #fff;
            --text-sub: #aaa;
            --text-dark: #666;
            --border: #333;
            --success: #28a745;
            --warning: #FFD700;
            --info: #007bff;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            font-family: "Pretendard Variable", Pretendard, sans-serif;
        }

        body {
            margin: 0; padding: 0; background-color: #050505; color: var(--text-main);
            height: 100vh; overflow: hidden; display: flex; justify-content: center;
        }

        #root {
            height: 100%; display: flex; flex-direction: column; width: 100%;
            background-color: var(--bg); position: relative;
        }

        .bg { display: flex; flex-direction: column; flex: 1; background-color: var(--bg); overflow-y: auto; padding-bottom: 20px; }
        .padding { padding: 20px; }

        .header {
            padding-top: 50px; padding-bottom: 15px; display: flex; flex-direction: row;
            justify-content: space-between; align-items: center; padding-left: 20px; padding-right: 20px;
            border-bottom: 1px solid #222; background-color: var(--surface);
            position: sticky; top: 0; z-index: 10;
        }

        .headerTitle { color: #fff; font-size: 18px; font-weight: bold; }
        .iconBtn { font-size: 18px; color: var(--text-sub); cursor: pointer; position: relative; }
        .badge-dot { position: absolute; top: -2px; right: -2px; width: 8px; height: 8px; background: var(--primary); border-radius: 50%; border: 2px solid var(--surface); }

        .primaryBtn {
            width: 100%; padding: 16px; background-color: var(--primary); border-radius: 12px;
            display: flex; align-items: center; justify-content: center; color: #fff; border: none;
            cursor: pointer; font-size: 16px; font-weight: 700; transition: opacity 0.2s;
        }
        .primaryBtn:active { opacity: 0.7; }
        
        .card { background: var(--surface); padding: 18px; border-radius: 15px; border: 1px solid #222; margin-bottom: 15px; }
        .input, .textArea {
            border: 1px solid var(--border); padding: 15px; border-radius: 10px;
            margin-bottom: 12px; background-color: #000; color: #fff;
            width: 100%; font-size: 15px; outline: none;
        }
        .label { font-size: 14px; color: var(--text-sub); margin-top: 20px; margin-bottom: 8px; font-weight: 600; display: block; }
        
        .row { display: flex; flex-direction: row; gap: 10px; margin-bottom: 10px; }
        .item-tag { font-size: 10px; padding: 3px 8px; border-radius: 5px; background: #222; color: #888; border: 1px solid #333; }
        .item-tag.active { background: var(--primary); color: #fff; border-color: var(--primary); }

        .tabBar {
            height: 70px; background: var(--surface); border-top: 1px solid #222;
            display: flex; justify-content: space-around; align-items: center;
            width: 100%; padding-bottom: env(safe-area-inset-bottom);
        }
        .tabItem { display: flex; flex-direction: column; align-items: center; font-size: 10px; color: var(--text-dark); cursor: pointer; }
        .tabItem.active { color: var(--primary); }
        .tabIcon { font-size: 20px; margin-bottom: 4px; }

        /* Notification Center */
        .notif-item { border-bottom: 1px solid #222; padding: 15px 0; }
        .notif-title { font-size: 14px; font-weight: bold; margin-bottom: 5px; }
        .notif-desc { font-size: 12px; color: var(--text-sub); line-height: 1.4; }

        /* Photo Upload Mockup */
        .photo-box { width: 80px; height: 80px; border: 1px dashed var(--border); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 20px; color: var(--text-dark); cursor: pointer; }

        /* Verified Badge */
        .verif-badge { display: flex; align-items: center; gap: 5px; font-size: 11px; color: var(--success); font-weight: bold; margin-bottom: 8px; }

        @media (min-width: 600px) { #root { max-width: 480px; border-left: 1px solid #222; border-right: 1px solid #222; box-shadow: 0 0 50px rgba(0,0,0,0.5); } }
    </style>
</head>

<body>
    <div id="root"></div>

    <script>
        let state = {
            page: 'dash', // dash, request, history, req_detail, quotes, pro_profile, contract, chat, notifications, help, reviews_write, mypage
            currentUser: { id: 'cus1', name: '테스트고객' },
            usersDB: [
                { id: 'pro1', compName: '명품특수청소', intro: '15년 경격의 고독사/화재 전문 팀', keywords: ['고독사', '화재'], reviews: [{ rating: 5, text: '완벽한 처리 감사합니다.' }], verified: true, insurance: '영업배상보험 가입' },
                { id: 'pro2', compName: '깨끗한세상', intro: '성실과 정직으로 다가가는 특수청소', keywords: ['쓰레기집'], reviews: [], verified: true, insurance: '책임보험 가입' }
            ],
            requestsDB: [
                { id: 'r1', tags: ['고독사'], area: '25', loc: '서울 강남구 역삼동', status: '견적 대기중', createdAt: '2026-04-24' }
            ],
            quotesDB: [
                { id: 'q1', proId: 'pro1', proName: '명품특수청소', price: 1500000, msg: '신속히 도와드리겠습니다.', status: 'pending' }
            ],
            notifs: [
                { id: 'n1', title: '새로운 견적 도착', desc: '명품특수청소 업체로부터 1,500,000원 견적이 도착했습니다.', date: '방금 전', unread: true },
                { id: 'n2', title: '상담 메시지', desc: '업체와 상담을 시작할 수 있습니다.', date: '10분 전', unread: false }
            ],
            faqs: [
                { q: '특수청소 비용은 어떻게 산정되나요?', a: '현장 면적, 오염도, 폐기물 양 등에 따라 결정됩니다.' },
                { q: '상담은 무료인가요?', a: '네, 비대면 견적 상담은 100% 무료입니다.' }
            ],
            requestForm: { tags: [], area: '', photos: [] }
        };

        function setPage(p, data = null) {
            state.page = p;
            if (data) {
                if (p === 'req_detail') state.selectedReq = data;
                if (p === 'pro_profile') state.selectedPro = data;
                if (p === 'contract') state.selectedQuote = data;
                if (p === 'chat') { state.selectedPro = data; state.chatDB = state.chatDB || [{ sender: data.id, text: '반갑습니다. 무엇을 도와드릴까요?' }]; }
            }
            render();
        }

        function render() {
            const root = document.getElementById('root');
            let content = '';
            let hideTabBar = ['request', 'chat', 'contract', 'pro_profile', 'notifications', 'reviews_write'].includes(state.page);

            switch (state.page) {
                case 'dash': content = renderDash(); break;
                case 'request': content = renderRequest(); break;
                case 'history': content = renderHistory(); break;
                case 'req_detail': content = renderReqDetail(); break;
                case 'quotes': content = renderQuotes(); break;
                case 'pro_profile': content = renderProProfile(); break;
                case 'contract': content = renderContract(); break;
                case 'chat': content = renderChat(); break;
                case 'notifications': content = renderNotifications(); break;
                case 'help': content = renderHelp(); break;
                case 'reviews_write': content = renderReviewsWrite(); break;
                case 'mypage': content = renderMyPage(); break;
            }

            root.innerHTML = `
                ${renderHeader(hideTabBar)}
                <div class="bg">${content}</div>
                ${hideTabBar ? '' : renderTabBar()}
            `;
        }

        function renderHeader(isSub) {
            const hasUnread = state.notifs.some(n => n.unread);
            return `
                <div class="header">
                    ${isSub ? `<div onclick="window.history.back();" style="cursor:pointer; font-size:20px;">←</div>` : `<div onclick="location.href='index.html'" style="font-size:14px; border:1px solid #333; padding:5px 10px; border-radius:8px;">🏠 홈</div>`}
                    <div class="headerTitle">${getHeaderTitle()}</div>
                    <div class="iconBtn" onclick="setPage('notifications')">🔔 ${hasUnread ? '<div class="badge-dot"></div>' : ''}</div>
                </div>
            `;
        }

        function getHeaderTitle() {
            switch(state.page) {
                case 'dash': return '특청 고객용';
                case 'notifications': return '알림 내역';
                case 'help': return '고객 센터';
                case 'request': return '견적 신청';
                case 'reviews_write': return '리뷰 작성';
                default: return '특청';
            }
        }

        function renderTabBar() {
            return `
                <div class="tabBar">
                    <div class="tabItem ${['dash', 'help'].includes(state.page) ? 'active' : ''}" onclick="setPage('dash')"><div class="tabIcon">🏠</div>홈</div>
                    <div class="tabItem ${state.page === 'history' ? 'active' : ''}" onclick="setPage('history')"><div class="tabIcon">📄</div>내요청</div>
                    <div class="tabItem ${state.page === 'quotes' ? 'active' : ''}" onclick="setPage('quotes')"><div class="tabIcon">📩</div>견적함</div>
                    <div class="tabItem ${['mypage', 'help'].includes(state.page) ? 'active' : ''}" onclick="setPage('mypage')"><div class="tabIcon">👤</div>마이</div>
                </div>
            `;
        }

        function renderDash() {
            return `
                <div class="padding">
                    <div style="font-size: 24px; font-weight: 800; margin-bottom: 25px;">${state.currentUser.name} 님, <br>안심하고 청소를 맡기세요.</div>
                    
                    <div style="background: linear-gradient(135deg, #E50914, #ff4d4d); padding: 25px; border-radius: 20px; color: #fff; margin-bottom: 30px; cursor: pointer; box-shadow: 0 10px 20px rgba(229,9,20,0.3);" onclick="setPage('request')">
                        <div style="font-size: 14px; opacity: 0.9; margin-bottom: 5px;">현장 전문가가 24시간 대기 중</div>
                        <div style="font-size: 20px; font-weight: 800;">⚡ 지금 바로 견적 신청하기</div>
                    </div>

                    <div style="font-weight: bold; margin-bottom: 15px;">진행 상태</div>
                    <div class="card" style="display:flex; justify-content:space-between; align-items:center;">
                        <div>
                            <div style="font-size:12px; color:var(--text-sub);">최근 요청</div>
                            <div style="font-size:16px; font-weight:bold; margin-top:3px;">${state.requestsDB[0].tags[0]} 현장</div>
                        </div>
                        <span style="color:var(--primary); font-weight:bold; font-size:14px;">견적 대기중</span>
                    </div>

                    <div style="display:grid; grid-template-columns: 1fr 1fr; gap:12px; margin-top:20px;">
                        <div class="card" onclick="setPage('help')" style="margin-bottom:0; text-align:center;"><div style="font-size:24px; margin-bottom:8px;">❓</div><div style="font-size:13px; font-weight:600;">자주 묻는 질문</div></div>
                        <div class="card" onclick="alert('전화 상담으로 연결됩니다.')" style="margin-bottom:0; text-align:center;"><div style="font-size:24px; margin-bottom:8px;">📞</div><div style="font-size:13px; font-weight:600;">실시간 전화문의</div></div>
                    </div>
                </div>
            `;
        }

        function renderRequest() {
            return `
                <div class="padding">
                    <div class="label">청소 서비스 선택</div>
                    <div class="row">
                        <div class="item-tag active">고독사</div><div class="item-tag">쓰레기집</div><div class="item-tag">화재/복구</div>
                    </div>

                    <div class="label">현장 사진 첨부 (선택)</div>
                    <div class="row">
                        <div class="photo-box" onclick="alert('사진 선택 팝업')">+</div>
                        <div style="font-size:12px; color:var(--text-dark); display:flex; align-items:center;">상세 견적에 큰 도움이 됩니다.</div>
                    </div>

                    <div class="label">현장 면적 및 상세 내용</div>
                    <input class="input" placeholder="평수 입력 (예: 24)">
                    <textarea class="textArea" placeholder="상황을 자세히 설명해주시면 더 정확한 견적이 가능합니다."></textarea>
                    
                    <button class="primaryBtn" onclick="alert('견적이 발송되었습니다!'); setPage('history');">요청서 완료</button>
                    <div style="height:40px"></div>
                </div>
            `;
        }

        function renderHistory() {
            return `
                <div class="padding">
                    ${state.requestsDB.map(r => `
                        <div class="card" onclick="setPage('req_detail', ${JSON.stringify(r).replace(/"/g, '&quot;')})">
                            <div style="display:flex; justify-content:space-between; margin-bottom:10px;">
                                <span style="font-size:12px; color:var(--primary); font-weight:bold;">${r.status}</span>
                                <span style="font-size:12px; color:var(--text-dark);">${r.createdAt}</span>
                            </div>
                            <div style="font-size:17px; font-weight:bold;">${r.tags.join(', ')} / ${r.area}평</div>
                            <div style="font-size:13px; color:var(--text-sub); margin-top:5px;">${r.loc}</div>
                        </div>
                    `).join('')}
                    <div class="card" style="border: 1px dashed #333; opacity:0.6; text-align:center;">
                        <span style="font-size:13px; font-weight:bold;">이전 서비스 내역</span>
                        <div style="margin-top:10px; font-size:11px;">완료된 작업은 여기서 리뷰를 남길 수 있습니다.</div>
                        <button class="primaryBtn" style="height:35px; font-size:12px; margin-top:10px; background:#222; color:#fff;" onclick="setPage('reviews_write')">리뷰 쓰러가기</button>
                    </div>
                </div>
            `;
        }

        function renderNotifications() {
            return `
                <div class="padding">
                    ${state.notifs.map(n => `
                        <div class="notif-item">
                            <div class="notif-title">${n.title} ${n.unread ? '<span style="color:var(--primary)">●</span>' : ''}</div>
                            <div class="notif-desc">${n.desc}</div>
                            <div style="font-size:11px; color:var(--text-dark); margin-top:5px;">${n.date}</div>
                        </div>
                    `).join('')}
                    <button class="primaryBtn" style="margin-top:20px; background:var(--surface); border:1px solid #333;" onclick="state.notifs.forEach(n=>n.unread=false); render();">모두 읽음 처리</button>
                </div>
            `;
        }

        function renderQuotes() {
            return `
                <div class="padding">
                    ${state.quotesDB.map(q => `
                        <div class="card">
                            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
                                <div onclick="setPage('pro_profile', state.usersDB.find(u=>u.id==='${q.proId}'))" style="cursor:pointer; font-weight:bold; font-size:18px; color:var(--primary);">${q.proName} ❯</div>
                                <div style="font-size:12px; color:var(--warning);">⭐ 4.9 (120+)</div>
                            </div>
                            <div style="font-size:24px; font-weight:800; color:var(--primary); margin-bottom:15px;">${q.price.toLocaleString()}원</div>
                            <div style="background:#000; padding:15px; border-radius:10px; font-size:13px; color:var(--text-sub); margin-bottom:20px; border:1px solid #1a1a1a;">${q.msg}</div>
                            <div class="row">
                                <button class="primaryBtn" style="flex:1" onclick="setPage('chat', state.usersDB.find(u=>u.id==='${q.proId}'))">상담하기</button>
                                <button class="primaryBtn" style="flex:1; background:#fff; color:#000;" onclick="setPage('contract', ${JSON.stringify(q).replace(/"/g, '&quot;')})">바로계약</button>
                            </div>
                        </div>
                    `).join('')}
                </div>
            `;
        }

        function renderProProfile() {
            const p = state.selectedPro;
            return `
                <div class="padding">
                    <div class="verif-badge">🛡️ 특청 인증 파트너</div>
                    <h2 style="font-size:28px; font-weight:800; margin-bottom:5px;">${p.compName}</h2>
                    <div style="font-size:12px; color:var(--info); margin-bottom:20px;">📜 ${p.insurance}</div>
                    
                    <div style="font-weight:bold; margin-bottom:10px;">전문 분야</div>
                    <div class="row" style="margin-bottom:20px;">
                        ${p.keywords.map(k => `<span class="item-tag active">${k}</span>`).join('')}
                    </div>

                    <div class="card" style="background:#000; border-color:#222; line-height:1.6; font-size:14px;">${p.intro}</div>
                    
                    <h3 style="margin-bottom:15px;">포트폴리오 (최근 작업)</h3>
                    <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:30px;">
                        <div style="aspect-ratio:1; background:#222; border-radius:10px;"></div>
                        <div style="aspect-ratio:1; background:#222; border-radius:10px;"></div>
                    </div>
                </div>
            `;
        }

        function renderReviewsWrite() {
            return `
                <div class="padding">
                    <div style="text-align:center; margin-bottom:30px;">
                        <div style="font-size:18px; font-weight:bold; margin-bottom:10px;">작업은 만족스러우셨나요?</div>
                        <div style="font-size:30px;">⭐⭐⭐⭐⭐</div>
                    </div>
                    <div class="label">상세 후기</div>
                    <textarea class="textArea" placeholder="업체의 친절함, 청결도 등을 공유해 주세요."></textarea>
                    
                    <div class="label">완료 사진 (선택)</div>
                    <div class="photo-box">+</div>
                    
                    <button class="primaryBtn" style="margin-top:30px;" onclick="alert('리뷰 감사드립니다! 포인트가 지급되었습니다.'); setPage('dash');">리뷰 등록하기</button>
                </div>
            `;
        }

        function renderHelp() {
            return `
                <div class="padding">
                    <h2 style="margin-bottom:20px;">무엇을 도와드릴까요?</h2>
                    ${state.faqs.map(f => `
                        <div class="card">
                            <div style="font-weight:bold; font-size:14px; margin-bottom:8px; color:var(--primary);">Q. ${f.q}</div>
                            <div style="font-size:13px; color:var(--text-sub); line-height:1.5;">${f.a}</div>
                        </div>
                    `).join('')}
                    <div class="card" style="background:var(--primary); text-align:center; cursor:pointer;" onclick="alert('1:1 실시간 상담 연결')">
                        <div style="color:#fff; font-weight:bold;">카카오톡 1:1 유선 상담</div>
                    </div>
                </div>
            `;
        }

        function renderMyPage() {
            return `
                <div class="padding">
                    <div style="display:flex; align-items:center; gap:20px; margin-bottom:30px;">
                        <div style="width:60px; height:60px; background:var(--primary); border-radius:30px; display:flex; align-items:center; justify-content:center; font-size:24px;">👤</div>
                        <div>
                            <div style="font-size:18px; font-weight:bold;">${state.currentUser.name} 님</div>
                            <div style="font-size:12px; color:var(--text-sub);">일반 회원 (VVIP)</div>
                        </div>
                    </div>
                    <div class="menuCard" onclick="setPage('help')"><span>📢 공지사항</span><span>❯</span></div>
                    <div class="menuCard"><span>💳 결제 수단 및 내역</span><span>❯</span></div>
                    <div class="menuCard" onclick="setPage('help')"><span>🛠️ 고객센터</span><span>❯</span></div>
                    <div class="menuCard" style="color:var(--primary)" onclick="location.href='index.html'">🚪 로그아웃</div>
                </div>
            `;
        }

        function renderChat() {
            return `<div class="padding" style="text-align:center; pt:50px;">실시간 채팅 상담 중... <br><br> <button class="primaryBtn" onclick="window.history.back()">목록으로</button></div>`;
        }
        function renderContract() {
            return `<div class="padding" style="text-align:center; pt:50px;">전자계약 진행 중... <br><br> <button class="primaryBtn" onclick="window.history.back()">목록으로</button></div>`;
        }
        function renderReqDetail() {
            return `<div class="padding" style="text-align:center; pt:50px;">상세 내역 페이지... <br><br> <button class="primaryBtn" onclick="window.history.back()">목록으로</button></div>`;
        }

        window.onload = render;
    </script>
</body>

</html>
