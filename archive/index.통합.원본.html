<!DOCTYPE html>
<html lang="ko">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>특청 - 특수청소 전문 중개 플랫폼</title>
	<!-- Vanilla JS only, no React/Babel -->
	<style>
		:root {
			--primary: #E50914;
			--bg: #000;
			--surface: #111;
			--surface-hover: #222;
			--text-main: #fff;
			--text-sub: #aaa;
			--text-dark: #666;
			--border: #333;
			--success: #28a745;
			--warning: #FFD700;
		}

		* {
			box-sizing: border-box;
			-webkit-tap-highlight-color: transparent;
		}

		body {
			margin: 0;
			padding: 0;
			font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
			background-color: var(--bg);
			color: var(--text-main);
			height: 100vh;
			overflow: hidden;
		}

		#root {
			height: 100%;
			display: flex;
			flex-direction: column;
		}

		/* Utility Classes derived from StyleSheet */
		.bg {
			display: flex;
			flex-direction: column;
			flex: 1;
			background-color: var(--bg);
			overflow-y: auto;
		}

		.padding {
			padding: 30px;
		}

		.mainContainer {
			flex: 1;
			background-color: var(--bg);
			display: flex;
			flex-direction: column;
			justify-content: center;
			align-items: center;
			padding: 30px;
		}

		.mainSubTitle {
			color: var(--primary);
			font-size: 15px;
			font-weight: bold;
			margin-bottom: 10px;
		}

		.mainLogo {
			font-size: 70px;
			font-weight: bold;
			color: #fff;
			margin-bottom: 60px;
			letter-spacing: -4px;
			line-height: 1;
		}

		.primaryBtn {
			width: 100%;
			padding: 18px;
			background-color: var(--primary);
			border-radius: 10px;
			display: flex;
			align-items: center;
			justify-content: center;
			color: #fff;
			border: none;
			cursor: pointer;
			font-size: 17px;
			font-weight: bold;
			transition: opacity 0.2s;
		}

		.primaryBtn:active {
			opacity: 0.7;
		}

		.btnText {
			color: #fff;
			font-size: 17px;
			font-weight: bold;
		}

		.proBtn {
			width: 100%;
			padding: 17px;
			border: 1.5px solid var(--border);
			border-radius: 10px;
			display: flex;
			align-items: center;
			justify-content: center;
			background-color: var(--surface);
			color: #fff;
			cursor: pointer;
		}

		.proBtnText {
			color: #fff;
			font-weight: bold;
			font-size: 17px;
		}

		.formTitle {
			font-size: 32px;
			font-weight: bold;
			color: #fff;
			margin-bottom: 30px;
			text-align: center;
		}

		.label {
			font-size: 14px;
			color: var(--text-sub);
			margin-top: 25px;
			margin-bottom: 10px;
			font-weight: bold;
			display: block;
		}

		.input {
			border: 1px solid var(--border);
			padding: 15px;
			border-radius: 10px;
			margin-bottom: 12px;
			background-color: var(--surface);
			color: #fff;
			width: 100%;
			font-size: 16px;
			outline: none;
		}

		.input::placeholder {
			color: var(--text-dark);
		}

		.inputWrapper {
			display: flex;
			flex-direction: row;
			align-items: center;
			background-color: var(--surface);
			border-radius: 10px;
			border: 1px solid var(--border);
			margin-bottom: 12px;
		}

		.row {
			display: flex;
			flex-direction: row;
			justify-content: space-between;
			margin-bottom: 10px;
			flex-wrap: wrap;
			gap: 10px;
		}

		.halfBtn {
			flex: 1;
			padding: 15px;
			border: 1px solid var(--border);
			border-radius: 10px;
			display: flex;
			align-items: center;
			justify-content: center;
			cursor: pointer;
			color: var(--text-sub);
		}

		.smallBtn {
			width: 85px;
			height: 50px;
			background-color: #444;
			border-radius: 10px;
			display: flex;
			justify-content: center;
			align-items: center;
			border: none;
			color: #fff;
			cursor: pointer;
		}

		.activeBtn {
			background-color: var(--primary);
			border-color: var(--primary);
			color: #fff;
		}

		.activeText {
			color: #fff;
			font-weight: bold;
		}

		.header {
			padding-top: 60px;
			padding-bottom: 20px;
			display: flex;
			flex-direction: row;
			justify-content: space-between;
			align-items: center;
			padding-left: 20px;
			padding-right: 20px;
			border-bottom: 1px solid #222;
			background-color: var(--surface);
			position: sticky;
			top: 0;
			z-index: 10;
		}

		.headerTitle {
			color: #fff;
			font-size: 18px;
			font-weight: bold;
		}

		.textArea {
			border: 1px solid var(--border);
			padding: 20px;
			border-radius: 15px;
			height: 120px;
			background-color: var(--surface);
			color: #fff;
			width: 100%;
			font-size: 16px;
			outline: none;
			resize: none;
		}

		.splashContainer {
			flex: 1;
			background-color: var(--bg);
			display: flex;
			flex-direction: column;
			justify-content: center;
			align-items: center;
			height: 100vh;
		}

		.splashTitle {
			font-size: 16px;
			color: var(--primary);
			font-weight: bold;
			letter-spacing: 2px;
		}

		.splashSub {
			font-size: 13px;
			color: #888;
			margin-bottom: 8px;
		}

		.splashBrand {
			font-size: 65px;
			font-weight: bold;
			color: #fff;
			letter-spacing: -2px;
		}

		.uploadBox {
			height: 60px;
			background-color: var(--surface);
			border: 1px dashed #444;
			border-radius: 10px;
			display: flex;
			justify-content: center;
			align-items: center;
			margin-top: 5px;
			margin-bottom: 5px;
			cursor: pointer;
		}

		.menuCard {
			display: flex;
			flex-direction: row;
			justify-content: space-between;
			align-items: center;
			background-color: var(--surface);
			padding: 20px;
			border-radius: 10px;
			border: 1px solid #222;
			margin-bottom: 15px;
			cursor: pointer;
		}

		.modalOverlay {
			position: fixed;
			top: 0;
			left: 0;
			right: 0;
			bottom: 0;
			background-color: rgba(0, 0, 0, 0.8);
			display: flex;
			justify-content: center;
			align-items: center;
			z-index: 100;
			padding: 20px;
			overflow-y: auto;
		}

		.modalContent {
			background-color: var(--surface);
			padding: 25px;
			border-radius: 15px;
			border: 1px solid var(--border);
			width: 100%;
			max-width: 500px;
			position: relative;
		}

		.modalLabel {
			color: var(--text-sub);
			font-size: 12px;
			margin-bottom: 8px;
			margin-top: 15px;
			font-weight: bold;
			display: block;
		}

		.tagBtn {
			padding: 10px 15px;
			background-color: #222;
			border-radius: 20px;
			margin-bottom: 10px;
			margin-right: 8px;
			border: 1px solid var(--border);
			color: var(--text-sub);
			cursor: pointer;
			display: inline-block;
		}

		.cameraBtn {
			padding: 15px;
			background-color: #222;
			border-radius: 10px;
			display: flex;
			align-items: center;
			justify-content: center;
			border: 1px solid #444;
			color: #fff;
			cursor: pointer;
			width: 100%;
		}

		.tagWrap {
			display: flex;
			flex-direction: row;
			flex-wrap: wrap;
			margin: 0 -5px;
		}

		.dynamicCard {
			background-color: #0a0a0a;
			padding: 20px;
			border-radius: 15px;
			margin-top: 15px;
			border: 1px solid #222;
			border-left: 3px solid var(--primary);
		}

		.dynamicLabel {
			color: var(--primary);
			font-weight: bold;
			margin-bottom: 10px;
			font-size: 13px;
			display: block;
		}

		.addressBox {
			flex: 1;
			background-color: #222;
			padding: 12px;
			border-radius: 8px;
			margin: 0 3px;
			display: flex;
			justify-content: center;
			align-items: center;
			border: 1px solid #444;
			color: #fff;
			cursor: pointer;
		}

		.chatBubble {
			padding: 15px;
			border-radius: 15px;
			margin-bottom: 10px;
			max-width: 80%;
		}

		.myChat {
			align-self: flex-end;
			background-color: var(--primary);
		}

		.yourChat {
			align-self: flex-start;
			background-color: #333;
		}

		.chatInputBar {
			display: flex;
			flex-direction: row;
			padding: 15px;
			background-color: var(--surface);
			border-top: 1px solid #222;
			position: sticky;
			bottom: 0;
		}

		.chatChatInput {
			flex: 1;
			color: #fff;
			background-color: #222;
			border-radius: 20px;
			padding: 0 15px;
			height: 45px;
			border: none;
			outline: none;
		}

		.sendBtn {
			margin-left: 10px;
			background-color: var(--primary);
			border-radius: 20px;
			padding: 0 20px;
			display: flex;
			align-items: center;
			cursor: pointer;
			border: none;
			color: #fff;
			font-weight: bold;
		}

		/* Dashboard & Risk Score Styles */
		.risk-high {
			color: #d9534f;
			font-size: 24px;
			font-weight: bold;
		}

		.risk-medium {
			color: #f0ad4e;
			font-size: 24px;
			font-weight: bold;
		}

		.risk-low {
			color: #5cb85c;
			font-size: 24px;
			font-weight: bold;
		}

		.progress-bar-bg {
			width: 100%;
			background-color: #333;
			border-radius: 10px;
			height: 12px;
			margin-top: 15px;
			overflow: hidden;
		}

		.progress-bar-fill {
			height: 100%;
			width: 0%;
			transition: width 0.5s ease;
		}

		.badge {
			display: inline-block;
			padding: 6px 12px;
			border-radius: 20px;
			background: #222;
			color: #fff;
			font-size: 12px;
			font-weight: bold;
			margin-right: 5px;
			margin-bottom: 5px;
			border: 1px solid #444;
		}

		.badge-danger {
			background: #2b0000;
			color: #d9534f;
			border-color: #d9534f;
		}

		.stat-card {
			background-color: #1a1a1a;
			padding: 15px;
			border-radius: 12px;
			flex: 1;
			border: 1px solid #333;
		}

		.stat-label {
			color: #888;
			font-size: 12px;
		}

		.stat-value {
			color: #fff;
			font-size: 18px;
			font-weight: bold;
			margin-top: 5px;
		}

		/* Scrollbar styles */
		::-webkit-scrollbar {
			width: 6px;
		}

		::-webkit-scrollbar-track {
			background: var(--bg);
		}

		::-webkit-scrollbar-thumb {
			background: var(--border);
			border-radius: 3px;
		}

		@media print {
			body {
				background: white !important;
				color: black !important;
				overflow: visible !important;
				height: auto !important;
			}

			#root {
				height: auto !important;
				display: block !important;
			}

			.no-print {
				display: none !important;
			}

			.bg {
				overflow: visible !important;
				height: auto !important;
				position: static !important;
			}

			.header,
			.chatInputBar,
			.primaryBtn,
			.proBtn {
				display: none !important;
			}
		}
	</style>
</head>

<body>
	<div id="root"></div>

		// --- State Management ---
		let state = {

			page: 'splash',

			signupForm: { role: 'customer', id: '', pw: '', pwConfirm: '', name: '', phone: '', bizNum: '', compName: '', keywords: [] },
			loginForm: { id: '', pw: '' },

				addr: { sido: '', sigungu: '', dong: '' }, desc: '', images: [],
				dateOption: '', dateSpecific: { y: '', m: '', d: '' },
				detailDeath: { period: '', floor: '' },
				detailCrime: { type: '', locMain: '', locSub: '' },

			modals: { addr: false, addrStep: 1, tempSido: '', tempSigungu: '', terms: false },
			docs: { biz: null, sanitation: null, disinfection: null, waste: null, waterTank: null },
			// B2G Data
			bidsDB: [
				{ id: 'bid1', title: '서구청 관내 고독사 현장 긴급 복구', budget: 15000000, status: '입찰중', type: '제한경쟁', deadline: '2026-05-10', applicants: 0 }
			],
			govBudget: 50000000,
			clearedCases: 12,
			riskScore: 0,
			riskAnalysis: '',
			riskSolutions: [],
			riskUrgent: []
		};

		const koreaAddressData = {
			'서울특별시': { '강남구': ['역삼동', '청담동', '대치동', '삼성동'], '서초구': ['서초동', '반포동', '방배동'], '송파구': ['잠실동', '가락동'], '마포구': ['서교동', '연남동'], '강서구': ['마곡동', '화곡동'] },

			'광주광역시': { '서구': ['광천동', '치평동', '상무동', '풍암동'], '북구': ['운암동', '용봉동', '일곡동'], '동구': ['충장동', '동명동'], '남구': ['양림동', '봉선동'], '광산구': ['송정동', '수완동', '첨단동'] }

		const govOrgs = {

			local: ['서울특별시', '부산광역시', '대구광역시', '인천광역시', '광주광역시 본청', '광주광역시 서구청', '광주광역시 남구청', '광주광역시 북구청', '광주광역시 광산구청', '대전광역시', '울산광역시', '세종특별자치시', '경기도', '강원특별자치도', '충청북도', '충청남도', '전북특별자치도', '전라남도', '경상북도', '경상남도', '제주특별자치도']
		};

		// --- Router & Rendering ---
		function setPage(pageName) {
			state.page = pageName;
			render();
		}

		function render() {
			const root = document.getElementById('root');
			if (state.isLoading) {
				root.innerHTML = renderSplash();
				return;
			}

			switch (state.page) {
				case 'main': root.innerHTML = renderMain(); break;
				case 'login': root.innerHTML = renderLogin(); break;
				case 'signup': root.innerHTML = renderSignup(); break;
				case 'customer_dash': root.innerHTML = renderCustomerDash(); break;
				case 'pro_dash': root.innerHTML = renderProDash(); break;
				case 'gov_dash': root.innerHTML = renderGovDash(); break;
				case 'gov_report_center': root.innerHTML = renderGovReportCenter(); break;
				case 'gov_pro_list': root.innerHTML = renderGovProList(); break;
				case 'gov_bid_post': root.innerHTML = renderGovBidPost(); break;
				case 'gov_emergency_call': root.innerHTML = renderGovEmergencyCall(); break;
				case 'gov_dashboard': root.innerHTML = renderGovDashboard(); break;
				case 'admin_dash': root.innerHTML = renderAdminDash(); break;
				case 'pro_mypage': root.innerHTML = renderProMyPage(); break;
				case 'chat_room': root.innerHTML = renderChatRoom(); break;
				case 'customer_request': root.innerHTML = renderCustomerRequest(); break;
				case 'customer_req_history': root.innerHTML = renderCustomerReqHistory(); break;
				case 'customer_req_detail': root.innerHTML = renderCustomerReqDetail(); break;
				case 'customer_quotes': root.innerHTML = renderCustomerQuotes(); break;
				case 'customer_contracts': root.innerHTML = renderCustomerContracts(); break;
				case 'customer_mypage': root.innerHTML = renderCustomerMyPage(); break;
				case 'customer_view_pro_profile': root.innerHTML = renderCustomerViewProProfile(); break;
				case 'pro_request_detail': root.innerHTML = renderProRequestDetail(); break;
				case 'pro_schedule_manage': root.innerHTML = renderProScheduleManage(); break;
				case 'e_contract': root.innerHTML = renderEContract(); break;
				default: root.innerHTML = renderMain();
			}
			if (state.modals.addr) {
				const modal = document.createElement('div');
				modal.innerHTML = renderAddrModal();
				root.appendChild(modal.firstElementChild);
			}
			if (state.modals.terms) {
				const modal = document.createElement('div');
				modal.innerHTML = renderTermsModal();
				root.appendChild(modal.firstElementChild);
			}
			window.scrollTo(0, 0);
		}

		// --- UI Components (Templates) ---
		function renderSplash() {
			return `
				<div class="splashContainer">
					<div class="splashSub">대한민국 1등 특수청소 전문가 매칭</div>
					<div class="splashTitle">특수청소 전문 중개 플랫폼</div>
					<div class="splashBrand">특청</div>
				</div>
			`;
		}

		function renderMain() {
			return `
				<div class="mainContainer">
					<div class="mainSubTitle">특수현장, 전문가가 답입니다</div>
					<div class="mainLogo">특청</div>

								<input class="input" style="flex:1; margin:0 5px" placeholder="MM" oninput="state.requestForm.dateSpecific.m=this.value">

		function renderAddrModal() {
			const m = state.modals;
			return `
				<div class="modalOverlay">
					<div class="modalContent">
						<div style="display: flex; justify-content: space-between; margin-bottom: 20px;">
							<div style="font-weight: bold;">주소 선택 (${m.addrStep}/3)</div>
							<div onclick="closeAddrModal()" style="cursor: pointer;">✖️</div>

						<div class="tagWrap">
							${m.addrStep === 1 ? Object.keys(koreaAddressData).map(s => `<div class="tagBtn" onclick="selectAddrStep1('${s}')">${s}</div>`).join('') : ''}
							${m.addrStep === 2 ? Object.keys(koreaAddressData[m.tempSido]).map(sg => `<div class="tagBtn" onclick="selectAddrStep2('${sg}')">${sg}</div>`).join('') : ''}
							${m.addrStep === 3 ? koreaAddressData[m.tempSido][m.tempSigungu].map(d => `<div class="tagBtn" onclick="selectAddrStep3('${d}')">${d}</div>`).join('') : ''}

		function openAddrModal() { state.modals.addr = true; state.modals.addrStep = 1; render(); }
		function closeAddrModal() { state.modals.addr = false; render(); }
		function selectAddrStep1(s) { state.modals.tempSido = s; state.modals.addrStep = 2; render(); }
		function selectAddrStep2(sg) { state.modals.tempSigungu = sg; state.modals.addrStep = 3; render(); }
		function selectAddrStep3(d) {
			state.requestForm.addr = { sido: state.modals.tempSido, sigungu: state.modals.tempSigungu, dong: d };
			state.modals.addr = false;
			render();
		}

		// --- Logic Functions ---
		function updateSignupForm(key, val) {
			state.signupForm[key] = val;
			render();
		}

		function handleCheckId() {
			if (!state.signupForm.id) return alert("아이디를 입력해주세요.");
			if (state.usersDB.some(u => u.id === state.signupForm.id)) {
				alert("이미 사용 중인 아이디입니다.");
			} else {
				state.signupForm.isIdChecked = true;
				alert("사용 가능한 아이디입니다.");
				render();
			}
		}

		function handleAuth() {
			alert("본인인증 완료 (테스트)");
			state.signupForm.isAuthDone = true;
			state.signupForm.name = "홍길동";
			render();
		}

		function handleSignup() {
			const f = state.signupForm;
			if (!f.agreeTerms || !f.agreePrivacy) return alert("필수 약관에 동의해주세요.");
			if (!f.isIdChecked) return alert("아이디 중복확인을 해주세요.");
			if (f.pw !== f.pwConfirm) return alert("비밀번호가 일치하지 않습니다.");
			if (f.role === 'customer' || f.role === 'gov') {
				if (!f.isAuthDone) return alert("본인 인증을 완료해주세요.");
				if (f.role === 'gov' && (!f.govType || !f.govName)) return alert("소속 기관 정보를 입력해주세요.");
			} else if (f.role === 'pro') {
				if (!f.bizNum || !f.compName) return alert("사업자 정보를 입력해주세요.");
				if (f.keywords.length === 0) return alert("전문 분야를 선택해주세요.");
			}

			const newUser = { ...f, cash: 0, isApproved: f.role !== 'pro', reviews: [] };
			state.usersDB.push(newUser);
			alert("가입 성공! 로그인해주세요.");
			setPage('login');
		}

		function handleBidPost() {
			const title = document.getElementById('bidTitle').value;
			const budget = document.getElementById('bidBudget').value;
			if (!title || !budget) return alert("정보를 모두 입력해주세요.");

			const newBid = {
				id: 'bid' + Date.now(),
				title: title,
				budget: Number(budget),
				status: '입찰중',
				type: '제한경쟁',
				deadline: '2026-05-30',
				applicants: 0
			};
			state.bidsDB.push(newBid);
			alert("입찰 공고가 등록되었습니다.");
			setPage('gov_dash');
		}

		function handleLogout() {
			state.currentUser = null;
			state.loginForm = { id: '', pw: '' };
			setPage('main');
		}

		function handleLogin() {
			const id = document.getElementById('loginId').value;
			const pw = document.getElementById('loginPw').value;
			const user = state.usersDB.find(u => u.id === id && u.pw === pw);
			if (user) {
				state.currentUser = user;
				if (user.role === 'admin') setPage('admin_dash');
				else if (user.role === 'customer') setPage('customer_dash');
				else if (user.role === 'gov') setPage('gov_dash');
				else setPage('pro_dash');
			} else {
				alert("로그인 정보가 올바르지 않습니다.");
			}
		}
		function sendChatMessage() {
			const txt = document.getElementById('chatMsg').value;
			if (!txt) return;
			state.chatDB.push({ sender: state.currentUser.id, text: txt });
			render();
		}

		function approvePro(id) {
			const p = state.usersDB.find(u => u.id === id);
			p.isApproved = true;
			alert(`${p.compName} 업체가 승인되었습니다.`);
			render();
		}

		function toggleReqCommonType(val) {
			const idx = state.requestForm.commonType.indexOf(val);
			if (idx > -1) state.requestForm.commonType.splice(idx, 1);
			else state.requestForm.commonType.push(val);
			render();
		}
		function setReqElevator(val) { state.requestForm.elevator = val; render(); }
		function setDeathPeriod(val) { state.requestForm.detailDeath.period = val; render(); }
		function setDeathFloor(val) { state.requestForm.detailDeath.floor = val; render(); }
		function toggleTrashType(val) {
			const idx = state.requestForm.detailTrash.types.indexOf(val);
			if (idx > -1) state.requestForm.detailTrash.types.splice(idx, 1);
			else state.requestForm.detailTrash.types.push(val);
			render();
		}
		function setTrashMoveType(val) { state.requestForm.detailTrash.moveType = val; render(); }
		function setReqDateOption(val) { state.requestForm.dateOption = val; render(); }

		function toggleRequestTag(tag) {
			const idx = state.requestForm.tags.indexOf(tag);
			if (idx > -1) state.requestForm.tags.splice(idx, 1);
			else state.requestForm.tags.push(tag);
			render();
		}

		function handleSubmitRequest() {
			if (state.requestForm.tags.length === 0 || !state.requestForm.desc) return alert("정보를 모두 입력해주세요.");
			const newReq = {
				id: 'r' + Date.now(),
				userId: state.currentUser.id,
				tags: [...state.requestForm.tags],
				commonType: [...state.requestForm.commonType],
				loc: `${state.requestForm.addr.sido} ${state.requestForm.addr.sigungu} ${state.requestForm.addr.dong}`,
				area: state.requestForm.area,
				floor: state.requestForm.floor,
				elevator: state.requestForm.elevator,
				desc: state.requestForm.desc,
				status: '견적 대기중',
				dateOption: state.requestForm.dateOption,
				images: []
			};
			state.requestsDB.push(newReq);
			alert("견적 요청이 접수되었습니다.");
			setPage('customer_dash');
		}

		// --- Logic Handlers (New) ---
		function calculateRisk() {
			const age = document.getElementById('riskAge').value;
			const requester = document.getElementById('riskRequester').value;
			const waste = document.getElementById('riskWaste').value;
			const odor = document.getElementById('riskOdor').value;

			let score = 0;
			let analysis = "<strong>[발견 정황]</strong><br>";
			let solutions = [];
			let urgent = [];

			if (requester === 'landlord') { score += 40; analysis += "타인(임대인/이웃)에 의한 발견으로 완전한 고립 및 단절이 의심됩니다. "; urgent.push("복지보건과 긴급 방문"); }
			else if (requester === 'family') { score += 20; analysis += "가족/지인의 의뢰로 소통 단절 초기 단계입니다. "; }
			else { score += 5; analysis += "본인이 직접 의뢰하여 상황 개선 의지가 확인됩니다. "; }

			analysis += "<br><br><strong>[현장 진단]</strong><br>";
			if (odor === 'high') { score += 30; analysis += "심각한 생물학적 오염 및 부패 침출수가 확인됩니다. "; urgent.push("긴급 악취제거 소독"); }
			if (waste === 'delivery') { score += 10; analysis += "무력감으로 인한 생활 쓰레기 방치가 보입니다. "; solutions.push("청년 마음건강 바우처"); }
			if (waste === 'alcohol') { score += 15; analysis += "알코올 의존 및 우울 증세가 뚜렷합니다. "; solutions.push("정신건강센터 연계"); }
			if (waste === 'bills') { score += 20; analysis += "경제적 파탄으로 인한 공과금 체납 정황이 있습니다. "; urgent.push("긴급 생계비 지원"); }

			state.riskScore = score;
			state.riskAnalysis = analysis;
			state.riskSolutions = solutions;
			state.riskUrgent = urgent;
			render();
		}

		function getRiskLevelLabel(s) {
			if (s >= 70) return "위험 (High) - 고독사 임박 및 집중 관리 필요";
			if (s >= 30) return "경고 (Medium) - 모니터링 및 복지 지원 권장";
			return "관심 (Low) - 초기 개입 및 단기 지원";
		}

		function getRiskColor(s) {
			if (s >= 70) return "#d9534f";
			if (s >= 30) return "#f0ad4e";
			return "#5cb85c";
		}

		function viewMyReqDetail(id) {
			state.selectedMyReq = state.requestsDB.find(r => r.id === id);
			setPage('customer_req_detail');
		}

		function openTermsModal() { state.modals.terms = true; render(); }
		function closeTermsModal() { state.modals.terms = false; render(); }
		function agreeTermsAndNext() {
			state.signupForm.agreeTerms = true;
			state.signupForm.agreePrivacy = true;
			state.modals.terms = false;
			render();
		}

		function toggleSignupKeyword(k) {
			const idx = state.signupForm.keywords.indexOf(k);
			if (idx > -1) state.signupForm.keywords.splice(idx, 1);
			else state.signupForm.keywords.push(k);
			render();
		}

		// --- Logic Handlers ---
		function viewOrderDetails(id) {
			state.selectedReq = state.requestsDB.find(r => r.id === id);
			setPage('pro_request_detail');
		}

		function submitQuote() {
			const price = document.getElementById('quotePrice').value;
			const msg = document.getElementById('quoteMsg').value;
			if (!price || !msg) return alert("금액과 메시지를 입력해주세요.");
			const newQuote = {
				id: 'q' + Date.now(),
				reqUserId: state.selectedReq.userId,
				reqId: state.selectedReq.id,
				proId: state.currentUser.id,
				proName: state.currentUser.compName,
				price: price,
				msg: msg,
				status: 'pending'
			};
			state.quotesDB.push(newQuote);
			alert("견적 발송 완료!");
			setPage('pro_dash');
		}

		function startPayment(quoteId) {
			const q = state.quotesDB.find(x => x.id === quoteId);
			state.paymentTargetQuote = q;
			// Simplified: direct complete for demo
			if (confirm(`${Number(q.price).toLocaleString()}원을 결제하시겠습니까?`)) {
				q.status = 'paid';
				alert("결제 완료!");
				setPage('customer_dash');
			}
		}

		function manageSchedule(quoteId) {
			state.targetScheduleQuote = state.quotesDB.find(x => x.id === quoteId);
			setPage('pro_schedule_manage');
		}

		function confirmSchedule() {
			const d = document.getElementById('schedDate').value;
			const t = document.getElementById('schedTime').value;
			if (!d || !t) return alert("일정을 입력해주세요.");
			state.targetScheduleQuote.scheduleDate = d;
			state.targetScheduleQuote.scheduleTime = t;
			state.targetScheduleQuote.status = 'contracted';
			alert("일정 확정 및 계약서가 생성되었습니다.");
			setPage('pro_dash');
		}

		function openContract(id) {
			state.selectedContract = state.quotesDB.find(x => x.id === id);
			setPage('e_contract');
		}

		function signContract() {
			const c = state.selectedContract;
			if (state.currentUser.role === 'pro') c.proSigned = true;
			else c.customerSigned = true;
			if (c.proSigned && c.customerSigned) c.status = 'signed';
			alert("서명 완료!");
			render();
		}

		function completeWork() {
			state.selectedContract.status = 'completed';
			alert("작업 완료 처리되었습니다.");
			setPage('pro_dash');
		}

		function renderGovProList() {
			const pros = state.usersDB.filter(u => u.role === 'pro' && u.isApproved);
			return `
				<div class="bg">
					<div class="header"><div onclick="setPage('gov_dash')" style="color:var(--primary); cursor:pointer">← 뒤로</div><div class="headerTitle">검증업체 상세 조회</div><div style="width:40px"></div></div>
					<div class="padding">
						${pros.map(p => `
							<div class="menuCard">
								<div style="flex:1">
									<div style="font-weight:bold; font-size:18px">${p.compName}</div>
									<div style="color:var(--primary); font-size:12px; margin-top:5px">보유: ${p.keywords.slice(0, 3).join(', ')}</div>
								</div>
								<div class="smallBtn" style="background-color:var(--primary)" onclick="alert('상세 서류 검토 후 계약을 진행합니다.')">선택</div>
							</div>
						`).join('')}
					</div>
				</div>
			`;
		}

		function renderGovBidPost() {
			return `
				<div class="bg">
					<div class="header"><div onclick="setPage('gov_dash')" style="color:var(--primary); cursor:pointer">← 뒤로</div><div class="headerTitle">입찰 공고 등록</div><div style="width:40px"></div></div>
					<div class="padding">
						<div class="label">공고 명칭 *</div>
						<input class="input" id="bidTitle" placeholder="예: 2026년 OO동 주거환경 개선사업">

							<div class="tagBtn">폐기물 인허가 필수</div>

			return `

					<div style="flex:1; padding:20px; overflow-y:auto" id="chatList">
						${state.chatDB.map(c => `
							<div class="chatBubble ${c.sender === state.currentUser.id ? 'myChat' : 'yourChat'}">${c.text}</div>

					<div class="chatInputBar" style="position:sticky; bottom:0">

						<button class="sendBtn" onclick="sendChatMessage()">전송</button>
					</div>
				</div>
			`;
		}
		function downloadPDF() {
			window.print();
		}

		function toggleReportPreview() {
			state.showReportPreview = !state.showReportPreview;
			render();
		}

		function writeReview(id) {
			const q = state.quotesDB.find(x => x.id === id);
			const rating = prompt("평점을 입력해주세요 (1-5)", "5");
			const text = prompt("후기를 입력해주세요");
			if (rating && text) {
				const pro = state.usersDB.find(u => u.id === q.proId);
				if (!pro.reviews) pro.reviews = [];
				pro.reviews.push({ rating: Number(rating), text: text });
				q.isReviewed = true;
				alert("리뷰가 등록되었습니다!");
				render();
			}
		}

					<div class="header"><div onclick="setPage('customer_quotes')" style="color:var(--primary); cursor:pointer">← 뒤로</div><div class="headerTitle">기획자 프로필</div><div style="width:40px"></div></div>
					<div class="padding">
